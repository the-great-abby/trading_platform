# Trading System Log Colorizer Configuration
# Usage: grc -c ~/.grc/trading-logs.conf <command>

regexp=^(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}) (INFO|DEBUG|WARNING|ERROR|CRITICAL) (.*)$
colours=bold blue,bold green,bold yellow,bold red,bold magenta
count=block

# JSON log patterns
regexp=("timestamp": "[^"]*")
colours=cyan
count=block

regexp=("level": "(INFO|DEBUG|WARNING|ERROR|CRITICAL)")
colours=bold green,bold cyan,bold yellow,bold red,bold magenta
count=block

regexp=("message": "[^"]*")
colours=white
count=block

# Trading-specific patterns
regexp=(BUY|SELL)
colours=bold green,bold red
count=block

regexp=(AAPL|MSFT|GOOGL|TSLA|AMZN)
colours=bold blue
count=block

regexp=(trade_signal|order_executed|market_data)
colours=bold cyan
count=block

regexp=(ERROR|FAILED|Exception|Traceback)
colours=bold red
count=block

regexp=(WARNING|WARN)
colours=bold yellow
count=block

regexp=(INFO|SUCCESS|PASSED)
colours=bold green
count=block

regexp=(DEBUG)
colours=bold cyan
count=block

# Performance metrics
regexp=(\d+\.\d+ms|\d+\.\d+s)
colours=bold magenta
count=block

# URLs and endpoints
regexp=(http[s]?://[^\s]+|localhost:\d+)
colours=underline cyan
count=block

# Kubernetes patterns
regexp=(pod/[^\s]+|namespace/[^\s]+)
colours=bold blue
count=block 