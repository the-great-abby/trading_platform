<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAPID Key Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <h1>VAPID Key Test</h1>
    <div id="results"></div>
    
    <button onclick="testVapidKey()">Test VAPID Key</button>
    <button onclick="testPushSubscription()">Test Push Subscription</button>

    <script>
        function log(message, type = 'info') {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `result ${type}`;
            div.textContent = message;
            results.appendChild(div);
        }

        function urlBase64ToUint8Array(base64String) {
            try {
                const padding = '='.repeat((4 - base64String.length % 4) % 4);
                const base64 = (base64String + padding)
                    .replace(/-/g, '+')
                    .replace(/_/g, '/');

                const rawData = window.atob(base64);
                const outputArray = new Uint8Array(rawData.length);

                for (let i = 0; i < rawData.length; ++i) {
                    outputArray[i] = rawData.charCodeAt(i);
                }
                return outputArray;
            } catch (error) {
                throw new Error(`VAPID key conversion failed: ${error.message}`);
            }
        }

        async function testVapidKey() {
            log('Testing VAPID key...', 'info');
            
            try {
                const response = await fetch('http://localhost:11007/api/notifications/vapid-public-key');
                const data = await response.json();
                
                if (data.public_key) {
                    log(`✅ VAPID key received: ${data.public_key.substring(0, 20)}...`, 'success');
                    
                    // Test key conversion
                    try {
                        const uint8Array = urlBase64ToUint8Array(data.public_key);
                        log(`✅ VAPID key converted successfully. Length: ${uint8Array.length}`, 'success');
                        log(`✅ Key format is valid for web push notifications`, 'success');
                        return data.public_key;
                    } catch (error) {
                        log(`❌ VAPID key conversion failed: ${error.message}`, 'error');
                        return null;
                    }
                } else {
                    log('❌ No VAPID key in response', 'error');
                    return null;
                }
            } catch (error) {
                log(`❌ Failed to fetch VAPID key: ${error.message}`, 'error');
                return null;
            }
        }

        async function testPushSubscription() {
            log('Testing push subscription...', 'info');
            
            if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
                log('❌ Service Worker or Push Manager not supported', 'error');
                return;
            }

            try {
                // Get VAPID key
                const vapidKey = await testVapidKey();
                if (!vapidKey) {
                    log('❌ Cannot test subscription without valid VAPID key', 'error');
                    return;
                }

                // Request notification permission
                const permission = await Notification.requestPermission();
                if (permission !== 'granted') {
                    log('❌ Notification permission denied', 'error');
                    return;
                }

                // Register service worker
                const registration = await navigator.serviceWorker.register('/sw.js');
                log('✅ Service Worker registered', 'success');

                // Subscribe to push notifications
                const subscription = await registration.pushManager.subscribe({
                    userVisibleOnly: true,
                    applicationServerKey: urlBase64ToUint8Array(vapidKey)
                });

                log('✅ Push subscription successful!', 'success');
                log(`Subscription endpoint: ${subscription.endpoint.substring(0, 50)}...`, 'info');
                
                // Test subscription
                const existingSubscription = await registration.pushManager.getSubscription();
                if (existingSubscription) {
                    log('✅ Existing subscription found and working', 'success');
                } else {
                    log('⚠️ No existing subscription found', 'info');
                }

            } catch (error) {
                log(`❌ Push subscription failed: ${error.message}`, 'error');
            }
        }

        // Auto-test on page load
        window.addEventListener('load', () => {
            log('Page loaded. Ready to test VAPID key and push subscriptions.', 'info');
        });
    </script>
</body>
</html>
