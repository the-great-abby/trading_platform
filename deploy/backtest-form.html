<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Strategy Backtesting Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            color: #667eea;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.2em;
            opacity: 0.8;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        
        .form-section {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 25px;
        }
        
        .form-section h3 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.3em;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .strategy-categories {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5a6fd8;
            transform: translateY(-2px);
        }
        
        .btn-outline {
            background: transparent;
            border: 2px solid #667eea;
            color: #667eea;
        }
        
        .btn-outline:hover {
            background: #667eea;
            color: white;
        }
        
        .strategy-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
            background: white;
        }
        
        .strategy-checkbox {
            display: flex;
            align-items: center;
            padding: 8px;
            cursor: pointer;
            font-size: 14px;
            border-radius: 4px;
            transition: background-color 0.2s ease;
        }
        
        .strategy-checkbox:hover {
            background: #f8f9fa;
        }
        
        .strategy-checkbox input[type="checkbox"] {
            margin-right: 5px;
            transform: scale(1.1);
        }
        
        .results-section {
            margin-top: 30px;
            padding: 25px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .results-section h3 {
            color: #667eea;
            margin-bottom: 20px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        
        .error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        
        .strategy-result {
            background: white;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
        }
        
        .strategy-result h4 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.2em;
        }
        
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }
        
        .metric {
            text-align: center;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 6px;
        }
        
        .metric strong {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
            color: #666;
        }
        
        .metric span {
            font-size: 18px;
            font-weight: bold;
        }
        
        .positive { color: #28a745; }
        .negative { color: #dc3545; }
        .neutral { color: #6c757d; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Strategy Backtesting</h1>
            <p>Test trading strategies with historical data and comprehensive analysis</p>
        </div>
        
        <div class="form-grid">
            <div class="form-section">
                <h3>📊 Backtest Configuration</h3>
                
                <div class="form-group">
                    <label for="symbols">Symbols (comma-separated):</label>
                    <input type="text" id="symbols" placeholder="AAPL,MSFT,GOOGL,TSLA,NVDA" value="AAPL,MSFT,GOOGL,TSLA,NVDA">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="start-date">Start Date:</label>
                        <input type="date" id="start-date" value="2024-01-01">
                    </div>
                    <div class="form-group">
                        <label for="end-date">End Date:</label>
                        <input type="date" id="end-date" value="2024-12-31">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="capital">Initial Capital ($):</label>
                    <input type="number" id="capital" value="10000" min="1000" step="1000">
                </div>
                
                <div class="form-group">
                    <label for="risk-profile">Risk Profile:</label>
                    <select id="risk-profile">
                        <option value="conservative">Conservative</option>
                        <option value="moderate" selected>Moderate</option>
                        <option value="aggressive">Aggressive</option>
                        <option value="ultra-aggressive">Ultra Aggressive</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="use-llm" style="margin-right: 8px;">
                        Use AI/LLM Analysis
                    </label>
                </div>
                
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="parallel" checked style="margin-right: 8px;">
                        Parallel Execution
                    </label>
                </div>
            </div>
            
            <div class="form-section">
                <h3>🎯 Strategy Selection</h3>
                
                <div class="form-group">
                    <label>Strategy Categories:</label>
                    <div class="strategy-categories">
                        <button type="button" class="btn btn-outline" onclick="selectCategory('basic')">📊 Basic Strategies</button>
                        <button type="button" class="btn btn-outline" onclick="selectCategory('options')">🎯 Options Strategies</button>
                        <button type="button" class="btn btn-outline" onclick="selectCategory('advanced')">🚀 Advanced Strategies</button>
                        <button type="button" class="btn btn-outline" onclick="selectCategory('all')">🌟 All Strategies</button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Selected Strategies:</label>
                    <div id="strategy-selection" class="strategy-grid">
                        <!-- Strategies will be populated by JavaScript -->
                    </div>
                </div>
                
                <button type="button" class="btn btn-primary" onclick="runBacktest()" style="width: 100%; margin-top: 20px;">
                    🚀 Run Backtest
                </button>
            </div>
        </div>
        
        <div class="results-section">
            <h3>📊 Backtest Results</h3>
            <div id="results">
                <div class="loading">Configure and run a backtest to see results here</div>
            </div>
        </div>
    </div>

    <script>
        // Strategy definitions
        const STRATEGIES = {
            basic: [
                'BollingerBandsStrategy', 'RSIStrategy', 'MACDStrategy', 'SMACrossoverStrategy',
                'MomentumStrategy', 'MeanReversionStrategy', 'VolatilityBreakoutStrategy',
                'VWAPStrategy', 'IchimokuStrategy', 'AdaptiveMomentumStrategy'
            ],
            options: [
                'GreeksEnhancedStrategy', 'IronCondorStrategy', 'EnhancedIronCondorStrategy',
                'CashSecuredPutStrategy', 'CoveredCallStrategy', 'CalendarSpreadStrategy',
                'ButterflySpreadStrategy', 'VolatilityStrategy', 'EarningsStrategy'
            ],
            advanced: [
                'TrailingStopStrategy', 'FibonacciStrategy', 'NeuralNetworkStrategy',
                'QuantumMomentumStrategy', 'RegimeSwitchingStrategy', 'KalmanFilterStrategy',
                'MLEnsembleStrategy', 'EnhancedDayTradingStrategy'
            ]
        };
        
        // Initialize strategy selection
        document.addEventListener('DOMContentLoaded', function() {
            selectCategory('basic');
        });
        
        function selectCategory(category) {
            const strategyGrid = document.getElementById('strategy-selection');
            let strategies = [];
            
            if (category === 'all') {
                strategies = [...STRATEGIES.basic, ...STRATEGIES.options, ...STRATEGIES.advanced];
            } else {
                strategies = STRATEGIES[category] || [];
            }
            
            const strategiesHtml = strategies.map(strategy => `
                <label class="strategy-checkbox">
                    <input type="checkbox" value="${strategy}" checked>
                    ${strategy.replace('Strategy', '')}
                </label>
            `).join('');
            
            strategyGrid.innerHTML = strategiesHtml;
        }
        
        async function runBacktest() {
            const symbols = document.getElementById('symbols').value.trim();
            const startDate = document.getElementById('start-date').value;
            const endDate = document.getElementById('end-date').value;
            const capital = parseFloat(document.getElementById('capital').value);
            const riskProfile = document.getElementById('risk-profile').value;
            const useLLM = document.getElementById('use-llm').checked;
            const parallel = document.getElementById('parallel').checked;
            
            // Get selected strategies
            const selectedStrategies = Array.from(document.querySelectorAll('#strategy-selection input:checked'))
                .map(cb => cb.value);
            
            if (!symbols || !startDate || !endDate || selectedStrategies.length === 0) {
                showResult('error', 'Please fill in all required fields and select at least one strategy');
                return;
            }
            
            const backtestData = {
                symbols: symbols.split(',').map(s => s.trim().toUpperCase()),
                strategies: selectedStrategies,
                start_date: startDate,
                end_date: endDate,
                initial_capital: capital,
                risk_profile: riskProfile,
                use_llm: useLLM,
                parallel_execution: parallel
            };
            
            // Show loading state
            showResult('loading', '🚀 Starting backtest... This may take several minutes.');
            
            try {
                // Simulate backtest execution
                await simulateBacktest(backtestData);
            } catch (error) {
                showResult('error', `❌ Error running backtest: ${error.message}`);
            }
        }
        
        async function simulateBacktest(data) {
            // Simulate processing time
            await new Promise(resolve => setTimeout(resolve, 2000));
            
            // Generate mock results
            const results = [];
            for (const strategy of data.strategies) {
                const totalReturn = (Math.random() - 0.3) * 0.8; // -30% to +50%
                const sharpeRatio = (Math.random() - 0.5) * 3; // -1.5 to +1.5
                const maxDrawdown = Math.random() * 0.3; // 0% to 30%
                const winRate = 0.4 + Math.random() * 0.3; // 40% to 70%
                const totalTrades = Math.floor(Math.random() * 90) + 10; // 10 to 100
                const profitFactor = 0.8 + Math.random() * 0.7; // 0.8 to 1.5
                
                results.push({
                    name: strategy,
                    total_return: totalReturn,
                    sharpe_ratio: sharpeRatio,
                    max_drawdown: maxDrawdown,
                    win_rate: winRate,
                    total_trades: totalTrades,
                    profit_factor: profitFactor
                });
            }
            
            showResults(results);
        }
        
        function showResult(type, message) {
            const resultsDiv = document.getElementById('results');
            
            if (type === 'loading') {
                resultsDiv.innerHTML = `
                    <div class="loading">
                        <div style="text-align: center; padding: 40px;">
                            <div style="font-size: 48px; margin-bottom: 20px;">⏳</div>
                            <div style="font-size: 18px;">${message}</div>
                        </div>
                    </div>
                `;
            } else if (type === 'success') {
                resultsDiv.innerHTML = `
                    <div class="success">
                        ${message}
                    </div>
                `;
            } else {
                resultsDiv.innerHTML = `
                    <div class="error">
                        ${message}
                    </div>
                `;
            }
        }
        
        function showResults(results) {
            const resultsDiv = document.getElementById('results');
            
            if (!results || results.length === 0) {
                resultsDiv.innerHTML = '<div class="loading">No results available</div>';
                return;
            }
            
            const resultsHtml = results.map(strategy => `
                <div class="strategy-result">
                    <h4>${strategy.name.replace('Strategy', '')}</h4>
                    <div class="metrics-grid">
                        <div class="metric">
                            <strong>Total Return</strong>
                            <span class="${strategy.total_return >= 0 ? 'positive' : 'negative'}">
                                ${(strategy.total_return * 100).toFixed(2)}%
                            </span>
                        </div>
                        <div class="metric">
                            <strong>Sharpe Ratio</strong>
                            <span class="${strategy.sharpe_ratio >= 0 ? 'positive' : 'negative'}">
                                ${strategy.sharpe_ratio.toFixed(3)}
                            </span>
                        </div>
                        <div class="metric">
                            <strong>Max Drawdown</strong>
                            <span class="negative">
                                ${(strategy.max_drawdown * 100).toFixed(2)}%
                            </span>
                        </div>
                        <div class="metric">
                            <strong>Win Rate</strong>
                            <span class="neutral">
                                ${(strategy.win_rate * 100).toFixed(1)}%
                            </span>
                        </div>
                        <div class="metric">
                            <strong>Total Trades</strong>
                            <span class="neutral">
                                ${strategy.total_trades}
                            </span>
                        </div>
                        <div class="metric">
                            <strong>Profit Factor</strong>
                            <span class="${strategy.profit_factor >= 1 ? 'positive' : 'negative'}">
                                ${strategy.profit_factor.toFixed(2)}
                            </span>
                        </div>
                    </div>
                </div>
            `).join('');
            
            resultsDiv.innerHTML = resultsHtml;
        }
    </script>
</body>
</html>
