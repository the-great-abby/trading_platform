version: '3.8'

services:
  # Test Database
  timescaledb-test:
    image: timescale/timescaledb:latest-pg14
    environment:
      POSTGRES_DB: trading_bot_test
      POSTGRES_USER: trading_user
      POSTGRES_PASSWORD: trading_pass
    ports:
      - "5433:5432"
    volumes:
      - test_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading_user -d trading_bot_test"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Test Redis
  redis-test:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes
    volumes:
      - test_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Test RabbitMQ
  rabbitmq-test:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: trading
      RABBITMQ_DEFAULT_PASS: trading_pass
      RABBITMQ_DEFAULT_VHOST: trading_vhost_test
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - test_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Test Runner
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      TEST_DB_HOST: timescaledb-test
      TEST_DB_PORT: 5432
      TEST_DB_NAME: trading_bot_test
      TEST_DB_USER: trading_user
      TEST_DB_PASSWORD: trading_pass
      TEST_REDIS_HOST: redis-test
      TEST_REDIS_PORT: 6379
      TEST_REDIS_DB: 1
      TEST_RABBITMQ_HOST: rabbitmq-test
      TEST_RABBITMQ_PORT: 5672
      TEST_RABBITMQ_USER: trading
      TEST_RABBITMQ_PASSWORD: trading_pass
      TEST_RABBITMQ_VHOST: trading_vhost_test
    depends_on:
      timescaledb-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
      rabbitmq-test:
        condition: service_healthy
    volumes:
      - .:/app
      - test_results:/app/test-results
    command: >
      sh -c "
        python scripts/setup_test_database.py &&
        pytest tests/cqrs/ -v --tb=short --html=test-results/report.html --self-contained-html
      "

volumes:
  test_db_data:
  test_redis_data:
  test_rabbitmq_data:
  test_results: