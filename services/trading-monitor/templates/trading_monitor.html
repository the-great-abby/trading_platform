<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Engine Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        .header h1 {
            color: #2c3e50;
            font-size: 2.5em;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #27ae60;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        .status-stopped {
            background: #e74c3c;
            animation: none;
        }
        
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }
        
        .card h3 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 1.3em;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .metric {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #ecf0f1;
        }
        
        .metric:last-child {
            border-bottom: none;
        }
        
        .metric-label {
            font-weight: 500;
            color: #7f8c8d;
        }
        
        .metric-value {
            font-weight: 600;
            font-size: 1.1em;
        }
        
        .positive {
            color: #27ae60;
        }
        
        .negative {
            color: #e74c3c;
        }
        
        .neutral {
            color: #3498db;
        }
        
        .trades-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        
        .trades-table th,
        .trades-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ecf0f1;
        }
        
        .trades-table th {
            background: #f8f9fa;
            font-weight: 600;
            color: #2c3e50;
        }
        
        .trades-table tr:hover {
            background: #f8f9fa;
        }
        
        .action-buy {
            color: #27ae60;
            font-weight: 600;
        }
        
        .action-sell {
            color: #e74c3c;
            font-weight: 600;
        }
        
        .positions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        
        .position-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            border-left: 4px solid #3498db;
        }
        
        .position-card.profit {
            border-left-color: #27ae60;
        }
        
        .position-card.loss {
            border-left-color: #e74c3c;
        }
        
        .position-symbol {
            font-weight: 600;
            font-size: 1.2em;
            color: #2c3e50;
        }
        
        .position-details {
            margin-top: 10px;
            font-size: 0.9em;
            color: #7f8c8d;
        }
        
        .refresh-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s ease;
        }
        
        .refresh-btn:hover {
            background: #2980b9;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #7f8c8d;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }
        
        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <span class="status-indicator" id="status-indicator"></span>
                Trading Engine Monitor
            </h1>
            <p>Real-time monitoring of automated trading system</p>
        </div>
        
        <div class="dashboard-grid">
            <!-- Trading Status -->
            <div class="card">
                <h3>📊 Trading Status</h3>
                <div id="trading-status">
                    <div class="loading">Loading status...</div>
                </div>
                <button class="refresh-btn" onclick="loadStatus()">🔄 Refresh</button>
            </div>
            
            <!-- Performance Metrics -->
            <div class="card">
                <h3>📈 Performance</h3>
                <div id="performance-metrics">
                    <div class="loading">Loading metrics...</div>
                </div>
                <button class="refresh-btn" onclick="loadPerformance()">🔄 Refresh</button>
            </div>
            
            <!-- Recent Trades -->
            <div class="card">
                <h3>💼 Recent Trades</h3>
                <div id="recent-trades">
                    <div class="loading">Loading trades...</div>
                </div>
                <button class="refresh-btn" onclick="loadTrades()">🔄 Refresh</button>
            </div>
            
            <!-- Active Positions -->
            <div class="card">
                <h3>🎯 Active Positions</h3>
                <div id="active-positions">
                    <div class="loading">Loading positions...</div>
                </div>
                <button class="refresh-btn" onclick="loadPositions()">🔄 Refresh</button>
            </div>
        </div>
    </div>
    
    <script>
        // Load data on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadStatus();
            loadPerformance();
            loadTrades();
            loadPositions();
            
            // Auto-refresh every 30 seconds
            setInterval(() => {
                loadStatus();
                loadPerformance();
                loadTrades();
                loadPositions();
            }, 30000);
        });
        
        async function loadStatus() {
            try {
                const response = await fetch('/api/status');
                const status = await response.json();
                
                const statusDiv = document.getElementById('trading-status');
                const indicator = document.getElementById('status-indicator');
                
                // Update status indicator
                if (status.is_running) {
                    indicator.classList.remove('status-stopped');
                } else {
                    indicator.classList.add('status-stopped');
                }
                
                // Format portfolio value
                const portfolioValue = new Intl.NumberFormat('en-US', {
                    style: 'currency',
                    currency: 'USD'
                }).format(status.portfolio_value);
                
                // Format P&L
                const pnlClass = status.total_pnl >= 0 ? 'positive' : 'negative';
                const pnlFormatted = new Intl.NumberFormat('en-US', {
                    style: 'currency',
                    currency: 'USD'
                }).format(status.total_pnl);
                
                statusDiv.innerHTML = `
                    <div class="metric">
                        <span class="metric-label">Engine Status</span>
                        <span class="metric-value">${status.is_running ? '🟢 Running' : '🔴 Stopped'}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Portfolio Value</span>
                        <span class="metric-value">${portfolioValue}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Total P&L</span>
                        <span class="metric-value ${pnlClass}">${pnlFormatted}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Total Trades</span>
                        <span class="metric-value">${status.total_trades}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Active Positions</span>
                        <span class="metric-value">${status.active_positions}</span>
                    </div>
                `;
                
                // Show last trade if available
                if (status.last_trade) {
                    const lastTrade = status.last_trade;
                    const actionClass = lastTrade.action === 'BUY' ? 'action-buy' : 'action-sell';
                    const priceFormatted = new Intl.NumberFormat('en-US', {
                        style: 'currency',
                        currency: 'USD'
                    }).format(lastTrade.price);
                    
                    statusDiv.innerHTML += `
                        <div class="metric">
                            <span class="metric-label">Last Trade</span>
                            <span class="metric-value ${actionClass}">${lastTrade.action} ${lastTrade.quantity} ${lastTrade.symbol} @ ${priceFormatted}</span>
                        </div>
                    `;
                }
                
            } catch (error) {
                console.error('Error loading status:', error);
                document.getElementById('trading-status').innerHTML = `
                    <div class="error">Error loading status: ${error.message}</div>
                `;
            }
        }
        
        async function loadPerformance() {
            try {
                const response = await fetch('/api/performance');
                const performance = await response.json();
                
                const metricsDiv = document.getElementById('performance-metrics');
                
                metricsDiv.innerHTML = `
                    <div class="metric">
                        <span class="metric-label">Win Rate</span>
                        <span class="metric-value">${performance.win_rate.toFixed(1)}%</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Total Trades</span>
                        <span class="metric-value">${performance.total_trades}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Winning Trades</span>
                        <span class="metric-value positive">${performance.winning_trades}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Losing Trades</span>
                        <span class="metric-value negative">${performance.total_trades - performance.winning_trades}</span>
                    </div>
                `;
                
            } catch (error) {
                console.error('Error loading performance:', error);
                document.getElementById('performance-metrics').innerHTML = `
                    <div class="error">Error loading performance: ${error.message}</div>
                `;
            }
        }
        
        async function loadTrades() {
            try {
                const response = await fetch('/api/trades?limit=10');
                const trades = await response.json();
                
                const tradesDiv = document.getElementById('recent-trades');
                
                if (trades.length === 0) {
                    tradesDiv.innerHTML = '<p>No trades yet</p>';
                    return;
                }
                
                let tradesHtml = `
                    <table class="trades-table">
                        <thead>
                            <tr>
                                <th>Time</th>
                                <th>Action</th>
                                <th>Symbol</th>
                                <th>Quantity</th>
                                <th>Price</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                
                trades.forEach(trade => {
                    const actionClass = trade.action === 'BUY' ? 'action-buy' : 'action-sell';
                    const priceFormatted = new Intl.NumberFormat('en-US', {
                        style: 'currency',
                        currency: 'USD'
                    }).format(trade.price);
                    
                    const time = new Date(trade.timestamp).toLocaleTimeString();
                    
                    tradesHtml += `
                        <tr>
                            <td>${time}</td>
                            <td class="${actionClass}">${trade.action}</td>
                            <td>${trade.symbol}</td>
                            <td>${trade.quantity}</td>
                            <td>${priceFormatted}</td>
                            <td>${trade.status}</td>
                        </tr>
                    `;
                });
                
                tradesHtml += '</tbody></table>';
                tradesDiv.innerHTML = tradesHtml;
                
            } catch (error) {
                console.error('Error loading trades:', error);
                document.getElementById('recent-trades').innerHTML = `
                    <div class="error">Error loading trades: ${error.message}</div>
                `;
            }
        }
        
        async function loadPositions() {
            try {
                const response = await fetch('/api/positions');
                const positions = await response.json();
                
                const positionsDiv = document.getElementById('active-positions');
                
                if (positions.length === 0) {
                    positionsDiv.innerHTML = '<p>No active positions</p>';
                    return;
                }
                
                let positionsHtml = '<div class="positions-grid">';
                
                positions.forEach(position => {
                    const pnlClass = position.pnl >= 0 ? 'profit' : 'loss';
                    const pnlFormatted = new Intl.NumberFormat('en-US', {
                        style: 'currency',
                        currency: 'USD'
                    }).format(position.pnl);
                    
                    const entryPriceFormatted = new Intl.NumberFormat('en-US', {
                        style: 'currency',
                        currency: 'USD'
                    }).format(position.entry_price);
                    
                    const currentPriceFormatted = new Intl.NumberFormat('en-US', {
                        style: 'currency',
                        currency: 'USD'
                    }).format(position.current_price);
                    
                    positionsHtml += `
                        <div class="position-card ${pnlClass}">
                            <div class="position-symbol">${position.symbol}</div>
                            <div class="position-details">
                                <div>Quantity: ${position.quantity}</div>
                                <div>Entry: ${entryPriceFormatted}</div>
                                <div>Current: ${currentPriceFormatted}</div>
                                <div>P&L: <span class="${pnlClass === 'profit' ? 'positive' : 'negative'}">${pnlFormatted}</span></div>
                                <div>Strategy: ${position.strategy}</div>
                            </div>
                        </div>
                    `;
                });
                
                positionsHtml += '</div>';
                positionsDiv.innerHTML = positionsHtml;
                
            } catch (error) {
                console.error('Error loading positions:', error);
                document.getElementById('active-positions').innerHTML = `
                    <div class="error">Error loading positions: ${error.message}</div>
                `;
            }
        }
    </script>
</body>
</html>
