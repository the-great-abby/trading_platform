<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Trading Station Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #333;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: #2a5298;
        }

        .card-icon {
            font-size: 1.8rem;
            color: #1e3c72;
        }

        .portfolio-summary {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .portfolio-summary .card-header {
            border-bottom-color: rgba(255,255,255,0.2);
        }

        .portfolio-summary .card-title {
            color: white;
        }

        .portfolio-summary .card-icon {
            color: white;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-item {
            text-align: center;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .trade-item, .position-item, .event-item {
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid #2a5298;
            background: #f8f9fa;
            transition: background-color 0.3s ease;
        }

        .trade-item:hover, .position-item:hover, .event-item:hover {
            background: #e9ecef;
        }

        .trade-item.buy {
            border-left-color: #28a745;
        }

        .trade-item.sell {
            border-left-color: #dc3545;
        }

        .position-item.profit {
            border-left-color: #28a745;
        }

        .position-item.loss {
            border-left-color: #dc3545;
        }

        .event-item.strong {
            border-left-color: #ffc107;
        }

        .event-item.confirmed {
            border-left-color: #17a2b8;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .item-title {
            font-weight: 600;
            color: #2a5298;
        }

        .item-meta {
            font-size: 0.85rem;
            color: #6c757d;
        }

        .item-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            font-size: 0.9rem;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
        }

        .detail-label {
            font-weight: 500;
            color: #495057;
        }

        .detail-value {
            color: #2a5298;
            font-weight: 600;
        }

        .pnl-positive {
            color: #28a745;
        }

        .pnl-negative {
            color: #dc3545;
        }

        .refresh-btn {
            background: #2a5298;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background-color 0.3s ease;
        }

        .refresh-btn:hover {
            background: #1e3c72;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #6c757d;
        }

        .error {
            color: #dc3545;
            text-align: center;
            padding: 20px;
        }

        .rss-link {
            color: #2a5298;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .rss-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Space Trading Station Dashboard</h1>
            <p>Real-time trading information and strategy events</p>
        </div>

        <div class="dashboard-grid">
            <!-- Portfolio Summary Card -->
            <div class="card portfolio-summary">
                <div class="card-header">
                    <div class="card-title">📊 Portfolio Summary</div>
                    <div class="card-icon">💰</div>
                </div>
                <div id="portfolio-content">
                    <div class="loading">Loading portfolio data...</div>
                </div>
            </div>

            <!-- Recent Trades Card -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">📈 Recent Trades</div>
                    <div class="card-icon">🔄</div>
                </div>
                <div id="trades-content">
                    <div class="loading">Loading trades...</div>
                </div>
                <div style="text-align: center; margin-top: 15px;">
                    <a href="/dashboard/rss/trades" class="rss-link" target="_blank">📡 RSS Feed</a>
                </div>
            </div>

            <!-- Active Positions Card -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">📋 Active Positions</div>
                    <div class="card-icon">📊</div>
                </div>
                <div id="positions-content">
                    <div class="loading">Loading positions...</div>
                </div>
                <div style="text-align: center; margin-top: 15px;">
                    <a href="/dashboard/rss/positions" class="rss-link" target="_blank">📡 RSS Feed</a>
                </div>
            </div>

            <!-- Strategy Events Card -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">🎯 Strategy Events</div>
                    <div class="card-icon">⚡</div>
                </div>
                <div id="events-content">
                    <div class="loading">Loading events...</div>
                </div>
                <div style="text-align: center; margin-top: 15px;">
                    <a href="/dashboard/rss/strategy-events" class="rss-link" target="_blank">📡 RSS Feed</a>
                </div>
            </div>
        </div>

        <div style="text-align: center; margin-top: 30px;">
            <button class="refresh-btn" onclick="refreshAll()">🔄 Refresh All Data</button>
        </div>
    </div>

    <script>
        // Global variables
        let refreshInterval;

        // Initialize dashboard
        document.addEventListener('DOMContentLoaded', function() {
            loadAllData();
            // Auto-refresh every 30 seconds
            refreshInterval = setInterval(loadAllData, 30000);
        });

        // Load all dashboard data
        async function loadAllData() {
            await Promise.all([
                loadPortfolioSummary(),
                loadRecentTrades(),
                loadActivePositions(),
                loadStrategyEvents()
            ]);
        }

        // Load portfolio summary
        async function loadPortfolioSummary() {
            try {
                const response = await fetch('/dashboard/portfolio/summary');
                if (!response.ok) throw new Error('Failed to load portfolio data');
                
                const data = await response.json();
                displayPortfolioSummary(data);
            } catch (error) {
                document.getElementById('portfolio-content').innerHTML = 
                    `<div class="error">Error loading portfolio data: ${error.message}</div>`;
            }
        }

        // Display portfolio summary
        function displayPortfolioSummary(data) {
            const content = document.getElementById('portfolio-content');
            
            const statsHtml = `
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-value">$${data.total_value.toLocaleString()}</div>
                        <div class="stat-label">Total Value</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value ${data.total_pnl >= 0 ? 'pnl-positive' : 'pnl-negative'}">
                            ${data.total_pnl >= 0 ? '+' : ''}$${data.total_pnl.toLocaleString()}
                        </div>
                        <div class="stat-label">Total P&L</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value ${data.total_pnl_percentage >= 0 ? 'pnl-positive' : 'pnl-negative'}">
                            ${data.total_pnl_percentage >= 0 ? '+' : ''}${data.total_pnl_percentage.toFixed(2)}%
                        </div>
                        <div class="stat-label">P&L %</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${data.num_positions}</div>
                        <div class="stat-label">Active Positions</div>
                    </div>
                </div>
            `;

            const positionsHtml = data.positions.length > 0 ? 
                data.positions.map(pos => `
                    <div class="position-item ${pos.unrealized_pnl >= 0 ? 'profit' : 'loss'}">
                        <div class="item-header">
                            <div class="item-title">${pos.symbol}</div>
                            <div class="item-meta">${pos.strategy}</div>
                        </div>
                        <div class="item-details">
                            <div class="detail-item">
                                <span class="detail-label">Quantity:</span>
                                <span class="detail-value">${pos.quantity}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Avg Price:</span>
                                <span class="detail-value">$${pos.avg_price.toFixed(2)}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Current Price:</span>
                                <span class="detail-value">$${pos.current_price.toFixed(2)}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">P&L:</span>
                                <span class="detail-value ${pos.unrealized_pnl >= 0 ? 'pnl-positive' : 'pnl-negative'}">
                                    ${pos.unrealized_pnl >= 0 ? '+' : ''}$${pos.unrealized_pnl.toFixed(2)} (${pos.unrealized_pnl_percent.toFixed(2)}%)
                                </span>
                            </div>
                        </div>
                    </div>
                `).join('') : '<div class="loading">No active positions</div>';

            content.innerHTML = statsHtml + positionsHtml;
        }

        // Load recent trades
        async function loadRecentTrades() {
            try {
                const response = await fetch('/dashboard/rss/trades');
                if (!response.ok) throw new Error('Failed to load trades');
                
                const xmlText = await response.text();
                const trades = parseRSSFeed(xmlText);
                displayRecentTrades(trades);
            } catch (error) {
                document.getElementById('trades-content').innerHTML = 
                    `<div class="error">Error loading trades: ${error.message}</div>`;
            }
        }

        // Display recent trades
        function displayRecentTrades(trades) {
            const content = document.getElementById('trades-content');
            
            if (trades.length === 0) {
                content.innerHTML = `
                    <div class="loading">
                        <h3>📊 No Recent Trades</h3>
                        <p>No trading activity detected.</p>
                        <p><strong>Possible reasons:</strong></p>
                        <ul style="text-align: left; margin: 10px 0;">
                            <li>No backtest runs have been completed</li>
                            <li>Strategies are in observation mode</li>
                            <li>Market conditions are unfavorable</li>
                            <li>Risk management is preventing trades</li>
                        </ul>
                    </div>
                `;
                return;
            }

            const tradesHtml = trades.slice(0, 10).map(trade => {
                const isBuy = trade.title.includes('🟢') || trade.title.includes('BUY');
                const isSell = trade.title.includes('🔴') || trade.title.includes('SELL');
                const action = isBuy ? 'BUY' : isSell ? 'SELL' : 'UNKNOWN';
                const actionClass = isBuy ? 'buy' : isSell ? 'sell' : '';
                const actionIcon = isBuy ? '🟢' : isSell ? '🔴' : '❓';
                
                // Extract symbol from title
                const symbolMatch = trade.title.match(/([A-Z]{1,5})/);
                const symbol = symbolMatch ? symbolMatch[1] : 'UNKNOWN';
                
                return `
                    <div class="trade-item ${actionClass}">
                        <div class="item-header">
                            <div class="item-title">${actionIcon} ${action} ${symbol}</div>
                            <div class="item-meta">${new Date(trade.pubDate).toLocaleString()}</div>
                        </div>
                        <div class="item-details">
                            <div class="detail-item">
                                <span class="detail-label">Security:</span>
                                <span class="detail-value">${symbol}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Action:</span>
                                <span class="detail-value">${actionIcon} ${action}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Strategy:</span>
                                <span class="detail-value">${trade.strategy || 'N/A'}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            content.innerHTML = tradesHtml;
        }

        // Load active positions
        async function loadActivePositions() {
            try {
                const response = await fetch('/dashboard/rss/positions');
                if (!response.ok) throw new Error('Failed to load positions');
                
                const xmlText = await response.text();
                const positions = parseRSSFeed(xmlText);
                displayActivePositions(positions);
            } catch (error) {
                document.getElementById('positions-content').innerHTML = 
                    `<div class="error">Error loading positions: ${error.message}</div>`;
            }
        }

        // Display active positions
        function displayActivePositions(positions) {
            const content = document.getElementById('positions-content');
            
            if (positions.length === 0) {
                content.innerHTML = '<div class="loading">No active positions</div>';
                return;
            }

            const positionsHtml = positions.map(position => {
                const isProfit = position.title.includes('P&L: +');
                const positionClass = isProfit ? 'profit' : 'loss';
                
                return `
                    <div class="position-item ${positionClass}">
                        <div class="item-header">
                            <div class="item-title">${position.title}</div>
                            <div class="item-meta">${new Date(position.pubDate).toLocaleString()}</div>
                        </div>
                        <div class="item-details">
                            <div class="detail-item">
                                <span class="detail-label">Strategy:</span>
                                <span class="detail-value">${position.strategy || 'N/A'}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            content.innerHTML = positionsHtml;
        }

        // Load strategy events
        async function loadStrategyEvents() {
            try {
                const response = await fetch('/dashboard/rss/strategy-events');
                if (!response.ok) throw new Error('Failed to load events');
                
                const xmlText = await response.text();
                const events = parseRSSFeed(xmlText);
                displayStrategyEvents(events);
            } catch (error) {
                document.getElementById('events-content').innerHTML = 
                    `<div class="error">Error loading events: ${error.message}</div>`;
            }
        }

        // Display strategy events
        function displayStrategyEvents(events) {
            const content = document.getElementById('events-content');
            
            if (events.length === 0) {
                content.innerHTML = `
                    <div class="loading">
                        <h3>📊 No Recent Strategy Events</h3>
                        <p>No high-confidence trading signals detected.</p>
                        <p><strong>Possible reasons:</strong></p>
                        <ul style="text-align: left; margin: 10px 0;">
                            <li>Markets are in a neutral state</li>
                            <li>Strategies are waiting for better opportunities</li>
                            <li>Risk management is preventing low-confidence trades</li>
                            <li>Recent backtest data is being processed</li>
                        </ul>
                    </div>
                `;
                return;
            }

            const eventsHtml = events.slice(0, 10).map(event => {
                let eventClass = 'event-item';
                let eventIcon = '📊';
                
                if (event.title.includes('🔥 STRONG_SIGNAL')) {
                    eventClass += ' strong';
                    eventIcon = '🔥';
                } else if (event.title.includes('✅ CONFIRMED_SIGNAL')) {
                    eventClass += ' confirmed';
                    eventIcon = '✅';
                } else if (event.title.includes('📈 TRADE_EXECUTED')) {
                    eventIcon = '📈';
                }
                
                return `
                    <div class="${eventClass}">
                        <div class="item-header">
                            <div class="item-title">${eventIcon} ${event.title}</div>
                            <div class="item-meta">${new Date(event.pubDate).toLocaleString()}</div>
                        </div>
                        <div class="item-details">
                            <div class="detail-item">
                                <span class="detail-label">Strategy:</span>
                                <span class="detail-value">${event.strategy || 'N/A'}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            content.innerHTML = eventsHtml;
        }

        // Parse RSS feed XML
        function parseRSSFeed(xmlText) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlText, 'text/xml');
            const items = xmlDoc.getElementsByTagName('item');
            
            const results = [];
            for (let item of items) {
                const title = item.getElementsByTagName('title')[0]?.textContent || '';
                const pubDate = item.getElementsByTagName('pubDate')[0]?.textContent || '';
                const description = item.getElementsByTagName('description')[0]?.textContent || '';
                
                // Extract strategy from description if available
                const strategyMatch = description.match(/Strategy: ([^<]+)/);
                const strategy = strategyMatch ? strategyMatch[1].trim() : '';
                
                results.push({
                    title,
                    pubDate,
                    description,
                    strategy
                });
            }
            
            return results;
        }

        // Refresh all data
        function refreshAll() {
            loadAllData();
        }

        // Cleanup on page unload
        window.addEventListener('beforeunload', function() {
            if (refreshInterval) {
                clearInterval(refreshInterval);
            }
        });
    </script>
</body>
</html>
