events {
    worker_connections 1024;
}

http {
    upstream trading_service {
        server trading-service:8000;
    }

    upstream market_data_service {
        server market-data-service:8000;
    }

    upstream portfolio_service {
        server portfolio-service:8000;
    }

    upstream analytics_service {
        server analytics-service:8000;
    }

    upstream command_api {
        server command-api:8000;
    }

    upstream query_api {
        server query-api:8000;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    server {
        listen 8000;
        server_name localhost;

        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Command API routes
        location /api/v1/commands/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://command_api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Query API routes
        location /api/v1/queries/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://query_api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Trading service routes
        location /api/v1/trading/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://trading_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Market data routes
        location /api/v1/market-data/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://market_data_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Portfolio routes
        location /api/v1/portfolio/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://portfolio_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Analytics routes
        location /api/v1/analytics/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://analytics_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Default route
        location / {
            return 404;
        }
    }
} 