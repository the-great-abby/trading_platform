backtesting:
  enabled: true
  min_backtest_period_days: 30
  min_success_rate: 0.6
  service_url: http://backtest-api.trading-system.svc.cluster.local:10001
  test_strategies_before_live: true
portfolio:
  initial_capital: 4000.0
  max_daily_loss: 250.0
  max_daily_trades: 25
  max_monthly_trades: 150
  max_single_symbol: 0.18
  max_total_exposure: 0.95
  min_cash_reserve: 0.05
strategies:
  MultiStrategyEnsemble:
    enabled: true
    name: MultiStrategyEnsemble
    strategy_weights:
      adaptive_wave: 0.4
      regime_switching: 0.25
      enhanced_multi: 0.25
      momentum: 0.1
    adaptive_wave:
      elliott_wave_min_confidence: 0.05
      ichimoku_min_confidence: 0.05
      enable_ichimoku: true
      max_position_size_pct: 0.12
      max_daily_loss_pct: 0.025
      volatility_adjustment: true
      correlation_limit: 0.7
      day_trading_enabled: true
      swing_trading_enabled: true
    regime_switching:
      lookback_period: 100
      regime_confidence_threshold: 0.8
      min_regime_duration: 25
    enhanced_multi:
      entry_confidence_threshold: 0.6
      momentum_exit_threshold: 0.015
      volatility_exit_threshold: 0.025
      max_position_duration_days: 21
      min_profit_target: 0.03
      max_loss_stop: 0.02
      max_concurrent_positions: 2
      position_size_pct: 0.03
    momentum:
      lookback_period: 60
      momentum_periods:
      - 20
      - 60
      - 120
      top_percentile: 0.15
      bottom_percentile: 0.15
      rebalance_frequency: 25
      max_position_size: 0.05
      volatility_adjustment: true
    performance_window: 30
    rebalance_frequency: 15
    max_total_exposure: 0.8
    correlation_threshold: 0.6
    asset_allocation:
      stock_allocation_pct: 0.20
      options_allocation_pct: 0.75
      cash_reserve_pct: 0.05
market_regime_detection:
  enabled: true
  vix_thresholds:
    low_fear: 12.0
    high_fear: 25.0
  position_multipliers:
    low_fear: 1.3
    normal_fear: 1.0
    high_fear: 0.7
options_strategies:
  enabled: true
  base_premium_multiplier: 0.03
  volatility_multiplier: 0.3
  strategy_costs:
    iron_condor: 80
    calendar_spread: 120
    butterfly_spread: 150
    strangle: 300
    straddle: 400
  max_contracts_per_trade: 2
symbols:
  primary:
  - SPY
  - AAPL
  secondary:
  - NVDA
trading_limits:
  max_daily_trades: 4
  max_weekly_trades: 10
  max_monthly_trades: 20
  trading_frequency_penalty: true
cost_controls:
  enabled: true
  trading_costs:
    commission_per_contract: 0.65
    commission_per_trade: 0.0
    options_rebate_per_contract: 0.06
    max_contracts_per_trade: 2
    slippage: 0.0005
    spread_cost: 0.002
    extended_hours_fee: 2.99
    premium_membership_cost: 10.0
    inactivity_fee: 3.99
    account_maintenance_fee: 5.0
risk_management:
  enabled: true
  max_daily_loss: 100.0
  max_position_size: 800.0
  max_concentration: 0.2
  max_correlation: 0.6
  var_confidence_level: 0.95
  var_time_horizon: 1
  stress_test_enabled: true
  scenario_analysis_enabled: true
  circuit_breaker_enabled: true
  circuit_breaker_threshold: 0.05
monitoring:
  enabled: true
  performance_targets:
    annual_return_target: 1.0
    max_drawdown_limit: 0.05
    sharpe_ratio_target: 1.5
    win_rate_target: 0.7
  alerts:
    performance_alerts: true
    drawdown_alerts: true
    cost_alerts: true
    quality_alerts: true
    risk_alerts: true
    position_alerts: true
    correlation_alerts: true
  real_time_monitoring: true
  automated_stop_loss: true
  position_sizing_alerts: true
data_sources:
  primary: polygon
  backup: alpaca
  historical_days: 365
  real_time_enabled: true
  market_data_validation: true
execution:
  trading_interval: 30
  market_hours_only: true
  extended_hours: false
  real_time_data: true
  process_every_data_point: true
  max_data_points_per_day: 78
  data_point_buffer_size: 500
  parallel_processing: true
  disable_engine_stop_loss: true
  disable_engine_take_profit: true
  day_trading_execution:
    enabled: true
    interval_minutes: 5
    max_trades_per_session: 10
    quick_exit_enabled: true
  swing_trading_execution:
    enabled: true
    interval_minutes: 120
    max_trades_per_day: 5
    patient_exit_enabled: true
compliance:
  enabled: true
  wash_sale_rule: true
  pattern_day_trader_protection: true
  position_limit_monitoring: true
  trade_reporting: true
  audit_trail: true
backup:
  enabled: true
  trade_history_backup: true
  position_backup: true
  configuration_backup: true
  disaster_recovery: true
asset_allocation:
  enabled: true
  cash_reserve_pct: 0.05  # 5% cash reserve (PREVIOUS WORKING CALCULATION)
  stock_allocation_pct: 0.20  # 20% stocks (PREVIOUS WORKING CALCULATION)
  options_allocation_pct: 0.75  # 75% options (PREVIOUS WORKING CALCULATION)
  options_day_trading_pct: 0.333  # 33.3% of options for day trading (25% total)
  options_swing_trading_pct: 0.667  # 66.7% of options for swing trading (50% total)
  day_trading_time_window_minutes: 15
  swing_trading_time_window_days: 1
  max_stock_position_pct: 0.20  # 20% max position size (PREVIOUS WORKING CALCULATION)
  max_options_day_position_pct: 0.20  # 20% max options position (PREVIOUS WORKING CALCULATION)
  max_options_swing_position_pct: 0.20
trading_frequency:
  day_trading:
    enabled: true
    interval_minutes: 5
    max_daily_trades: 15
    max_position_duration_hours: 6
    symbols:
    - SPY
    - QQQ
    - NVDA
    strategies:
    - AdaptiveSectorWaveStrategy
    allocation_pct: 0.25
  swing_trading:
    enabled: true
    interval_minutes: 10
    max_daily_trades: 5
    max_position_duration_days: 5
    symbols:
    - SPY
    - AAPL
    - NVDA
    strategies:
    - MultiStrategyEnsemble
    allocation_pct: 0.50
