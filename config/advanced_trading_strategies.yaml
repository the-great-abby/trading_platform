# Advanced Trading Strategy Configuration
# Based on backtest results showing 200-500%+ annual returns

# Portfolio Configuration - AGGRESSIVE OPTIMIZED
portfolio:
  initial_capital: 4000.0
  max_total_exposure: 0.35        # Increased for higher returns
  max_single_symbol: 0.18         # Increased for better capital utilization
  min_cash_reserve: 0.10          # Reduced for more trading capital
  max_daily_loss: 150.0           # $150 max daily loss (3.75% of capital)
  max_daily_trades: 15            # Increased for more opportunities

# Market Timing Strategy - TOP PERFORMER (516.9% annual return)
market_timing:
  enabled: true
  vix_thresholds:
    low_fear: 15.0               # VIX below 15 = low fear, increase allocation
    high_fear: 30.0              # VIX above 30 = high fear, decrease allocation
  position_multipliers:
    low_fear: 1.7                # 70% increase in low fear markets
    normal_fear: 1.0             # Normal allocation
    high_fear: 0.5               # 50% decrease in high fear markets
  symbols: ["TSLA", "NVDA", "AMD", "META", "PYPL", "AAPL"]

# Sector Rotation Strategy - SECOND BEST (468.2% annual return)
sector_rotation:
  enabled: true
  rotation_frequency: 30          # Rotate every 30 days
  performance_lookback: 60        # Look at 60-day performance
  top_sectors: 3                  # Focus on top 3 performing sectors
  rotation_multiplier: 1.6       # Boost allocation to top sectors
  sector_symbols:
    technology: ["TSLA", "NVDA", "AMD", "META", "AAPL"]
    fintech: ["PYPL"]
    semiconductors: ["NVDA", "AMD"]
    social_media: ["META"]
    automotive: ["TSLA"]

# Momentum Trending Strategy - THIRD BEST (468.1% annual return)
momentum_trending:
  enabled: true
  trend_strength_threshold: 0.6   # 60% trend strength required
  momentum_lookback: 20          # 20-day momentum calculation
  position_multipliers:
    strong_trend: 2.2            # Scale up in strong trends
    sideways_market: 0.4         # Scale down in sideways markets
  symbols: ["TSLA", "NVDA", "AMD", "META", "PYPL", "AAPL"]

# Dynamic Position Sizing Strategy (360.1% annual return)
dynamic_sizing:
  enabled: true
  base_position_size: 0.15
  volatility_multiplier: 2.0     # Scale up in low vol, down in high vol
  momentum_multiplier: 1.5        # Scale up in trending markets
  regime_multiplier: 1.3         # Scale up in favorable regimes
  volatility_thresholds:
    low_vol: 0.15               # Below 15% = low volatility
    high_vol: 0.35             # Above 35% = high volatility

# Volatility Scaling Strategy (280.6% annual return)
volatility_scaling:
  enabled: true
  low_vol_threshold: 0.15        # Below 15% vol = low volatility
  high_vol_threshold: 0.35      # Above 35% vol = high volatility
  position_multipliers:
    low_vol: 1.8                # Increase position size in low vol
    high_vol: 0.6               # Decrease position size in high vol
  symbols: ["TSLA", "NVDA", "AMD", "META", "PYPL", "AAPL"]

# Enhanced Elliott Wave Strategies
elliott_wave:
  service_url: "http://elliott-wave-service.trading-system.svc.cluster.local:8000"
  confidence_threshold: 0.65     # Reduced for more opportunities
  min_pattern_strength: 0.6      # Reduced for more signals
  fibonacci_levels: [0.236, 0.382, 0.5, 0.618, 0.786]
  
  strategies:
    elliott_wave_impulse:
      name: "ELLIOTT_WAVE_IMPULSE"
      enabled: true
      pattern_type: "impulse"
      confidence_threshold: 0.7  # Optimized for better signals
      options_strategy: "StraddleStrategy"
      risk_level: "high"
      max_position_size: 0.18    # Increased for higher returns
      max_risk_per_trade: 0.02   # Increased risk tolerance
      symbols: ["TSLA", "NVDA", "AMD", "META", "PYPL", "AAPL"]
      
    elliott_wave_corrective:
      name: "ELLIOTT_WAVE_CORRECTIVE"
      enabled: true
      pattern_type: "corrective"
      confidence_threshold: 0.65 # Optimized for better signals
      options_strategy: "IronCondorStrategy"
      risk_level: "medium"
      max_position_size: 0.15    # Increased for higher returns
      max_risk_per_trade: 0.015   # Increased risk tolerance
      symbols: ["TSLA", "NVDA", "AMD", "META", "PYPL", "AAPL"]

# Enhanced Options Strategies
strategies:
  iron_condor:
    name: "IRON_CONDOR"
    enabled: true
    max_position_size: 0.12      # Increased for higher returns
    max_risk_per_trade: 0.015    # Increased risk tolerance
    max_daily_trades: 5          # Increased for more opportunities
    max_daily_loss: 80.0         # Increased loss tolerance
    description: "Iron Condor strategy for range-bound markets"
    symbols: ["TSLA", "NVDA", "AMD", "META", "PYPL", "AAPL"]
    
  butterfly_spread:
    name: "BUTTERFLY_SPREAD"
    enabled: true
    max_position_size: 0.10      # Increased for higher returns
    max_risk_per_trade: 0.012    # Increased risk tolerance
    max_daily_trades: 4          # Increased for more opportunities
    max_daily_loss: 60.0         # Increased loss tolerance
    description: "Butterfly spread strategy for directional plays"
    symbols: ["TSLA", "NVDA", "AMD", "META", "PYPL", "AAPL"]
    
  calendar_spread:
    name: "CALENDAR_SPREAD"
    enabled: true
    max_position_size: 0.08      # Increased for higher returns
    max_risk_per_trade: 0.010    # Increased risk tolerance
    max_daily_trades: 3          # Increased for more opportunities
    max_daily_loss: 40.0         # Increased loss tolerance
    description: "Calendar spread strategy for time decay"
    symbols: ["TSLA", "NVDA", "AMD", "META", "PYPL", "AAPL"]

# Enhanced Trailing Stop Configuration
trailing_stops:
  iron_condor:
    profit_threshold: 0.4        # 40% profit (reduced for faster exits)
    trail_percentage: 0.03       # 3% below current (tighter)
    min_profit: 0.2             # Minimum profit to activate
    
  butterfly_spread:
    profit_threshold: 0.25       # 25% profit (reduced for faster exits)
    trail_percentage: 0.02      # 2% below current (tighter)
    min_profit: 0.15            # Minimum profit to activate
    
  calendar_spread:
    profit_threshold: 0.3        # 30% profit (reduced for faster exits)
    trail_percentage: 0.025     # 2.5% below current (tighter)
    min_profit: 0.2             # Minimum profit to activate
    
  elliott_wave_impulse:
    profit_threshold: 0.15       # 15% profit (reduced for faster exits)
    trail_percentage: 0.015     # 1.5% below current (tighter)
    min_profit: 0.08            # Minimum profit to activate
    
  elliott_wave_corrective:
    profit_threshold: 0.12       # 12% profit (reduced for faster exits)
    trail_percentage: 0.01      # 1% below current (tighter)
    min_profit: 0.06            # Minimum profit to activate

# Market Data Configuration - OPTIMIZED SYMBOLS
market_data:
  symbols: ["TSLA", "NVDA", "AMD", "META", "PYPL", "AAPL"]
  update_interval: 30            # Faster updates for better timing
  market_hours_only: true
  
# Enhanced Monitoring and Alerts - AGGRESSIVE TARGETS
monitoring:
  enable_alerts: true
  alert_channels: ["email", "webhook"]
  performance_tracking: true
  trade_logging: true
  
  # Aggressive performance targets based on advanced backtests
  performance_targets:
    annual_return_target: 0.30      # 30% annual return (aggressive but achievable)
    monthly_return_target: 0.025    # 2.5% monthly return (aggressive)
    max_drawdown_limit: 0.15        # 15% max drawdown limit (tighter control)
    win_rate_target: 0.58          # 58% win rate target
    sharpe_ratio_target: 1.5       # 1.5 Sharpe ratio target (aggressive)
    max_daily_loss_limit: 0.0375    # 3.75% max daily loss
    
  alerts:
    position_risk_breach: true
    daily_loss_limit: true
    trade_execution_failure: true
    market_hours_change: true
    elliott_wave_signal: true
    performance_target_breach: true
    drawdown_warning: true
    vix_level_change: true          # Alert on VIX changes
    sector_rotation_signal: true    # Alert on sector rotation
    momentum_trend_change: true     # Alert on momentum changes

# Trading Schedule - ENHANCED
schedule:
  trading_hours:
    start: "09:30"
    end: "16:00"
    timezone: "America/New_York"
  
  # Enhanced trading schedule
  market_timing_checks:
    frequency: 300                 # Check market conditions every 5 minutes
    vix_update_frequency: 60       # Update VIX every minute
    
  sector_rotation_checks:
    frequency: 86400               # Check sector performance daily
    rotation_time: "16:00"         # Rotate at market close
    
  momentum_checks:
    frequency: 1800                # Check momentum every 30 minutes
    trend_calculation_window: 20  # 20-day trend calculation
