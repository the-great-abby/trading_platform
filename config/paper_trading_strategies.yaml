# Multi-Strategy Ensemble Paper Trading Configuration
# Based on 1,100.88% backtest performance
# Target: Transfer winning configuration to paper trading

backtesting:
  enabled: true
  min_backtest_period_days: 30
  min_success_rate: 0.6
  service_url: http://backtest-api.trading-system.svc.cluster.local:10001
  test_strategies_before_live: true

# AGGRESSIVE CAPITAL ALLOCATION (from 1,100.88% backtest)
portfolio:
  initial_capital: 4000.0  # Match backtest starting capital
  max_daily_loss: 200.0   # 5% of $4k capital
  max_daily_trades: 8      # Increased for more opportunities
  max_monthly_trades: 20   # Increased for more opportunities
  max_single_symbol: 0.25  # 25% max position size (AGGRESSIVE)
  max_total_exposure: 0.95 # 95% deployment (AGGRESSIVE)
  min_cash_reserve: 0.05   # Only 5% cash reserve (AGGRESSIVE)

# WINNING STRATEGY CONFIGURATION
strategies:
  MultiStrategyEnsemble:
    enabled: true
    name: "MultiStrategyEnsemble"
    
    # Strategy weights (from 1,100.88% backtest)
    strategy_weights:
      adaptive_wave: 0.35      # 35% - Elliott Wave + Options
      regime_switching: 0.25   # 25% - Market timing
      enhanced_multi: 0.25     # 25% - Sector rotation
      momentum: 0.15           # 15% - Cross-sectional momentum
    
    # Component strategy settings
    adaptive_wave:
      elliott_wave_min_confidence: 0.05  # Lowered for more trades
      ichimoku_min_confidence: 0.05      # Lowered for more trades
      enable_ichimoku: true
      max_position_size_pct: 0.05        # 5% per position
      max_daily_loss_pct: 0.02          # 2% max daily loss
      volatility_adjustment: true
      correlation_limit: 0.7
    
    regime_switching:
      lookback_period: 100
      regime_confidence_threshold: 0.7
      min_regime_duration: 20
    
    enhanced_multi:
      entry_confidence_threshold: 0.5
      momentum_exit_threshold: 0.02
      volatility_exit_threshold: 0.03
      max_position_duration_days: 30
      min_profit_target: 0.05
      max_loss_stop: 0.03
      max_concurrent_positions: 3
      position_size_pct: 0.05
    
    momentum:
      lookback_period: 60
      momentum_periods: [20, 60, 120]
      top_percentile: 0.2
      bottom_percentile: 0.2
      rebalance_frequency: 20
      max_position_size: 0.1
      volatility_adjustment: true
    
    # Performance tracking
    performance_window: 50
    rebalance_frequency: 10
    max_total_exposure: 0.95
    correlation_threshold: 0.7

# MARKET REGIME DETECTION (from 1,100.88% backtest)
market_regime_detection:
  enabled: true
  vix_thresholds:
    low_fear: 15.0      # VIX below 15 = low fear
    high_fear: 30.0     # VIX above 30 = high fear
  position_multipliers:
    low_fear: 1.7       # 70% increase in low fear markets
    normal_fear: 1.0    # Normal allocation
    high_fear: 0.5      # 50% decrease in high fear markets

# OPTIONS STRATEGY SELECTION (from 1,100.88% backtest)
options_strategies:
  enabled: true
  base_premium_multiplier: 0.05  # 5% of underlying price as base premium
  volatility_multiplier: 0.5     # Volatility impact on pricing
  strategy_costs:
    iron_condor: 100      # ~$100 per contract (cheapest)
    calendar_spread: 150  # ~$150 per contract  
    butterfly_spread: 200 # ~$200 per contract
    strangle: 400         # ~$400 per contract
    straddle: 500         # ~$500 per contract (most expensive)

# SYMBOLS (from 1,100.88% backtest)
symbols:
  primary: ['SPY', 'AAPL', 'NVDA']  # Proven high performers
  secondary: ['QQQ', 'TSLA', 'META', 'GOOG']  # Additional opportunities

# TRADING LIMITS (AGGRESSIVE)
trading_limits:
  max_daily_trades: 8      # Increased for more opportunities
  max_weekly_trades: 20    # Increased for more opportunities
  max_monthly_trades: 60   # Increased for more opportunities
  trading_frequency_penalty: false  # Disabled for aggressive trading

# COST CONTROLS
cost_controls:
  enabled: true
  trading_costs:
    commission_per_contract: 0.0
    commission_per_trade: 0.0
    options_rebate_per_contract: 0.06
    max_contracts_per_trade: 5      # Increased from 3
    slippage: 0.0003
    spread_cost: 0.001

# MONITORING & ALERTS
monitoring:
  enabled: true
  performance_targets:
    annual_return_target: 3.0      # 300% annual target (conservative vs 1,100%)
    max_drawdown_limit: 0.10       # 10% max drawdown (conservative vs 0%)
    sharpe_ratio_target: 2.0       # 2.0 Sharpe ratio target
    win_rate_target: 0.80          # 80% win rate target (conservative vs 100%)
  alerts:
    performance_alerts: true
    drawdown_alerts: true
    cost_alerts: true
    quality_alerts: true

# DATA SOURCES
data_sources:
  primary: "polygon"      # Use Polygon API for real data
  backup: "mock"         # Fallback to mock data if needed
  historical_days: 365   # 1 year of historical data

# EXECUTION SETTINGS
execution:
  trading_interval: 1800  # 30 minutes between checks
  market_hours_only: true
  extended_hours: false
  real_time_data: true
