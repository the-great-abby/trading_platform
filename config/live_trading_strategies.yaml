backtesting:
  enabled: true
  min_backtest_period_days: 30
  min_success_rate: 0.6
  service_url: http://backtest-api.trading-system.svc.cluster.local:10001
  test_strategies_before_live: true
portfolio:
  initial_capital: 4000.0
  max_daily_loss: 150.0
  max_daily_trades: 10
  max_monthly_trades: 75
  max_single_symbol: 0.2
  max_total_exposure: 0.85
  min_cash_reserve: 0.15
strategies:
  MultiStrategyEnsemble:
    enabled: true
    name: MultiStrategyEnsemble
    strategy_weights:
      adaptive_wave: 0.30
      regime_switching: 0.20
      enhanced_multi: 0.20
      momentum: 0.15
      zero_dte: 0.15
    adaptive_wave:
      elliott_wave_min_confidence: 0.05
      ichimoku_min_confidence: 0.05
      max_position_size_pct: 0.05
      max_daily_loss_pct: 0.02
      disable_engine_stop_loss: true
      disable_engine_take_profit: true
    zero_dte:
      enabled: true
      # Use credit spreads instead of naked calls
      strategy_type: "credit_spread"  # Options: "covered_call", "credit_spread"
      spread_width: 5.0  # $5 width for spreads
      
      # Delta targeting for SHORT leg
      delta_lo: 0.15
      delta_hi: 0.35
      
      # OTM percentage for SHORT leg
      min_otm_pct: 0.00
      max_otm_pct: 0.03
      
      # Quality filters
      min_bid: 0.05
      min_open_interest: 1
      max_spread_to_mid: 0.75
      min_pop: 0.55  # Minimum 55% probability of profit
      
      # Position limits
      max_contracts_per_trade: 2
      min_credit: 0.10  # Minimum $0.10 credit per spread
      max_risk_per_spread: 500  # Max $500 risk per spread
      
      # Trading hours (market hours only)
      market_hours_only: true
      trading_start_hour: 9
      trading_start_minute: 45
      trading_end_hour: 15
      trading_end_minute: 45
    market_regime_detection:
      enabled: true
      position_multipliers:
        low_fear: 1.3
        normal_fear: 1.0
        high_fear: 0.7
market_regime_detection:
  enabled: true
  vix_thresholds:
    low_fear: 12.0
    high_fear: 25.0
  position_multipliers:
    low_fear: 1.3
    normal_fear: 1.0
    high_fear: 0.7
options_strategies:
  enabled: true
  base_premium_multiplier: 0.03
  volatility_multiplier: 0.3
  strategy_costs:
    iron_condor: 80
    calendar_spread: 120
    butterfly_spread: 150
    strangle: 300
    straddle: 400
  max_contracts_per_trade: 2
symbols:
  primary:
  - SPY
  - NVDA
  - AAPL
  - QQQ
  secondary:
  - TSLA
  - GOOGL
  - AMD
  - META
trading_limits:
  max_daily_trades: 10
  max_weekly_trades: 25
  max_monthly_trades: 75
  trading_frequency_penalty: false
cost_controls:
  enabled: true
  trading_costs:
    commission_per_contract: 0.65
    commission_per_trade: 0.0
    options_rebate_per_contract: 0.06
    max_contracts_per_trade: 2
    slippage: 0.0005
    spread_cost: 0.002
    extended_hours_fee: 2.99
    premium_membership_cost: 10.0
    inactivity_fee: 3.99
    account_maintenance_fee: 5.0
risk_management:
  enabled: true
  max_daily_loss: 100.0
  max_position_size: 800.0
  max_concentration: 0.2
  max_correlation: 0.6
  var_confidence_level: 0.95
  var_time_horizon: 1
  stress_test_enabled: true
  scenario_analysis_enabled: true
  circuit_breaker_enabled: true
  circuit_breaker_threshold: 0.08
monitoring:
  enabled: true
  performance_targets:
    annual_return_target: 1.0
    max_drawdown_limit: 0.08
    sharpe_ratio_target: 1.5
    win_rate_target: 0.7
  alerts:
    performance_alerts: true
    drawdown_alerts: true
    cost_alerts: true
    quality_alerts: true
    risk_alerts: true
    position_alerts: true
    correlation_alerts: true
  real_time_monitoring: true
  automated_stop_loss: true
  position_sizing_alerts: true
data_sources:
  primary: polygon
  backup: alpaca
  historical_days: 365
  real_time_enabled: true
  market_data_validation: true
execution:
  trading_interval: 1800
  market_hours_only: true
  extended_hours: false
  real_time_data: true
  order_validation: true
  position_sizing_validation: true
  risk_validation: true
  compliance_validation: true
  disable_engine_stop_loss: true
  disable_engine_take_profit: true
compliance:
  enabled: true
  wash_sale_rule: true
  pattern_day_trader_protection: true
  position_limit_monitoring: true
  trade_reporting: true
  audit_trail: true
backup:
  enabled: true
  trade_history_backup: true
  position_backup: true
  configuration_backup: true
  disaster_recovery: true
