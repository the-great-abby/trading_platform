    max_daily_trades: 3  # Increased from backtest success
    max_monthly_trades: 5  # Increased from backtest success
    max_position_size: 0.15  # Increased to match backtest
    max_risk_per_trade: 0.05  # Increased to match backtest
    name: ELLIOTT_WAVE_IMPULSE
    base_return: 0.10  # Increased from backtest success
    win_rate: 0.80  # Increased from backtest success
    confidence_threshold: 0.65  # Lowered to match backtest
    momentum_multiplier: 1.4
    regime_boost: 1.3
    news_delay_days: 3
    news_quality_threshold: 0.9
    news_impact_threshold: 0.85
    # Enhanced Elliott Wave settings
    pattern_types: ["impulse_completion", "wave_extension"]
    options_strategy: "STRADDLE"
    early_profit_target: 0.08
