# Secret Configuration Mapping
# This file defines how environment variables map to Kubernetes secrets

apiVersion: v1
kind: ConfigMap
metadata:
  name: secret-config
  namespace: default
data:
  # API Key Mappings
  # Each API key becomes its own secret
  api_keys: |
    POLYGON_API_KEY: polygon-api-key
    ALPHA_VANTAGE_API_KEY: alpha-vantage-api-key
    TWILIO_API_KEY: twilio-api-key
    SENDGRID_API_KEY: sendgrid-api-key
  
  # Database Credentials Mapping
  # All database variables are combined into a single secret
  database_vars: |
    DB_HOST: db-credentials
    DB_USERNAME: db-credentials
    DB_PASSWORD: db-credentials
    DB_NAME: db-credentials
    DB_PORT: db-credentials
    DB_SSL_MODE: db-credentials
  
  # Required Variables
  # These must be present in the .env file
  required_vars: |
    POLYGON_API_KEY
    DB_HOST
    DB_USERNAME
    DB_PASSWORD
    DB_NAME
  
  # Optional Variables
  optional_vars: |
    ALPHA_VANTAGE_API_KEY
    TWILIO_API_KEY
    SENDGRID_API_KEY
    DB_PORT
    DB_SSL_MODE
  
  # Validation Rules
  validation_rules: |
    # Environment variable naming pattern
    env_var_pattern: "^[A-Z][A-Z0-9_]*$"
    
    # Kubernetes secret naming pattern
    k8s_secret_pattern: "^[a-z0-9]([a-z0-9-]*[a-z0-9])?$"
    
    # Minimum length for secret values
    min_value_length: 1
    
    # Maximum length for secret values
    max_value_length: 1024













