global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'trading-services'
    static_configs:
      - targets: 
        - 'api-gateway:8000'
        - 'trading-service:8000'
        - 'market-data-service:8000'
        - 'portfolio-service:8000'
        - 'risk-service:8000'
        - 'strategy-service:8000'
        - 'order-service:8000'
        - 'analytics-service:8000'
        - 'user-service:8000'
        - 'public-api:8000'
    metrics_path: '/metrics'
    scrape_interval: 30s 