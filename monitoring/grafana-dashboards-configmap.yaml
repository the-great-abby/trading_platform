apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: trading-system
data:
  dashboard-provider.yaml: |
    apiVersion: 1
    providers:
      - name: 'Trading System Dashboards'
        orgId: 1
        folder: 'Trading System'
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /etc/grafana/provisioning/dashboards

  trading-system-overview.json: |
    {
      "title": "Trading System Overview",
      "tags": ["trading", "overview"],
      "style": "dark",
      "timezone": "browser",
      "panels": [
        {
          "id": 1,
          "title": "Active Positions",
          "type": "stat",
          "targets": [
            {
              "expr": "trading_active_positions",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "red", "value": 10}
                ]
              }
            }
          }
        },
        {
          "id": 2,
          "title": "Daily P&L",
          "type": "stat",
          "targets": [
            {
              "expr": "trading_daily_pnl",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "green", "value": 0}
                ]
              }
            }
          }
        },
        {
          "id": 3,
          "title": "Orders Created",
          "type": "stat",
          "targets": [
            {
              "expr": "trading_orders_created",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "Order Latency",
          "type": "graph",
          "targets": [
            {
              "expr": "rate(trading_order_latency_seconds_sum[5m]) / rate(trading_order_latency_seconds_count[5m])",
              "refId": "A",
              "legendFormat": "Average Latency"
            }
          ]
        }
      ],
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "refresh": "10s"
    }

  strategy-performance.json: |
    {
      "title": "Strategy Performance",
      "tags": ["trading", "strategy"],
      "style": "dark",
      "timezone": "browser",
      "panels": [
        {
          "id": 1,
          "title": "Strategy Win Rate",
          "type": "stat",
          "targets": [
            {
              "expr": "rate(trading_win_count[5m]) / rate(trading_loss_count[5m] + trading_win_count[5m]) * 100",
              "refId": "A",
              "legendFormat": "Win Rate %"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "yellow", "value": 50},
                  {"color": "green", "value": 60}
                ]
              }
            }
          }
        },
        {
          "id": 2,
          "title": "Max Drawdown",
          "type": "stat",
          "targets": [
            {
              "expr": "trading_max_drawdown",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 10},
                  {"color": "red", "value": 20}
                ]
              }
            }
          }
        }
      ],
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "refresh": "10s"
    }

  market-data.json: |
    {
      "title": "Market Data Metrics",
      "tags": ["trading", "market-data"],
      "style": "dark",
      "timezone": "browser",
      "panels": [
        {
          "id": 1,
          "title": "Data Points Collected",
          "type": "stat",
          "targets": [
            {
              "expr": "market_data_points_collected",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "Data Collection Rate",
          "type": "graph",
          "targets": [
            {
              "expr": "rate(market_data_points_collected[5m])",
              "refId": "A",
              "legendFormat": "Points/sec"
            }
          ]
        }
      ],
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "refresh": "10s"
    } 
  trading-engine.json: |
    {
      "dashboard": {
        "id": null,
        "title": "Trading Engine Dashboard",
        "tags": ["trading", "engine", "core", "performance", "execution"],
        "style": "dark",
        "timezone": "browser",
        "panels": [
          {
            "id": 1,
            "title": "Trading Engine Health",
            "type": "stat",
            "targets": [
              {
                "expr": "up{job=\"trading-engine\"}",
                "legendFormat": "{{instance}}"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "color": {
                  "mode": "thresholds"
                },
                "thresholds": {
                  "steps": [
                    {"color": "red", "value": 0},
                    {"color": "green", "value": 1}
                  ]
                }
              }
            },
            "gridPos": {"h": 8, "w": 6, "x": 0, "y": 0}
          },
          {
            "id": 2,
            "title": "Order Processing Rate",
            "type": "timeseries",
            "targets": [
              {
                "expr": "rate(trading_orders_processed_total[5m])",
                "legendFormat": "Orders/sec"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "color": {"mode": "palette-classic"},
                "unit": "reqps"
              }
            },
            "gridPos": {"h": 8, "w": 12, "x": 6, "y": 0}
          },
          {
            "id": 3,
            "title": "Order Processing Latency",
            "type": "timeseries",
            "targets": [
              {
                "expr": "rate(trading_order_processing_duration_seconds_sum[5m]) / rate(trading_order_processing_duration_seconds_count[5m])",
                "legendFormat": "Avg Processing Time"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "color": {"mode": "thresholds"},
                "unit": "ms",
                "thresholds": {
                  "steps": [
                    {"color": "green", "value": null},
                    {"color": "yellow", "value": 100},
                    {"color": "red", "value": 500}
                  ]
                }
              }
            },
            "gridPos": {"h": 8, "w": 12, "x": 18, "y": 0}
          },
          {
            "id": 4,
            "title": "Strategy Execution Performance",
            "type": "timeseries",
            "targets": [
              {
                "expr": "rate(trading_strategy_execution_duration_seconds_sum[5m]) / rate(trading_strategy_execution_duration_seconds_count[5m])",
                "legendFormat": "{{strategy}}"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "color": {"mode": "palette-classic"},
                "unit": "ms"
              }
            },
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8}
          },
          {
            "id": 5,
            "title": "Order Queue Size",
            "type": "timeseries",
            "targets": [
              {
                "expr": "trading_order_queue_size",
                "legendFormat": "Queue Size"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "color": {"mode": "thresholds"},
                "unit": "short",
                "thresholds": {
                  "steps": [
                    {"color": "green", "value": null},
                    {"color": "yellow", "value": 100},
                    {"color": "red", "value": 500}
                  ]
                }
              }
            },
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8}
          },
          {
            "id": 6,
            "title": "Order Success Rate",
            "type": "stat",
            "targets": [
              {
                "expr": "rate(trading_orders_successful_total[5m]) / rate(trading_orders_total[5m]) * 100",
                "legendFormat": "Success Rate %"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "color": {"mode": "thresholds"},
                "unit": "percent",
                "thresholds": {
                  "steps": [
                    {"color": "red", "value": null},
                    {"color": "yellow", "value": 95},
                    {"color": "green", "value": 99}
                  ]
                }
              }
            },
            "gridPos": {"h": 8, "w": 6, "x": 18, "y": 8}
          },
          {
            "id": 7,
            "title": "Memory Usage",
            "type": "timeseries",
            "targets": [
              {
                "expr": "process_resident_memory_bytes{job=\"trading-engine\"} / 1024 / 1024",
                "legendFormat": "Memory (MB)"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "color": {"mode": "thresholds"},
                "unit": "bytes",
                "thresholds": {
                  "steps": [
                    {"color": "green", "value": null},
                    {"color": "yellow", "value": 1024},
                    {"color": "red", "value": 2048}
                  ]
                }
              }
            },
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16}
          },
          {
            "id": 8,
            "title": "CPU Usage",
            "type": "timeseries",
            "targets": [
              {
                "expr": "rate(process_cpu_seconds_total{job=\"trading-engine\"}[5m]) * 100",
                "legendFormat": "CPU %"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "color": {"mode": "thresholds"},
                "unit": "percent",
                "thresholds": {
                  "steps": [
                    {"color": "green", "value": null},
                    {"color": "yellow", "value": 70},
                    {"color": "red", "value": 90}
                  ]
                }
              }
            },
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 16}
          },
          {
            "id": 9,
            "title": "Active Strategies",
            "type": "stat",
            "targets": [
              {
                "expr": "trading_active_strategies",
                "legendFormat": "Active Strategies"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "color": {"mode": "palette-classic"},
                "unit": "short"
              }
            },
            "gridPos": {"h": 8, "w": 6, "x": 18, "y": 16}
          },
          {
            "id": 10,
            "title": "Order Types Distribution",
            "type": "piechart",
            "targets": [
              {
                "expr": "trading_orders_by_type_total",
                "legendFormat": "{{order_type}}"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "color": {"mode": "palette-classic"}
              }
            },
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 24}
          },
          {
            "id": 11,
            "title": "Error Rate",
            "type": "timeseries",
            "targets": [
              {
                "expr": "rate(trading_errors_total[5m])",
                "legendFormat": "{{error_type}}"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "color": {"mode": "thresholds"},
                "unit": "reqps",
                "thresholds": {
                  "steps": [
                    {"color": "green", "value": null},
                    {"color": "yellow", "value": 0.1},
                    {"color": "red", "value": 1}
                  ]
                }
              }
            },
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 24}
          },
          {
            "id": 12,
            "title": "Position Updates",
            "type": "timeseries",
            "targets": [
              {
                "expr": "rate(trading_position_updates_total[5m])",
                "legendFormat": "Position Updates/sec"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "color": {"mode": "palette-classic"},
                "unit": "reqps"
              }
            },
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 32}
          },
          {
            "id": 13,
            "title": "Risk Check Performance",
            "type": "timeseries",
            "targets": [
              {
                "expr": "rate(trading_risk_check_duration_seconds_sum[5m]) / rate(trading_risk_check_duration_seconds_count[5m])",
                "legendFormat": "Risk Check Duration"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "color": {"mode": "thresholds"},
                "unit": "ms",
                "thresholds": {
                  "steps": [
                    {"color": "green", "value": null},
                    {"color": "yellow", "value": 50},
                    {"color": "red", "value": 200}
                  ]
                }
              }
            },
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 32}
          },
          {
            "id": 14,
            "title": "Engine Alerts",
            "type": "stat",
            "targets": [
              {
                "expr": "trading_engine_alerts_total",
                "legendFormat": "Active Alerts"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "color": {"mode": "thresholds"},
                "thresholds": {
                  "steps": [
                    {"color": "green", "value": null},
                    {"color": "yellow", "value": 1},
                    {"color": "red", "value": 5}
                  ]
                }
              }
            },
            "gridPos": {"h": 8, "w": 6, "x": 18, "y": 32}
          },
          {
            "id": 15,
            "title": "Strategy Performance Summary",
            "type": "table",
            "targets": [
              {
                "expr": "trading_strategy_performance",
                "format": "table",
                "instant": true
              }
            ],
            "transformations": [
              {
                "id": "organize",
                "options": {
                  "excludeByName": {
                    "Time": true,
                    "__name__": true,
                    "job": true,
                    "instance": true
                  },
                  "indexByName": {},
                  "renameByName": {
                    "strategy": "Strategy",
                    "return_pct": "Return %",
                    "sharpe_ratio": "Sharpe Ratio",
                    "max_drawdown": "Max Drawdown",
                    "win_rate": "Win Rate"
                  }
                }
              }
            ],
            "fieldConfig": {
              "defaults": {
                "color": {"mode": "thresholds"},
                "thresholds": {
                  "steps": [
                    {"color": "green", "value": null},
                    {"color": "yellow", "value": 1},
                    {"color": "red", "value": 2}
                  ]
                }
              }
            },
            "gridPos": {"h": 8, "w": 24, "x": 0, "y": 40}
          }
        ],
        "time": {
          "from": "now-1h",
          "to": "now"
        },
        "refresh": "30s"
      }

  order-execution.json: |
