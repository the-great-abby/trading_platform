apiVersion: v1
kind: ConfigMap
metadata:
  name: jaeger-config
  namespace: trading-system
data:
  jaeger-config.yaml: |
    sampling:
      default_strategy:
        type: probabilistic
        param: 1.0
    storage:
      type: memory
      options:
        memory:
          max_trace_age: 24h
    ingester:
      deadlock_interval: 0s
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: trading-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:latest
          ports:
            - containerPort: 16686  # UI
            - containerPort: 14268  # HTTP collector
            - containerPort: 14250  # gRPC collector
            - containerPort: 6831   # UDP agent
            - containerPort: 6832   # UDP agent (compact thrift)
          env:
            - name: COLLECTOR_OTLP_ENABLED
              value: "true"
            - name: COLLECTOR_ZIPKIN_HOST_PORT
              value: ":9411"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: trading-system
spec:
  selector:
    app: jaeger
  ports:
    - name: ui
      port: 16686
      targetPort: 16686
    - name: http-collector
      port: 14268
      targetPort: 14268
    - name: grpc-collector
      port: 14250
      targetPort: 14250
    - name: udp-agent
      port: 6831
      targetPort: 6831
    - name: udp-agent-compact
      port: 6832
      targetPort: 6832



