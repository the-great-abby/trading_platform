[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --strict-config
    --cov=src/testing
    --cov=src/validation
    --cov-report=html:htmlcov
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=90
    --benchmark-only
    --benchmark-skip
asyncio_mode = auto
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    contract: marks tests as contract tests
    performance: marks tests as performance tests
    strategy_validation: marks tests as strategy validation tests
    elliott_wave: marks tests as Elliott Wave specific tests
    adaptive_wave: marks tests as Adaptive Wave specific tests
    ichimoku: marks tests as Ichimoku specific tests
    options: marks tests as options strategy tests
    ensemble: marks tests as ensemble strategy tests
    validation: marks tests as backtest validation framework tests
    validation_discovery: marks tests as validation script discovery tests
    validation_execution: marks tests as validation script execution tests
    validation_api: marks tests as validation API tests
    validation_integration: marks tests as validation integration tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning