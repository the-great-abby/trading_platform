version: '3.8'

services:
  # API Gateway
  api-gateway:
    build: ./services/gateway
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
    depends_on:
      - trading-service
      - market-data-service
      - portfolio-service
      - analytics-service
    networks:
      - trading-network

  # Command API
  command-api:
    build: ./services/command-api
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@write-db:5432/trading_write
      - EVENT_STORE_URL=eventstore:2113
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      - write-db
      - eventstore
      - kafka
    networks:
      - trading-network

  # Query API
  query-api:
    build: ./services/query-api
    ports:
      - "8002:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@read-db:5432/trading_read
      - REDIS_URL=redis://redis.redis.svc.cluster.local:6379
    depends_on:
      - read-db
      - redis
    networks:
      - trading-network

  # Trading Service (Command Side)
  trading-service:
    build: ./services/trading-service
    environment:
      - DATABASE_URL=postgresql://postgres:password@write-db:5432/trading_write
      - EVENT_STORE_URL=eventstore:2113
      - KAFKA_BROKERS=kafka:9092
      - PUBLIC_API_URL=http://public-api:8000
    depends_on:
      - write-db
      - eventstore
      - kafka
      - public-api
    networks:
      - trading-network

  # Market Data Service (Query Side)
  market-data-service:
    build: ./services/market-data-service
    environment:
      - DATABASE_URL=postgresql://postgres:password@read-db:5432/trading_read
      - REDIS_URL=redis://redis.redis.svc.cluster.local:6379
      - PUBLIC_API_URL=http://public-api:8000
      - INFLUXDB_URL=http://influxdb:8086
    depends_on:
      - read-db
      - redis
      - influxdb
      - public-api
    networks:
      - trading-network

  # Portfolio Service (Query Side)
  portfolio-service:
    build: ./services/portfolio-service
    environment:
      - DATABASE_URL=postgresql://postgres:password@read-db:5432/trading_read
      - REDIS_URL=redis://redis.redis.svc.cluster.local:6379
    depends_on:
      - read-db
      - redis
    networks:
      - trading-network

  # Risk Management Service (Command Side)
  risk-service:
    build: ./services/risk-service
    environment:
      - DATABASE_URL=postgresql://postgres:password@write-db:5432/trading_write
      - EVENT_STORE_URL=eventstore:2113
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      - write-db
      - eventstore
      - kafka
    networks:
      - trading-network

  # Strategy Service (Command Side)
  strategy-service:
    build: ./services/strategy-service
    environment:
      - DATABASE_URL=postgresql://postgres:password@write-db:5432/trading_write
      - EVENT_STORE_URL=eventstore:2113
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      - write-db
      - eventstore
      - kafka
    networks:
      - trading-network

  # Order Management Service (Command Side)
  order-service:
    build: ./services/order-service
    environment:
      - DATABASE_URL=postgresql://postgres:password@write-db:5432/trading_write
      - EVENT_STORE_URL=eventstore:2113
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      - write-db
      - eventstore
      - kafka
    networks:
      - trading-network

  # Analytics Service (Query Side)
  analytics-service:
    build: ./services/analytics-service
    environment:
      - DATABASE_URL=postgresql://postgres:password@read-db:5432/trading_read
      - REDIS_URL=redis://redis.redis.svc.cluster.local:6379
      - INFLUXDB_URL=http://influxdb:8086
    depends_on:
      - read-db
      - redis
      - influxdb
    networks:
      - trading-network

  # User Management Service (Command Side)
  user-service:
    build: ./services/user-service
    environment:
      - DATABASE_URL=postgresql://postgres:password@write-db:5432/trading_write
      - EVENT_STORE_URL=eventstore:2113
      - KAFKA_BROKERS=kafka:9092
      - JWT_SECRET=your-secret-key
    depends_on:
      - write-db
      - eventstore
      - kafka
    networks:
      - trading-network

  # Public API Service (External)
  public-api:
    build: ./services/public-api
    environment:
      - PUBLIC_API_KEY=${PUBLIC_API_KEY}
      - PUBLIC_API_SECRET=${PUBLIC_API_SECRET}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL}
      - PUBLIC_USERNAME=${PUBLIC_USERNAME}
      - PUBLIC_PASSWORD=${PUBLIC_PASSWORD}
    networks:
      - trading-network

  # Databases
  write-db:
    image: postgres:15
    ports:
      - "5432:5432"  # Expose write database
    environment:
      - POSTGRES_DB=trading_write
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - write_db_data:/var/lib/postgresql/data
    networks:
      - trading-network

  read-db:
    image: postgres:15
    ports:
      - "5433:5432"  # Expose read database on different port
    environment:
      - POSTGRES_DB=trading_read
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - read_db_data:/var/lib/postgresql/data
    networks:
      - trading-network

  # Event Store
  eventstore:
    image: eventstore/eventstore:latest
    ports:
      - "2113:2113"
      - "1113:1113"
    environment:
      - EVENTSTORE_CLUSTER_SIZE=1
      - EVENTSTORE_RUN_PROJECTIONS=All
      - EVENTSTORE_START_STANDARD_PROJECTIONS=true
      - EVENTSTORE_EXT_TCP_PORT=1113
      - EVENTSTORE_HTTP_PORT=2113
      - EVENTSTORE_INSECURE=true
    volumes:
      - eventstore_data:/var/lib/eventstore
    networks:
      - trading-network

  # Message Broker
  kafka:
    image: confluentinc/cp-kafka:latest
    ports:
      - "9092:9092"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
    depends_on:
      - zookeeper
    networks:
      - trading-network

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
    networks:
      - trading-network

  # Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - trading-network

  # Time Series Database
  influxdb:
    image: influxdb:2.7
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=password
      - DOCKER_INFLUXDB_INIT_ORG=trading
      - DOCKER_INFLUXDB_INIT_BUCKET=market_data
    volumes:
      - influxdb_data:/var/lib/influxdb2
    networks:
      - trading-network

  # Monitoring
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - trading-network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - trading-network

  # Logging
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.8.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - trading-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.8.0
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - trading-network

  logstash:
    image: docker.elastic.co/logstash/logstash:8.8.0
    volumes:
      - ./monitoring/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    depends_on:
      - elasticsearch
    networks:
      - trading-network

volumes:
  write_db_data:
  read_db_data:
  eventstore_data:
  redis_data:
  influxdb_data:
  prometheus_data:
  grafana_data:
  elasticsearch_data:

networks:
  trading-network:
    driver: bridge 