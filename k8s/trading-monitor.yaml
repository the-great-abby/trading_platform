apiVersion: apps/v1
kind: Deployment
metadata:
  name: trading-monitor
  namespace: trading-system
  labels:
    app: trading-monitor
    component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trading-monitor
  template:
    metadata:
      labels:
        app: trading-monitor
        component: monitoring
    spec:
      containers:
      - name: trading-monitor
        image: localhost:32000/trading-monitor:latest
        ports:
        - containerPort: 8080
        env:
        - name: DATABASE_URL
          value: "postgresql://trading_user:trading_pass@timescaledb.trading-system.svc.cluster.local:5432/trading_bot"
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: trading-monitor
  namespace: trading-system
  labels:
    app: trading-monitor
    component: monitoring
spec:
  selector:
    app: trading-monitor
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  type: ClusterIP 