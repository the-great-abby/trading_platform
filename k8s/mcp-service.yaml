apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-service
  namespace: trading-system
  labels:
    app: mcp-service
    component: mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-service
  template:
    metadata:
      labels:
        app: mcp-service
        component: mcp
    spec:
      containers:
      - name: mcp-service
        image: localhost:32000/mcp-service:latest
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: LOG_LEVEL
          value: "INFO"
        - name: NAMESPACE
          value: "trading-system"
        - name: DOCS_PATH
          value: "/app/docs"
        - name: MD_PATH
          value: "/app/md"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        volumeMounts:
        - name: docs-volume
          mountPath: /app/docs
          readOnly: true
        - name: md-volume
          mountPath: /app/md
          readOnly: true
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: docs-volume
        hostPath:
          path: /Users/abby/code/trading/docs
          type: Directory
      - name: md-volume
        hostPath:
          path: /Users/abby/code/trading/md
          type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-service
  namespace: trading-system
  labels:
    app: mcp-service
    component: mcp
spec:
  selector:
    app: mcp-service
  ports:
  - port: 8000
    targetPort: 8000
    name: http
  type: ClusterIP
