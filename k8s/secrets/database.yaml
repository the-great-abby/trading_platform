# Database Credentials Secret Template
# This file provides templates for database credential secrets
# These secrets are created from environment variables via the update-secrets.sh script

---
# Database Credentials Secret Template
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: default
  labels:
    app: trading-system
    component: database
    type: credentials
type: Opaque
data:
  # These will be populated by update-secrets.sh from environment variables:
  # DB_HOST -> host
  # DB_USERNAME -> username  
  # DB_PASSWORD -> password
  # DB_NAME -> database
  # DB_PORT -> port (optional)
  # DB_SSL_MODE -> ssl_mode (optional)
  
  # host: <base64-encoded-db-host>
  # username: <base64-encoded-db-username>
  # password: <base64-encoded-db-password>
  # database: <base64-encoded-db-name>
  # port: <base64-encoded-db-port>
  # ssl_mode: <base64-encoded-ssl-mode>

---
# Example usage in deployments:
# 
# apiVersion: apps/v1
# kind: Deployment
# metadata:
#   name: strategy-service
# spec:
#   template:
#     spec:
#       containers:
#       - name: strategy-service
#         image: strategy-service:latest
#         env:
#         - name: DB_HOST
#           valueFrom:
#             secretKeyRef:
#               name: db-credentials
#               key: host
#         - name: DB_USERNAME
#           valueFrom:
#             secretKeyRef:
#               name: db-credentials
#               key: username
#         - name: DB_PASSWORD
#           valueFrom:
#             secretKeyRef:
#               name: db-credentials
#               key: password
#         - name: DB_NAME
#           valueFrom:
#             secretKeyRef:
#               name: db-credentials
#               key: database
#         - name: DB_PORT
#           valueFrom:
#             secretKeyRef:
#               name: db-credentials
#               key: port
#               optional: true
#         - name: DB_SSL_MODE
#           valueFrom:
#             secretKeyRef:
#               name: db-credentials
#               key: ssl_mode
#               optional: true

