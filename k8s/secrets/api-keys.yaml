# API Key Secrets Template
# This file provides templates for API key secrets
# These secrets are created from environment variables via the update-secrets.sh script

---
# Polygon API Key Secret Template
apiVersion: v1
kind: Secret
metadata:
  name: polygon-api-key
  namespace: default
  labels:
    app: trading-system
    component: api-keys
    provider: polygon
type: Opaque
data:
  # This will be populated by update-secrets.sh from POLYGON_API_KEY environment variable
  # api-key: <base64-encoded-api-key>

