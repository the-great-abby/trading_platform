apiVersion: apps/v1
kind: Deployment
metadata:
  name: daily-recommendations-worker
  namespace: trading-system
  labels:
    app: daily-recommendations-worker
    service: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: daily-recommendations-worker
  template:
    metadata:
      labels:
        app: daily-recommendations-worker
        service: worker
    spec:
      containers:
      - name: daily-recommendations-worker
        image: localhost:32000/trading-system:latest
        command: ["python", "-m", "src.services.workers.daily_recommendations_worker"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: database-url
        - name: RABBITMQ_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: rabbitmq-url
        - name: STRATEGY_SERVICE_URL
          value: "http://strategy-service:8000"
        - name: RSS_SERVICE_URL
          value: "http://rss-feed-service:80"
        - name: POLYGON_API_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: polygon-api-key
        - name: ALPHA_VANTAGE_API_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: alpha-vantage-api-key
        - name: OLLAMA_URL
          value: "http://ollama:11434"
        - name: LOG_LEVEL
          value: "INFO"
        - name: PYTHONPATH
          value: "/app/src"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - python
            - -c
            - "import sys; sys.exit(0)"
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          exec:
            command:
            - python
            - -c
            - "import sys; sys.exit(0)"
          initialDelaySeconds: 5
          periodSeconds: 10 