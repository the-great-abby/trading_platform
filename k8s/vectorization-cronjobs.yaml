apiVersion: batch/v1
kind: CronJob
metadata:
  name: vectorization-cleanup-cronjob
  namespace: trading-system
  labels:
    app: vectorization
    job-type: cronjob
    data-type: cleanup
spec:
  schedule: "0 3 * * *"  # Daily at 3:00 AM
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: vectorization
            data-type: cleanup
        spec:
          containers:
          - name: vectorization-cleanup
            image: localhost:32000/background-vectorization-service:latest
            command: ["curl"]
            args:
            - "-X"
            - "POST"
            - "http://background-vectorization-service:8080/api/vectorization/cleanup"
            - "-H"
            - "Content-Type: application/json"
            env:
            - name: VECTORIZATION_SOURCE
              value: "cronjob"
            - name: DATA_TYPE
              value: "cleanup"
            resources:
              requests:
                memory: "64Mi"
                cpu: "50m"
              limits:
                memory: "128Mi"
                cpu: "100m"
          restartPolicy: OnFailure
