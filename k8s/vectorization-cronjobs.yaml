apiVersion: batch/v1
kind: CronJob
metadata:
  name: market-data-vectorization-cronjob
  namespace: trading-system
  labels:
    app: vectorization
    job-type: cronjob
    data-type: market-data
spec:
  schedule: "*/15 * * * 1-5"  # Every 15 minutes on weekdays
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: vectorization
            data-type: market-data
        spec:
          containers:
          - name: market-data-vectorization
            image: localhost:32000/background-vectorization-service:latest
            command: ["curl"]
            args: 
            - "-X"
            - "POST"
            - "http://background-vectorization-service:8080/api/vectorization/trigger"
            - "-H"
            - "Content-Type: application/json"
            - "-d"
            - '{"data_type": "market_data", "priority": 1}'
            env:
            - name: VECTORIZATION_SOURCE
              value: "cronjob"
            - name: DATA_TYPE
              value: "market_data"
            resources:
              requests:
                memory: "128Mi"
                cpu: "100m"
              limits:
                memory: "256Mi"
                cpu: "200m"
          restartPolicy: OnFailure
---
