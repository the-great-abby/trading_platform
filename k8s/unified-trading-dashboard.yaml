apiVersion: apps/v1
kind: Deployment
metadata:
  name: unified-trading-dashboard
  namespace: trading-system
  labels:
    app: unified-trading-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unified-trading-dashboard
  template:
    metadata:
      labels:
        app: unified-trading-dashboard
    spec:
      containers:
      - name: unified-trading-dashboard
        image: localhost:32000/unified-trading-dashboard:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        env:
        - name: BACKTEST_API_URL
          value: "http://backtest-api:11101"
        - name: ANALYTICS_API_URL
          value: "http://analytics-service:11104"
        - name: REDIS_URL
          value: "redis://redis.redis.svc.cluster.local:6379"
        - name: DATABASE_URL
          value: "postgresql://trading_user:trading_pass@timescaledb.trading-system.svc.cluster.local:5432/trading_bot"
        - name: MARKET_DATA_URL
          value: "http://market-data-service:11084"
        - name: PORTFOLIO_SERVICE_URL
          value: "http://portfolio-service:11106"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: unified-trading-dashboard
  namespace: trading-system
spec:
  selector:
    app: unified-trading-dashboard
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
  type: ClusterIP 