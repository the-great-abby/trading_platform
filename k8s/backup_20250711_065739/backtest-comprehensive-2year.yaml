apiVersion: batch/v1
kind: Job
metadata:
  name: backtest-comprehensive-2year
  namespace: trading-system
spec:
  template:
    spec:
      containers:
      - name: backtest
        image: localhost:5000/trading-system:latest
        imagePullPolicy: Never
        command: ["python"]
        args:
        - "run_comprehensive_2year_backtest.py"
        env:
        - name: POLYGON_API_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: polygon-api-key
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: database-url
        - name: OLLAMA_URL
          value: "http://ollama:11434"
        - name: OLLAMA_MODEL
          value: "smollm2:latest"
        - name: LOG_LEVEL
          value: "INFO"
        - name: ENVIRONMENT
          value: "development"
      restartPolicy: Never
  backoffLimit: 1 