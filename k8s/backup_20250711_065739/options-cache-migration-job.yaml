apiVersion: batch/v1
kind: Job
metadata:
  name: options-cache-migration-job
  namespace: trading-system
spec:
  template:
    spec:
      containers:
      - name: migration
        image: localhost:5000/trading-system:latest
        command: ["python", "-m", "alembic", "upgrade", "20250710_add_options_contracts_cache"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: database-url
        - name: PYTHONPATH
          value: "/app/src"
      restartPolicy: Never 