apiVersion: batch/v1
kind: Job
metadata:
  name: data-ingestion-2year
  namespace: trading-system
spec:
  template:
    spec:
      containers:
      - name: data-ingestion
        image: python:3.11-slim
        command: ["/bin/bash", "-c"]
        args:
        - |
          pip install pandas sqlalchemy psycopg2-binary requests
          cd /app
          python add_missing_symbols.py
        env:
        - name: POLYGON_API_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: polygon-api-key
        - name: ALPHA_VANTAGE_API_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: alpha-vantage-api-key
        - name: DATABASE_URL
          value: "postgresql://trading_user:trading_pass@postgres-dev:5432/trading_bot"
        volumeMounts:
        - name: app-volume
          mountPath: /app
      volumes:
      - name: app-volume
        hostPath:
          path: /Users/abby/code/test1
          type: Directory
      restartPolicy: Never
  backoffLimit: 1 