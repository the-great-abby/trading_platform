apiVersion: batch/v1
kind: Job
metadata:
  name: analyze-fixed-portfolio-performance
  namespace: trading-system
spec:
  template:
    spec:
      containers:
      - name: portfolio-analyzer
        image: localhost:5000/test1-trading-cli:latest
        command: ["python3", "/app/analyze_fixed_portfolio_performance.py"]
        env:
        - name: DATABASE_URL
          value: "postgresql://trading_user:trading_pass@postgres-dev:5432/trading_bot"
        - name: OLLAMA_URL
          value: "http://ollama:11434"
        - name: OLLAMA_MODEL
          value: "granite3.3:2b"
        - name: OLLAMA_TIMEOUT
          value: "60.0"
        - name: OLLAMA_MAX_RETRIES
          value: "3"
        - name: OLLAMA_BASE_DELAY
          value: "10.0"
        - name: OLLAMA_MAX_DELAY
          value: "300.0"
      restartPolicy: Never 