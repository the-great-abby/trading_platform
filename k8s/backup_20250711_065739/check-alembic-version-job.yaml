apiVersion: batch/v1
kind: Job
metadata:
  name: check-alembic-version-job
  namespace: trading-system
spec:
  template:
    spec:
      containers:
      - name: check
        image: postgres:15
        command: ["/bin/sh", "-c"]
        args:
          - |
            export PGPASSWORD="$POSTGRES_PASSWORD"
            echo "=== CURRENT ALEMBIC VERSION ==="
            psql -h $POSTGRES_HOST -U $POSTGRES_USER -d $POSTGRES_DB -c "SELECT * FROM alembic_version;"
            echo "=== BACKTEST_RUNS COLUMNS ==="
            psql -h $POSTGRES_HOST -U $POSTGRES_USER -d $POSTGRES_DB -c "\d backtest_runs"
            echo "=== BACKTEST_TRADES COLUMNS ==="
            psql -h $POSTGRES_HOST -U $POSTGRES_USER -d $POSTGRES_DB -c "\d backtest_trades"
        env:
        - name: POSTGRES_HOST
          value: "postgres-dev"
        - name: POSTGRES_DB
          value: "trading_bot"
        - name: POSTGRES_USER
          value: "trading_user"
        - name: POSTGRES_PASSWORD
          value: "trading_pass"
      restartPolicy: Never 