apiVersion: batch/v1
kind: Job
metadata:
  name: db-setup-job
  namespace: trading-system
spec:
  template:
    spec:
      containers:
      - name: db-setup
        image: trading-bot:latest
        imagePullPolicy: Never
        command: ["python"]
        args: ["scripts/create_backtest_tables.py"]
        env:
        - name: DATABASE_URL
          value: "postgresql://trading_user:trading_pass@postgres-dev:5432/trading_bot"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
      restartPolicy: Never
  backoffLimit: 1 