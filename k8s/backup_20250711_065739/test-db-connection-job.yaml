apiVersion: batch/v1
kind: Job
metadata:
  name: test-db-connection
  namespace: trading-system
spec:
  template:
    spec:
      containers:
      - name: test-db-connection
        image: localhost:5000/trading-bot:latest
        command: ["python", "test_db_connection.py"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: database-url
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
      restartPolicy: Never
  backoffLimit: 3 