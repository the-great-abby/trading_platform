apiVersion: batch/v1
kind: Job
metadata:
  name: backtest-job
  namespace: trading-system
spec:
  template:
    spec:
      containers:
      - name: backtest
        image: trading-bot:latest
        imagePullPolicy: Never
        command: ["python"]
        args: ["run_backtest_with_real_data.py"]
        env:
        - name: DATABASE_ONLY
          value: "true"
        - name: DATABASE_URL
          value: "postgresql://trading_user:trading_pass@postgres-dev:5432/trading_bot"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
      restartPolicy: Never
  backoffLimit: 1 