apiVersion: batch/v1
kind: Job
metadata:
  name: populate-options-cache
  namespace: trading-system
spec:
  template:
    spec:
      serviceAccountName: trading-service-account
      containers:
      - name: cache-populator
        image: localhost:5000/backtest:latest
        command:
        - python
        - populate_options_cache.py
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: database-url
        - name: POLYGON_API_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: polygon-api-key
        - name: USE_CACHE
          value: "true"
        - name: DATABASE_ONLY
          value: "false"
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1"
      restartPolicy: Never
  backoffLimit: 2 