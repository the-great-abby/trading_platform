apiVersion: batch/v1
kind: CronJob
metadata:
  name: account-sync-worker
  namespace: default
  labels:
    app: account-sync-worker
    component: trading
spec:
  # Run every 5 minutes during market hours (9 AM - 4 PM ET, Monday-Friday)
  # For 24/7 syncing (since fills can happen after hours), use: */5 * * * *
  schedule: "*/5 * * * *"  # Every 5 minutes
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid  # Don't run concurrent syncs
  jobTemplate:
    metadata:
      labels:
        app: account-sync-worker
        component: trading
    spec:
      template:
        metadata:
          labels:
            app: account-sync-worker
            component: trading
        spec:
          restartPolicy: Never
          containers:
          - name: account-sync
            image: curlimages/curl:latest
            imagePullPolicy: IfNotPresent
            command:
              - sh
              - -c
              - |
                echo "🔄 Account Balance Sync - $(date)"
                echo "Syncing account balance and positions..."
                
                ACCOUNT_ID="19c25392-8b61-4b71-a344-0eb04d275528"
                
                # Sync account
                RESPONSE=$(curl -s -w "\n%{http_code}" \
                  -X POST \
                  -H "Content-Type: application/json" \
                  "http://live-trading-service.default.svc.cluster.local:8080/api/v1/account/sync/${ACCOUNT_ID}")
                
                HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
                BODY=$(echo "$RESPONSE" | head -n-1)
                
                echo "Response Code: $HTTP_CODE"
                echo "Response Body: $BODY"
                
                if [ "$HTTP_CODE" = "200" ]; then
                  echo "✅ Account balance synced successfully"
                else
                  echo "❌ Account sync failed with code $HTTP_CODE"
                  exit 1
                fi
                
                echo "✅ Sync completed"
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"
