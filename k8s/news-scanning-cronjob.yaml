apiVersion: batch/v1
kind: CronJob
metadata:
  name: news-scanning-cronjob
  namespace: trading-system
  labels:
    app: news-scanner
    job-type: cronjob
spec:
  schedule: "*/30 * * * *"  # Every 30 minutes
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: news-scanner
        spec:
          containers:
          - name: news-scanner
            image: localhost:32000/trading-system:latest
            command: ["python", "-m", "src.services.workers.news_worker_cron"]
            env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: trading-secrets
                  key: database-url
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: trading-secrets
                  key: rabbitmq-url
            - name: POLYGON_API_KEY
              valueFrom:
                secretKeyRef:
                  name: trading-secrets
                  key: polygon-api-key
            - name: ALPHA_VANTAGE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: trading-secrets
                  key: alpha-vantage-api-key
            - name: IEX_CLOUD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: trading-secrets
                  key: iex-cloud-api-key
            - name: OLLAMA_URL
              value: "http://ollama:11434"
            - name: LOG_LEVEL
              value: "INFO"
            - name: SYMBOLS
              # Use centralized symbol list from trading_config.py
              # This will be populated by the application using get_symbols()
              value: "AAPL,MSFT,GOOGL,AMZN,TSLA,NVDA,META,NFLX,AMD,INTC,JPM,BAC,WFC,GS,MS,JNJ,PFE,UNH,HD,DIS,V,MA,PYPL,ADBE,CRM,ORCL,CSCO,QCOM,TXN,AVGO,SPY,QQQ,VTI,VOO,VUG,XLK,XLF,XLE,XLV,XLY"
            - name: NEWS_SOURCES
              value: "polygon,alpha_vantage"
            - name: SCAN_INTERVAL
              value: "1800"  # 30 minutes
            - name: MAX_ARTICLES_PER_SYMBOL
              value: "10"
            - name: MIN_IMPACT_THRESHOLD
              value: "0.3"
            - name: ENABLE_LLM_ANALYSIS
              value: "true"
            - name: LLM_TIMEOUT
              value: "30"
            - name: LLM_MAX_RETRIES
              value: "3"
            resources:
              requests:
                memory: "512Mi"
                cpu: "250m"
              limits:
                memory: "1Gi"
                cpu: "500m"
            volumeMounts:
            - name: shared-data
              mountPath: /app/data
          volumes:
          - name: shared-data
            persistentVolumeClaim:
              claimName: backtest-data-pvc
          restartPolicy: OnFailure
          serviceAccountName: trading-service-account
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: news-scanning-config
  namespace: trading-system
data:
  news-sources.yaml: |
    sources:
      - name: reuters
        url: "https://www.reuters.com"
        enabled: true
      - name: bloomberg
        url: "https://www.bloomberg.com"
        enabled: true
      - name: cnbc
        url: "https://www.cnbc.com"
        enabled: true
      - name: yahoo-finance
        url: "https://finance.yahoo.com"
        enabled: true
      - name: marketwatch
        url: "https://www.marketwatch.com"
        enabled: true
    
    symbols:
      - AAPL
      - TSLA
      - JPM
      - MSFT
      - GOOGL
      - AMZN
      - NVDA
      - META
      - BRK-B
      - JNJ
      - V
      - PG
      - UNH
      - HD
      - MA
    
    scan-interval: 3600  # 1 hour in seconds
    sentiment-threshold: 0.3
    impact-threshold: 0.5 