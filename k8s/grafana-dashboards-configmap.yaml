          "id": 2,
          "title": "Strategy P&L",
          "type": "bargraph",
          "targets": [
            {
              "expr": "strategy_pnl_total{strategy=~\".*\"}",
              "legendFormat": "{{strategy}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "unit": "currencyUSD",
              "thresholds": {
