apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: trading-system
data:
  # Dashboard provider configuration
  dashboard-provider.yaml: |
    apiVersion: 1
    providers:
      - name: 'Trading System Dashboards'
        orgId: 1
        folder: 'Trading System'
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /etc/grafana/provisioning/dashboards

  # Datasource configuration
  prometheus-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true
        jsonData:
          timeInterval: "15s"
          queryTimeout: "60s"
          httpMethod: "POST"
        secureJsonData: {}

  # Infrastructure Dashboard with Real Data
  infrastructure-dashboard.json: |
    {
      "title": "Infrastructure Dashboard - Real Data",
      "tags": ["infrastructure", "system"],
      "style": "dark",
      "timezone": "browser",
      "panels": [
        {
          "id": 1,
          "title": "System CPU Usage",
          "type": "stat",
          "targets": [
            {
              "expr": "infrastructure_cpu_percent",
              "legendFormat": "CPU %"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "unit": "percent",
              "thresholds": {
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 70},
                  {"color": "red", "value": 85}
                ]
              }
            }
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0}
        },
        {
          "id": 2,
          "title": "System Memory Usage",
          "type": "stat",
          "targets": [
            {
              "expr": "infrastructure_memory_percent",
              "legendFormat": "Memory %"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "unit": "percent",
              "thresholds": {
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 80},
                  {"color": "red", "value": 90}
                ]
              }
            }
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0}
        },
        {
          "id": 3,
          "title": "Running Pods",
          "type": "stat",
          "targets": [
            {
              "expr": "k8s_pods_running",
              "legendFormat": "Running"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "unit": "short"
            }
          },
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 8}
        },
        {
          "id": 4,
          "title": "Failed Pods",
          "type": "stat",
          "targets": [
            {
              "expr": "k8s_pods_failed",
              "legendFormat": "Failed"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "unit": "short",
              "thresholds": {
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "red", "value": 1}
                ]
              }
            }
          },
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 8}
        },
        {
          "id": 5,
          "title": "Pending Pods",
          "type": "stat",
          "targets": [
            {
              "expr": "k8s_pods_pending",
              "legendFormat": "Pending"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "unit": "short",
              "thresholds": {
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 1}
                ]
              }
            }
          },
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 8}
        },
        {
          "id": 6,
          "title": "Pod CPU Usage (Top 10)",
          "type": "table",
          "targets": [
            {
              "expr": "topk(10, k8s_pod_cpu_millicores)",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "unit": "short"
            }
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16}
        },
        {
          "id": 7,
          "title": "Pod Memory Usage (Top 10)",
          "type": "table",
          "targets": [
            {
              "expr": "topk(10, k8s_pod_memory_mb)",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "unit": "bytes"
            }
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 16}
        }
      ],
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "refresh": "30s"
    }

