  # Trading System Overview Dashboard
  trading-system-overview.json: |
    {
      "title": "Trading System Overview",
      "tags": ["trading", "overview", "system"],
      "style": "dark",
      "timezone": "browser",
      "panels": [
        {
          "id": 1,
          "title": "System Health Status",
          "type": "stat",
          "targets": [
            {
              "expr": "up{job=\"trading-services\"}",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "steps": [
                  {"color": "red", "value": 0},
                  {"color": "green", "value": 1}
                ]
              }
            }
