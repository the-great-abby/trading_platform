  # Strategy Performance Dashboard
  strategy-performance.json: |
    {
      "title": "Strategy Performance Dashboard",
      "tags": ["trading", "strategy", "performance"],
      "style": "dark",
      "timezone": "browser",
      "panels": [
        {
          "id": 1,
          "title": "Strategy Win Rates",
          "type": "bargraph",
          "targets": [
            {
              "expr": "strategy_win_rate{strategy=~\".*\"} * 100",
              "legendFormat": "{{strategy}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "unit": "percent",
              "thresholds": {
