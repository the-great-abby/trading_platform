apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq-exporter
  namespace: trading-system
  labels:
    app: rabbitmq-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq-exporter
  template:
    metadata:
      labels:
        app: rabbitmq-exporter
    spec:
      containers:
      - name: rabbitmq-exporter
        image: kbudde/rabbitmq-exporter:latest
        ports:
        - containerPort: 9419
        env:
        - name: RABBIT_URL
          value: "http://rabbitmq-service:11303"
        - name: RABBIT_USER
          value: "trading"
        - name: RABBIT_PASSWORD
          value: "trading_pass"
        - name: PUBLISH_PORT
          value: "9419"
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-exporter
  namespace: trading-system
  labels:
    app: rabbitmq-exporter
spec:
  selector:
    app: rabbitmq-exporter
  ports:
  - port: 9419
    targetPort: 9419
    protocol: TCP
    name: metrics 