apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernetes-rag-chat
  namespace: trading-system
  labels:
    app: kubernetes-rag-chat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubernetes-rag-chat
  template:
    metadata:
      labels:
        app: kubernetes-rag-chat
    spec:
      containers:
      - name: kubernetes-rag-chat
        image: localhost:32000/kubernetes-rag-chat:v3
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: LLM_PROXY_URL
          value: "http://ollama-controller-api-service.ollama-controller.svc.cluster.local:12001"
        - name: VECTOR_STORAGE_URL
          value: "http://postgres-vector-storage:80"
        - name: K8S_DOCS_PATH
          value: "/app/docs"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
