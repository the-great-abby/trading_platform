apiVersion: batch/v1
kind: Job
metadata:
  name: backtest-comprehensive-verification
  namespace: trading-system
spec:
  template:
    spec:
      serviceAccountName: trading-service-account
      containers:
      - name: backtest
        image: localhost:32000/backtest:latest
        command: ["python", "run_comprehensive_data_structure_verification.py"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: database-url
        - name: POLYGON_API_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: polygon-api-key
        - name: USE_LLM_EVALUATION
          value: "false"
        - name: DATABASE_ONLY_MODE
          value: "true"
        resources:
          requests:
            memory: "4Gi"
            cpu: "2000m"
          limits:
            memory: "8Gi"
            cpu: "4000m"
      restartPolicy: Never
  backoffLimit: 2 