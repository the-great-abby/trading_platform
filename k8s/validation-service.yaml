apiVersion: apps/v1
kind: Deployment
metadata:
  name: validation-service
  namespace: trading-system
  labels:
    app: validation-service
    component: validation
    tier: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: validation-service
  template:
    metadata:
      labels:
        app: validation-service
        component: validation
        tier: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: validation-service
        image: localhost:5000/validation-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        env:
        - name: DATABASE_HOST
          valueFrom:
            secretKeyRef:
              name: validation-db-secret
              key: host
        - name: DATABASE_PORT
          valueFrom:
            secretKeyRef:
              name: validation-db-secret
              key: port
        - name: DATABASE_NAME
          valueFrom:
            secretKeyRef:
              name: validation-db-secret
              key: database
        - name: DATABASE_USER
          valueFrom:
            secretKeyRef:
              name: validation-db-secret
              key: username
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: validation-db-secret
              key: password
        - name: LOG_LEVEL
          value: "INFO"
        - name: ENVIRONMENT
          value: "production"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: validation-config
          mountPath: /app/config
          readOnly: true
        - name: validation-logs
          mountPath: /app/logs
      volumes:
      - name: validation-config
        configMap:
          name: validation-configmap
      - name: validation-logs
        emptyDir: {}
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: validation-service
  namespace: trading-system
  labels:
    app: validation-service
    component: validation
    tier: api
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: validation-service
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: validation-service-ingress
  namespace: trading-system
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  rules:
  - host: validation.trading-system.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: validation-service
            port:
              number: 8000











