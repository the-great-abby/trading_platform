apiVersion: batch/v1
kind: Job
metadata:
  name: backtest-portfolio-performance
  namespace: trading-system
spec:
  template:
    spec:
      containers:
      - name: backtest-portfolio-performance
        image: localhost:5000/trading-system:latest
        command: ["python", "run_portfolio_performance_test.py"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: database-url
        - name: POLYGON_API_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: polygon-api-key
        - name: OLLAMA_URL
          value: "http://ollama:11434"
        - name: OLLAMA_MODEL
          value: "granite3.3:2b"
        - name: OLLAMA_TIMEOUT
          value: "60"
        - name: OLLAMA_RETRIES
          value: "3"
        - name: OLLAMA_BACKOFF_BASE
          value: "2"
        - name: OLLAMA_BACKOFF_MAX
          value: "30"
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
      restartPolicy: Never
  backoffLimit: 1 