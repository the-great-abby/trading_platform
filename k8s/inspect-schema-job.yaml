apiVersion: batch/v1
kind: Job
metadata:
  name: inspect-schema-job
  namespace: trading-system
spec:
  template:
    spec:
      containers:
      - name: inspect
        image: postgres:15
        command: ["/bin/sh", "-c"]
        args:
          - |
            export PGPASSWORD="$POSTGRES_PASSWORD"
            echo "=== DATABASE SCHEMA INSPECTION ==="
            echo "=== TABLES ==="
            psql -h $POSTGRES_HOST -U $POSTGRES_USER -d $POSTGRES_DB -c "\dt"
            echo "=== TABLE DETAILS ==="
            psql -h $POSTGRES_HOST -U $POSTGRES_USER -d $POSTGRES_DB -c "\d+"
            echo "=== INDEXES ==="
            psql -h $POSTGRES_HOST -U $POSTGRES_USER -d $POSTGRES_DB -c "\di"
            echo "=== CONSTRAINTS ==="
            psql -h $POSTGRES_HOST -U $POSTGRES_USER -d $POSTGRES_DB -c "\d+ backtest_results"
            echo "=== BACKTEST_RUNS TABLE ==="
            psql -h $POSTGRES_HOST -U $POSTGRES_USER -d $POSTGRES_DB -c "\d+ backtest_runs"
            echo "=== HISTORICAL_PRICES TABLE ==="
            psql -h $POSTGRES_HOST -U $POSTGRES_USER -d $POSTGRES_DB -c "\d+ historical_prices"
        env:
        - name: POSTGRES_HOST
          value: "postgres-dev"
        - name: POSTGRES_DB
          value: "trading_bot"
        - name: POSTGRES_USER
          value: "trading_user"
        - name: POSTGRES_PASSWORD
          value: "trading_pass"
      restartPolicy: Never 