apiVersion: batch/v1
kind: Job
metadata:
  name: {{JOB_NAME}}
  namespace: trading-system
  labels:
    app: {{APP_NAME}}
    component: {{COMPONENT}}
    job-type: {{JOB_TYPE}}
spec:
  template:
    metadata:
      labels:
        app: {{APP_NAME}}
        component: {{COMPONENT}}
        job-type: {{JOB_TYPE}}
    spec:
      serviceAccountName: trading-service-account
      containers:
      - name: {{CONTAINER_NAME}}
        image: {{IMAGE}}
        imagePullPolicy: {{IMAGE_PULL_POLICY}}
        command: {{COMMAND}}
        args: {{ARGS}}
        env:
        # Database
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: database-url
        # API Keys
        - name: POLYGON_API_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: polygon-api-key
        - name: ALPHA_VANTAGE_API_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: alpha-vantage-api-key
        - name: IEX_CLOUD_API_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: iex-cloud-api-key
              optional: true
        # Services
        - name: REDIS_URL
          value: "redis://redis-service:6379"
        - name: RABBITMQ_URL
          value: "amqp://trading_user:trading_pass@rabbitmq-service:5672/trading_vhost"
        - name: OLLAMA_URL
          value: "http://192.168.65.3:11434"
        # Application
        - name: PYTHONPATH
          value: "/app/src"
        - name: LOG_LEVEL
          value: "{{LOG_LEVEL}}"
        # Optional: Custom environment variables
        {{CUSTOM_ENV_VARS}}
        resources:
          requests:
            memory: "{{MEMORY_REQUEST}}"
            cpu: "{{CPU_REQUEST}}"
          limits:
            memory: "{{MEMORY_LIMIT}}"
            cpu: "{{CPU_LIMIT}}"
        volumeMounts:
        - name: logs-volume
          mountPath: /app/logs
        - name: data-volume
          mountPath: /app/data
        {{CUSTOM_VOLUME_MOUNTS}}
      volumes:
      - name: logs-volume
        emptyDir: {}
      - name: data-volume
        persistentVolumeClaim:
          claimName: backtest-data-pvc
      {{CUSTOM_VOLUMES}}
      restartPolicy: Never
  backoffLimit: {{BACKOFF_LIMIT}} 