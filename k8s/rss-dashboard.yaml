apiVersion: apps/v1
kind: Deployment
metadata:
  name: rss-dashboard
  namespace: trading-system
  labels:
    app: rss-dashboard
    service: rss
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rss-dashboard
  template:
    metadata:
      labels:
        app: rss-dashboard
        service: rss
    spec:
      containers:
      - name: rss-dashboard
        image: localhost:32000/rss-dashboard:latest
        ports:
        - containerPort: 8080
        env:
        - name: RSS_SERVICE_URL
          value: "http://rss-feed-service:80"
        - name: STRATEGY_SERVICE_URL
          value: "http://strategy-service:8000"
        - name: REFRESH_INTERVAL
          value: "30"
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: rss-dashboard
  namespace: trading-system
  labels:
    app: rss-dashboard
    service: rss
spec:
  selector:
    app: rss-dashboard
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
  type: ClusterIP 