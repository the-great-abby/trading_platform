apiVersion: batch/v1
kind: Job
metadata:
  name: backtest-unified-advanced
  namespace: trading-system
  labels:
    app: backtest
    type: unified-advanced
spec:
  template:
    metadata:
      labels:
        app: backtest
        type: unified-advanced
    spec:
      containers:
      - name: backtest-unified-advanced
        image: localhost:5000/trading-system:latest
        imagePullPolicy: Always
        command: ["python"]
        args: ["run_unified_advanced_backtest.py"]
        env:
        - name: DATABASE_URL
          value: "postgresql://trading_user:trading_password@postgres-service:5432/trading_db"
        - name: REDIS_URL
          value: "redis://redis-service:6379"
        - name: RABBITMQ_URL
          value: "amqp://guest:guest@rabbitmq-service:5672/"
        - name: OLLAMA_BASE_URL
          value: "http://192.168.65.3:11434"
        - name: POLYGON_API_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: polygon-api-key
        - name: ALPHA_VANTAGE_API_KEY
          valueFrom:
              secretKeyRef:
                name: trading-secrets
                key: alpha-vantage-api-key
        - name: NEWS_API_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: news-api-key
              optional: true
        - name: LLM_EVALUATION
          value: "true"
        - name: ADVANCED_EXIT_STRATEGIES
          value: "true"
        - name: BACKTEST_MODE
          value: "unified_advanced"
        - name: USE_REAL_DATA
          value: "true"
        - name: USE_CACHE
          value: "true"
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        volumeMounts:
        - name: backtest-results
          mountPath: /app/backtest_results
        - name: data-volume
          mountPath: /app/data
      volumes:
      - name: backtest-results
        persistentVolumeClaim:
          claimName: backtest-results-pvc
      - name: data-volume
        persistentVolumeClaim:
          claimName: backtest-data-pvc
      restartPolicy: Never
      serviceAccountName: trading-service-account
  backoffLimit: 3 