apiVersion: apps/v1
kind: Deployment
metadata:
  name: report-viewer-service
  namespace: trading-system
  labels:
    app: report-viewer-service
    service: report-viewer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: report-viewer-service
  template:
    metadata:
      labels:
        app: report-viewer-service
        service: report-viewer
    spec:
      containers:
      - name: report-viewer-service
        image: localhost:32000/report-viewer-service:latest
        ports:
        - containerPort: 8084
        env:
        - name: DATABASE_URL
          value: "postgresql://trading_user:trading_pass@postgres-dev:5432/trading_bot"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8084
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8084
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: report-viewer-service
  namespace: trading-system
  labels:
    app: report-viewer-service
    service: report-viewer
spec:
  selector:
    app: report-viewer-service
  ports:
  - port: 80
    targetPort: 8084
    protocol: TCP
  type: ClusterIP 