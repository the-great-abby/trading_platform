apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: kubernetes-rag-chat-rs
  namespace: trading-system
  labels:
    app: kubernetes-rag-chat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubernetes-rag-chat
  template:
    metadata:
      labels:
        app: kubernetes-rag-chat
    spec:
      containers:
      - name: kubernetes-rag-chat
        image: localhost:32000/kubernetes-rag-chat:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: LLM_PROXY_URL
          value: "http://host.docker.internal:12001"
        - name: VECTOR_STORAGE_URL
          value: "http://postgres-vector-storage:11006"
        - name: K8S_DOCS_PATH
          value: "/app/docs"
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "200m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
            scheme: HTTP
          initialDelaySeconds: 60
          periodSeconds: 60
          timeoutSeconds: 30
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 30
          failureThreshold: 5
