apiVersion: batch/v1
kind: Job
metadata:
  name: backtest-llm-enhanced-comprehensive
  namespace: trading-system
spec:
  template:
    spec:
      serviceAccountName: trading-service-account
      containers:
      - name: backtest
        image: localhost:32000/backtest:latest
        command: ["python", "run_llm_enhanced_comprehensive_backtest.py"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              key: database-url
              name: trading-secrets
        - name: POLYGON_API_KEY
          valueFrom:
            secretKeyRef:
              key: polygon-api-key
              name: trading-secrets
        - name: OLLAMA_URL
          value: "http://192.168.0.18:11434"
        - name: OLLAMA_MODEL
          value: "gemma3:1b"
        - name: OLLAMA_TIMEOUT
          value: "120.0"
        - name: OLLAMA_MAX_RETRIES
          value: "3"
        - name: OLLAMA_BASE_DELAY
          value: "5.0"
        - name: OLLAMA_MAX_DELAY
          value: "60.0"
        - name: USE_LLM_EVALUATION
          value: "true"
        - name: DATABASE_ONLY
          value: "false"
        - name: USE_CACHE
          value: "true"
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        volumeMounts:
        - name: shared-logs
          mountPath: /app/logs
      volumes:
      - name: shared-logs
        emptyDir: {}
      restartPolicy: Never
  backoffLimit: 1 