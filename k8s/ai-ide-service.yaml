apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-ide-service
  namespace: trading-system
  labels:
    app: ai-ide-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-ide-service
  template:
    metadata:
      labels:
        app: ai-ide-service
    spec:
      containers:
      - name: ai-ide-service
        image: localhost:32000/ai-ide-service:latest
        ports:
        - containerPort: 11050
        env:
        - name: OLLAMA_URL
          value: "http://host.docker.internal:11434"
        - name: VECTOR_STORAGE_URL
          value: "http://postgres-vector-storage:80"
        - name: LLM_MODEL
          value: "gpt-oss:20b"
        - name: ARCHITECTURE_MODEL
          value: "llama3.1:8b-instruct-q6_K"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 11050
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 11050
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: ai-ide-service
  namespace: trading-system
  labels:
    app: ai-ide-service
spec:
  type: ClusterIP
  ports:
  - port: 11050
    targetPort: 11050
    protocol: TCP
  selector:
    app: ai-ide-service
