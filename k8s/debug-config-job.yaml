apiVersion: batch/v1
kind: Job
metadata:
  name: debug-config
  namespace: trading-system
spec:
  template:
    spec:
      containers:
      - name: debug-config
        image: localhost:5000/trading-system:latest
        command: ["python", "/app/debug_config.py"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: database-url
        - name: LOG_LEVEL
          value: "DEBUG"
      restartPolicy: Never
      serviceAccountName: trading-service-account 