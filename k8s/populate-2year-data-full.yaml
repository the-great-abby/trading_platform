apiVersion: batch/v1
kind: Job
metadata:
  name: populate-2year-data-full
  namespace: trading-system
spec:
  template:
    spec:
      containers:
      - name: populate-data
        image: localhost:5000/trading-system:latest
        command: ["python", "populate_2year_data_full.py"]
        env:
        - name: DATABASE_URL
          value: "postgresql://trading_user:trading_pass@postgres-dev:5432/trading_bot"
        - name: POLYGON_API_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: polygon-api-key
        - name: PYTHONPATH
          value: "/app"
        - name: LOG_LEVEL
          value: "INFO"
        - name: DATABASE_ONLY
          value: "false"
      restartPolicy: Never 