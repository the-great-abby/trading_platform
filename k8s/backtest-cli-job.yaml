apiVersion: batch/v1
kind: Job
metadata:
  name: backtest-cli-job
  namespace: trading-system
  labels:
    app: backtest-cli
    component: data-management
spec:
  template:
    metadata:
      labels:
        app: backtest-cli
        component: data-management
    spec:
      containers:
      - name: backtest-cli
        image: trading-bot:latest
        imagePullPolicy: Never
        imagePullPolicy: IfNotPresent
        command: ["python"]
        args: ["scripts/backtest_cli.py", "list"]  # Default command, can be overridden
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: database-url
        - name: ALPHA_VANTAGE_API_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: alpha-vantage-api-key
        - name: POLYGON_API_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: polygon-api-key
        - name: REDIS_URL
          value: "redis://redis-service:6379"
        - name: RABBITMQ_URL
          value: "amqp://trading_user:trading_pass@rabbitmq-service:5672/trading_vhost"
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka-service:9092"
        - name: PYTHONPATH
          value: "/app/src"
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        volumeMounts:
        - name: logs-volume
          mountPath: /app/logs
        - name: data-volume
          mountPath: /app/data
      volumes:
      - name: logs-volume
        emptyDir: {}
      - name: data-volume
        persistentVolumeClaim:
          claimName: backtest-data-pvc
      restartPolicy: Never
      backoffLimit: 3 