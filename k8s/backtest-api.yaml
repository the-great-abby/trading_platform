apiVersion: apps/v1
kind: Deployment
metadata:
  name: backtest-api
  namespace: trading-system
  labels:
    app: backtest-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backtest-api
  template:
    metadata:
      labels:
        app: backtest-api
    spec:
      containers:
      - name: backtest-api
        image: localhost:32000/backtest-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 11101
        env:
        - name: DB_HOST
          value: "timescaledb.trading-system.svc.cluster.local"
        - name: DB_NAME
          value: "trading_bot"
        - name: DB_USER
          value: "trading_user"
        - name: DB_PASSWORD
          value: "trading_pass"
        - name: DB_PORT
          value: "5432"
        - name: LOG_LEVEL
          value: "INFO"
        - name: ENVIRONMENT
          value: "production"
        - name: API_PORT
          value: "11101"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 11101
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 11101
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: backtest-api
  namespace: trading-system
  labels:
    app: backtest-api
spec:
  selector:
    app: backtest-api
  ports:
  - protocol: TCP
    port: 11101
    targetPort: 11101
    name: http
  type: ClusterIP 