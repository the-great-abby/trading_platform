apiVersion: batch/v1
kind: Job
metadata:
  name: create-news-tables-job
  namespace: trading-system
  labels:
    app: create-news-tables
    job-type: database-setup
spec:
  template:
    metadata:
      labels:
        app: create-news-tables
    spec:
      containers:
      - name: create-news-tables
        image: trading-bot:latest
        imagePullPolicy: Never
        command: ["python"]
        args: ["create_news_tables.py"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: database-url
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
        volumeMounts:
        - name: shared-data
          mountPath: /app/data
      volumes:
      - name: shared-data
        persistentVolumeClaim:
          claimName: backtest-data-pvc
      restartPolicy: Never
  backoffLimit: 3 