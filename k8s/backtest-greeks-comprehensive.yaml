apiVersion: batch/v1
kind: Job
metadata:
  name: backtest-greeks-comprehensive
  namespace: trading-system
spec:
  template:
    spec:
      containers:
      - name: backtest
        image: localhost:32000/trading-system:latest
        command: ["python", "run_greeks_comprehensive_backtest.py"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: database-url
        - name: POLYGON_API_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: polygon-api-key
        - name: ALPHA_VANTAGE_API_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: alpha-vantage-api-key
        - name: IEX_CLOUD_API_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: iex-cloud-api-key
        - name: OLLAMA_URL
          value: "http://ollama:11434"
        - name: OLLAMA_MODEL
          value: "granite3.3:2b"
        - name: OLLAMA_TIMEOUT
          value: "60.0"
        - name: OLLAMA_MAX_RETRIES
          value: "3"
        - name: OLLAMA_BASE_DELAY
          value: "10.0"
        - name: OLLAMA_MAX_DELAY
          value: "300.0"
        - name: LOG_LEVEL
          value: "INFO"
        - name: DATABASE_ONLY
          value: "false"
        - name: DISABLE_LLM_ANALYSIS
          value: "false"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
      restartPolicy: Never 