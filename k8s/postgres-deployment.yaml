apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: timescaledb-pvc
  namespace: trading-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: local-path
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: trading-system
data:
  postgresql.conf: |
    # Basic PostgreSQL settings
    max_connections = 100
    shared_buffers = 256MB
    effective_cache_size = 1GB
    maintenance_work_mem = 64MB
    checkpoint_completion_target = 0.9
    wal_buffers = 16MB
    default_statistics_target = 100
    random_page_cost = 1.1
    effective_io_concurrency = 200
    work_mem = 4MB
    min_wal_size = 1GB
    max_wal_size = 4GB
    
    # TimescaleDB settings
    shared_preload_libraries = 'timescaledb'
    timescaledb.max_background_workers = 8
    timescaledb.license = 'apache'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: timescaledb
  namespace: trading-system
  labels:
    app: timescaledb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: timescaledb
  template:
    metadata:
      labels:
        app: timescaledb
    spec:
      containers:
      - name: postgres
        image: timescale/timescaledb:latest-pg15
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: "trading_bot"
        - name: POSTGRES_USER
          value: "trading_user"
        - name: POSTGRES_PASSWORD
          value: "trading_pass"
        - name: PGDATA
          value: "/var/lib/postgresql/data/pgdata"
        volumeMounts:
        - name: timescaledb-storage
          mountPath: /var/lib/postgresql/data
        - name: postgres-config
          mountPath: /etc/postgresql/postgresql.conf
          subPath: postgresql.conf
        - name: init-scripts
          mountPath: /docker-entrypoint-initdb.d
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
      volumes:
      - name: timescaledb-storage
        persistentVolumeClaim:
          claimName: timescaledb-pvc
      - name: postgres-config
        configMap:
          name: postgres-config
      - name: init-scripts
        configMap:
          name: postgres-init-scripts
---
apiVersion: v1
kind: Service
metadata:
  name: timescaledb
  namespace: trading-system
  labels:
    app: timescaledb
spec:
  selector:
    app: timescaledb
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-scripts
  namespace: trading-system
data:
  01-init.sql: |
    -- Enable TimescaleDB extension
    CREATE EXTENSION IF NOT EXISTS timescaledb;
    
    -- Create hypertable for historical_prices (time-series optimized)
    CREATE TABLE IF NOT EXISTS historical_prices (
        symbol VARCHAR(10) NOT NULL,
        date DATE NOT NULL,
        open_price DECIMAL(10,4) NOT NULL,
        high_price DECIMAL(10,4) NOT NULL,
        low_price DECIMAL(10,4) NOT NULL,
        close_price DECIMAL(10,4) NOT NULL,
        volume INTEGER NOT NULL,
        provider VARCHAR(50) NOT NULL,
        interval VARCHAR(10) NOT NULL DEFAULT '1d',
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
    
    -- Convert to hypertable for better time-series performance
    SELECT create_hypertable('historical_prices', 'date', if_not_exists => TRUE);
    
    -- Create compressed hypertable for older data (optional)
    -- SELECT add_compression_policy('historical_prices', INTERVAL '7 days');
    
    -- Create market data cache table
    CREATE TABLE IF NOT EXISTS market_data_cache (
        symbol VARCHAR(10) NOT NULL,
        provider VARCHAR(50) NOT NULL,
        interval VARCHAR(10) NOT NULL DEFAULT '1d',
        earliest_date DATE,
        latest_date DATE,
        total_records INTEGER DEFAULT 0,
        last_updated TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        PRIMARY KEY (symbol, provider, interval)
    );
    
    -- Create indexes for better performance
    CREATE INDEX IF NOT EXISTS idx_symbol_date ON historical_prices(symbol, date);
    CREATE INDEX IF NOT EXISTS idx_provider_symbol ON historical_prices(provider, symbol);
    CREATE INDEX IF NOT EXISTS idx_cache_symbol ON market_data_cache(symbol);
    CREATE INDEX IF NOT EXISTS idx_cache_provider ON market_data_cache(provider);
    
    -- Create continuous aggregates for common queries (optional)
    -- CREATE MATERIALIZED VIEW daily_stats AS
    -- SELECT 
    --     symbol,
    --     date_trunc('day', date) as day,
    --     avg(close_price) as avg_close,
    --     max(high_price) as max_high,
    --     min(low_price) as min_low,
