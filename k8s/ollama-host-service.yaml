apiVersion: v1
kind: Service
metadata:
  name: ollama-host
  namespace: ollama-controller
  labels:
    app: ollama-host
    purpose: "connect-workers-to-host-ollama"
spec:
  type: ExternalName
  externalName: host.docker.internal
  ports:
  - name: ollama-api
    port: 11434
    targetPort: 11434
    protocol: TCP
---
# Also create a service in the trading-system namespace for direct access
apiVersion: v1
kind: Service
metadata:
  name: ollama-host
  namespace: trading-system
  labels:
    app: ollama-host
    purpose: "connect-trading-system-to-host-ollama"
spec:
  type: ExternalName
  externalName: host.docker.internal
  ports:
  - name: ollama-api
    port: 11434
    targetPort: 11434
    protocol: TCP
