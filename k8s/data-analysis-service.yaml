apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-analysis-service
  namespace: trading-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-analysis-service
  template:
    metadata:
      labels:
        app: data-analysis-service
    spec:
      containers:
      - name: data-analysis-service
        image: localhost:32000/data-analysis-service:latest
        ports:
        - containerPort: 11136
        env:
        - name: DATABASE_URL
          value: "postgresql://postgres:password@postgres-timescale-external.postgres-infra.svc.cluster.local:5432/trading_bot"
        - name: TRANSFORMATION_PIPELINE_URL
          value: "http://data-transformation-pipeline:11135"
        - name: AI_ANALYSIS_URL
          value: "http://ai-analysis-service:11085"
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 11136
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 11136
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: data-analysis-service
  namespace: trading-system
spec:
  type: ClusterIP
  ports:
  - port: 11136
    targetPort: 11136
    protocol: TCP
    name: http
  selector:
    app: data-analysis-service 