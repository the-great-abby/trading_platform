# Enhanced Risk Management Service - Kubernetes Deployment
# Advanced Risk Management with VaR, CVaR, Stress Testing, Factor Analysis, and Risk Monitoring

---
# Enhanced Risk Management Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: enhanced-risk-management-service
  namespace: trading-system
  labels:
    app: enhanced-risk-management-service
    component: risk-management
    version: "3.0.0"
    service-type: "advanced-risk-management"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: enhanced-risk-management-service
  template:
    metadata:
      labels:
        app: enhanced-risk-management-service
        component: risk-management
        version: "3.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: enhanced-risk-management-service
        image: localhost:32000/enhanced-risk-management-service:latest
        ports:
        - containerPort: 8081
          name: http
          protocol: TCP
        env:
        # Database Configuration
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: database-url
        - name: REDIS_URL
          value: "redis://redis.redis.svc.cluster.local:6379/3"
        
        # Risk Management Configuration
        - name: VAR_CONFIDENCE_LEVELS
          value: "0.95,0.99"
        - name: CVAR_CONFIDENCE_LEVELS
          value: "0.95,0.99"
        - name: VAR_LOOKBACK_PERIOD
          value: "252"
        - name: MAX_PORTFOLIO_VOLATILITY
          value: "0.30"
        - name: MAX_SINGLE_ASSET_WEIGHT
          value: "0.20"
        - name: MAX_SECTOR_WEIGHT
          value: "0.40"
        - name: MAX_CORRELATION_LIMIT
          value: "0.80"
        - name: MIN_CASH_RESERVE
          value: "0.05"
        
        # Risk Alert Thresholds
        - name: VAR_BREACH_THRESHOLD
          value: "0.05"
        - name: VOLATILITY_BREACH_THRESHOLD
          value: "0.25"
        - name: CONCENTRATION_BREACH_THRESHOLD
          value: "0.18"
        - name: CORRELATION_BREACH_THRESHOLD
          value: "0.75"
        
        # Stress Testing Configuration
        - name: ENABLE_STRESS_TESTING
          value: "true"
        - name: STRESS_TEST_SCENARIOS
          value: "Market Crash:-0.20,Interest Rate Shock:0.02,Currency Crisis:-0.15"
        - name: STRESS_TEST_FREQUENCY
          value: "daily"
        
        # Factor Analysis Configuration
        - name: ENABLE_FACTOR_ANALYSIS
          value: "true"
        - name: FACTOR_MODEL_TYPE
          value: "Fama-French"
        - name: FACTOR_LOOKBACK_PERIOD
          value: "252"
        - name: FACTOR_REBALANCING_FREQUENCY
          value: "monthly"
        
        # Risk Monitoring Configuration
        - name: ENABLE_RISK_MONITORING
          value: "true"
        - name: RISK_MONITORING_FREQUENCY
          value: "real-time"
        - name: RISK_ALERT_ENABLED
          value: "true"
        - name: RISK_REPORTING_FREQUENCY
          value: "daily"
        
        # Correlation Analysis Configuration
        - name: ENABLE_CORRELATION_ANALYSIS
          value: "true"
        - name: CORRELATION_LOOKBACK_PERIOD
          value: "252"
        - name: CORRELATION_THRESHOLD
          value: "0.80"
        - name: DYNAMIC_CORRELATION_ENABLED
          value: "true"
        
        # Risk Attribution Configuration
        - name: ENABLE_RISK_ATTRIBUTION
          value: "true"
        - name: ATTRIBUTION_MODEL
          value: "Brinson"
        - name: ATTRIBUTION_FREQUENCY
          value: "daily"
        
        # API Configuration
        - name: PORT
          value: "8081"
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: trading-config
              key: LOG_LEVEL
        - name: ENABLE_METRICS
          value: "true"
        - name: METRICS_RETENTION_DAYS
          value: "90"
        
        # Performance Configuration
        - name: MAX_CONCURRENT_RISK_CALCULATIONS
          value: "10"
        - name: RISK_CALCULATION_TIMEOUT_SECONDS
          value: "180"
        - name: CACHE_RISK_RESULTS
          value: "true"
        - name: CACHE_DURATION_HOURS
          value: "6"
        
        # Health and Monitoring
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        
        # Resource Management
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        
        # Volume Mounts
        volumeMounts:
        - name: risk-config
          mountPath: /app/config
          readOnly: true
        - name: risk-cache
          mountPath: /app/cache
        - name: risk-logs
          mountPath: /app/logs
        
        # Security Context
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      
      # Volumes
      volumes:
      - name: risk-config
        configMap:
          name: enhanced-risk-management-config
      - name: risk-cache
        emptyDir:
          sizeLimit: 2Gi
      - name: risk-logs
        emptyDir:
          sizeLimit: 1Gi
      
      # Security Context
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
      
      # Restart Policy
      restartPolicy: Always
      
      # Termination Grace Period
      terminationGracePeriodSeconds: 30

---
# Enhanced Risk Management Service
apiVersion: v1
kind: Service
metadata:
  name: enhanced-risk-management-service
  namespace: trading-system
  labels:
    app: enhanced-risk-management-service
    component: risk-management
    version: "3.0.0"
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8081"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app: enhanced-risk-management-service
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 8081
  - name: metrics
    protocol: TCP
    port: 9091
    targetPort: 8081
    path: "/metrics"
  type: ClusterIP
  sessionAffinity: None

---
# Enhanced Risk Management Service ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: enhanced-risk-management-config
  namespace: trading-system
  labels:
    app: enhanced-risk-management-service
    component: risk-management
data:
  risk_config.json: |
    {
      "risk_management": {
        "var_confidence_levels": [0.95, 0.99],
        "cvar_confidence_levels": [0.95, 0.99],
        "var_lookback_period": 252,
        "max_portfolio_volatility": 0.30,
        "max_single_asset_weight": 0.20,
        "max_sector_weight": 0.40,
        "max_correlation_limit": 0.80,
        "min_cash_reserve": 0.05,
        "stress_test_scenarios": [
          {"name": "Market Crash", "shock_return": -0.20},
          {"name": "Interest Rate Shock", "shock_return": 0.02},
          {"name": "Currency Crisis", "shock_return": -0.15},
          {"name": "Tech Bubble Burst", "shock_return": -0.30},
          {"name": "Energy Crisis", "shock_return": -0.25}
        ],
        "risk_alert_thresholds": {
          "var_breach": 0.05,
          "volatility_breach": 0.25,
          "concentration_breach": 0.18,
          "correlation_breach": 0.75,
          "leverage_breach": 1.5,
          "liquidity_breach": 0.10
        }
      },
      "stress_testing": {
        "enabled": true,
        "frequency": "daily",
        "scenarios": [
          {"name": "Market Crash", "shock_return": -0.20, "probability": 0.05},
          {"name": "Interest Rate Shock", "shock_return": 0.02, "probability": 0.10},
          {"name": "Currency Crisis", "shock_return": -0.15, "probability": 0.08},
          {"name": "Tech Bubble Burst", "shock_return": -0.30, "probability": 0.03},
          {"name": "Energy Crisis", "shock_return": -0.25, "probability": 0.05}
        ],
        "monte_carlo_simulations": 10000,
        "confidence_levels": [0.95, 0.99],
        "time_horizons": [1, 5, 10, 30]
      },
      "factor_analysis": {
        "enabled": true,
        "model_type": "Fama-French",
        "factors": ["market", "size", "value", "momentum", "quality", "volatility"],
        "lookback_period": 252,
        "rebalancing_frequency": "monthly",
        "factor_loading_threshold": 0.1,
        "factor_exposure_limits": {
          "market": 1.5,
          "size": 0.5,
          "value": 0.5,
          "momentum": 0.3,
          "quality": 0.3,
          "volatility": 0.3
        }
      },
      "risk_monitoring": {
        "enabled": true,
        "frequency": "real-time",
        "alert_enabled": true,
        "reporting_frequency": "daily",
        "escalation_thresholds": {
          "warning": 0.75,
          "critical": 0.90,
          "emergency": 0.95
        },
        "notification_channels": ["email", "slack", "webhook"]
      },
      "correlation_analysis": {
        "enabled": true,
        "lookback_period": 252,
        "correlation_threshold": 0.80,
        "dynamic_correlation_enabled": true,
        "correlation_window": 63,
        "correlation_update_frequency": "daily"
      },
      "risk_attribution": {
        "enabled": true,
        "attribution_model": "Brinson",
        "frequency": "daily",
        "components": ["asset_selection", "sector_allocation", "interaction"],
        "benchmark": "SPY"
      },
      "performance": {
        "max_concurrent_calculations": 10,
        "calculation_timeout_seconds": 180,
        "cache_results": true,
        "cache_duration_hours": 6,
        "enable_parallel_processing": true,
        "max_workers": 4
      },
      "reporting": {
        "enable_risk_reports": true,
        "report_frequency": "daily",
        "report_formats": ["json", "csv", "pdf"],
        "include_charts": true,
        "include_attribution": true,
        "include_stress_tests": true
      }
    }

---
# HorizontalPodAutoscaler for Enhanced Risk Management Service
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: enhanced-risk-management-service-hpa
  namespace: trading-system
  labels:
    app: enhanced-risk-management-service
    component: risk-management
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: enhanced-risk-management-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Max

---
# PodDisruptionBudget for Enhanced Risk Management Service
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: enhanced-risk-management-service-pdb
  namespace: trading-system
  labels:
    app: enhanced-risk-management-service
    component: risk-management
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: enhanced-risk-management-service

---
# NetworkPolicy for Enhanced Risk Management Service
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: enhanced-risk-management-service-netpol
  namespace: trading-system
  labels:
    app: enhanced-risk-management-service
    component: risk-management
spec:
  podSelector:
    matchLabels:
      app: enhanced-risk-management-service
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: trading-system
    - podSelector:
        matchLabels:
          app: enhanced-portfolio-service
    - podSelector:
        matchLabels:
          app: unified-trading-dashboard
    - podSelector:
        matchLabels:
          app: unified-analytics-dashboard
    ports:
    - protocol: TCP
      port: 8081
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: trading-system
    ports:
    - protocol: TCP
      port: 5432  # PostgreSQL/TimescaleDB
    - protocol: TCP
      port: 6379  # Redis
    - protocol: TCP
      port: 5672  # RabbitMQ
  - to: []  # Allow external API calls for market data
    ports:
    - protocol: TCP
      port: 443  # HTTPS
    - protocol: TCP
      port: 80   # HTTP

