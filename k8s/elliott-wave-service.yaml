apiVersion: apps/v1
kind: Deployment
metadata:
  name: elliott-wave-service
  namespace: trading-system
  labels:
    app: elliott-wave-service
    service: technical-analysis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elliott-wave-service
  template:
    metadata:
      labels:
        app: elliott-wave-service
        service: technical-analysis
    spec:
      containers:
      - name: elliott-wave-service
        image: localhost:32000/elliott-wave-service:latest
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: MARKET_DATA_SERVICE_URL
          value: "http://market-data-service.trading-system.svc.cluster.local:11084"
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /elliott-wave/health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 60
          timeoutSeconds: 10
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /elliott-wave/health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: elliott-wave-service
  namespace: trading-system
  labels:
    app: elliott-wave-service
    service: technical-analysis
spec:
  selector:
    app: elliott-wave-service
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP
  type: ClusterIP
