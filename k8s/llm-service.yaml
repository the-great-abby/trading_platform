apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-service-config
  namespace: trading-system
data:
  LLM_SERVICE_CONFIG: |
    {
      "base_url": "http://llm-proxy:8081",
      "api_key": "",
      "timeout": 30,
      "max_retries": 3,
      "rate_limit_requests": 100,
      "rate_limit_window": 60,
      "cache_ttl": 300,
      "health_check_interval": 60
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-service
  namespace: trading-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: llm-service
  template:
    metadata:
      labels:
        app: llm-service
    spec:
      containers:
      - name: llm-service
        image: localhost:32000/llm-service:latest
        ports:
        - containerPort: 8008
        env:
        - name: LLM_SERVICE_CONFIG
          valueFrom:
            configMapKeyRef:
              name: llm-service-config
              key: LLM_SERVICE_CONFIG
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: database_url
        - name: RABBITMQ_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: rabbitmq_url
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8008
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8008
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: llm-service
  namespace: trading-system
spec:
  selector:
    app: llm-service
  ports:
  - port: 8008
    targetPort: 8008
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-worker
  namespace: trading-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: llm-worker
  template:
    metadata:
      labels:
        app: llm-worker
    spec:
      containers:
      - name: llm-worker
        image: localhost:32000/llm-worker:latest
        env:
        - name: LLM_SERVICE_CONFIG
          valueFrom:
            configMapKeyRef:
              name: llm-service-config
              key: LLM_SERVICE_CONFIG
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: database_url
        - name: RABBITMQ_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: rabbitmq_url
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m" 