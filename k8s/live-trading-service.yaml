apiVersion: v1
kind: ConfigMap
metadata:
  name: live-trading-service-config
  namespace: trading-system
data:
  DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres-timescale.postgres-infra.svc.cluster.local:5432/trading_bot"
  LOG_LEVEL: "INFO"
  PUBLIC_API_AUTH_BASE_URL: "https://api.public.com/userapiauthservice"
  PUBLIC_API_BASE_URL: "https://api.public.com/userapigateway"
  PUBLIC_API_VERSION: "v1"
  PUBLIC_API_TIMEOUT: "30"
  PUBLIC_API_MAX_RETRIES: "3"
  PUBLIC_API_RATE_LIMIT: "100"
  PUBLIC_API_RATE_LIMIT_WINDOW: "60"
  REDIS_URL: "redis://redis.redis.svc.cluster.local:6379"

---
# Secrets are now centralized in k8s/secrets.yaml:
# - encryption-key: trading-secrets
# - public-api-secret: api-secret
# - database-password: trading-secrets
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: live-trading-service
  namespace: trading-system
  labels:
    app: live-trading-service
    version: v1.0.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app: live-trading-service
  template:
    metadata:
      labels:
        app: live-trading-service
        version: v1.0.0
    spec:
      containers:
      - name: live-trading-service
        image: localhost:32000/live-trading-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: DATABASE_URL
          valueFrom:
            configMapKeyRef:
              name: live-trading-service-config
              key: DATABASE_URL
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: encryption-key
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: live-trading-service-config
              key: LOG_LEVEL
        - name: PUBLIC_API_AUTH_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: live-trading-service-config
              key: PUBLIC_API_AUTH_BASE_URL
        - name: PUBLIC_API_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: live-trading-service-config
              key: PUBLIC_API_BASE_URL
        - name: PUBLIC_API_VERSION
          valueFrom:
            configMapKeyRef:
              name: live-trading-service-config
              key: PUBLIC_API_VERSION
        - name: PUBLIC_API_TIMEOUT
          valueFrom:
            configMapKeyRef:
              name: live-trading-service-config
              key: PUBLIC_API_TIMEOUT
        - name: PUBLIC_API_MAX_RETRIES
          valueFrom:
            configMapKeyRef:
              name: live-trading-service-config
              key: PUBLIC_API_MAX_RETRIES
        - name: PUBLIC_API_RATE_LIMIT
          valueFrom:
            configMapKeyRef:
              name: live-trading-service-config
              key: PUBLIC_API_RATE_LIMIT
        - name: PUBLIC_API_RATE_LIMIT_WINDOW
          valueFrom:
            configMapKeyRef:
              name: live-trading-service-config
              key: PUBLIC_API_RATE_LIMIT_WINDOW
        - name: PUBLIC_API_SECRET
          valueFrom:
            secretKeyRef:
              name: api-secret
              key: public-api-secret
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: live-trading-service-config
              key: REDIS_URL
        - name: DISCORD_WEBHOOK_URL
          valueFrom:
            configMapKeyRef:
              name: discord-config
              key: DISCORD_WEBHOOK_URL
        resources:
          requests:
            memory: "256Mi"  # Increased from 128Mi to accommodate recovery functionality
            cpu: "200m"      # Increased from 100m to accommodate recovery functionality
          limits:
            memory: "512Mi"  # Increased from 256Mi to accommodate recovery functionality
            cpu: "500m"      # Increased from 200m to accommodate recovery functionality
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: live-trading-service
  namespace: trading-system
  labels:
    app: live-trading-service
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: live-trading-service

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: live-trading-service-ingress
  namespace: trading-system
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - live-trading.local
    secretName: live-trading-tls
  rules:
  - host: live-trading.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: live-trading-service
            port:
              number: 8080

---
# PodDisruptionBudget disabled for single-replica deployment
# Uncomment for multi-replica production deployments
# apiVersion: policy/v1
# kind: PodDisruptionBudget
# metadata:
#   name: live-trading-service-pdb
#   namespace: trading-system
# spec:
#   minAvailable: 1
#   selector:
#     matchLabels:
#       app: live-trading-service

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: live-trading-service-hpa
  namespace: trading-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: live-trading-service
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
