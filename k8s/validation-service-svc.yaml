apiVersion: v1
kind: Service
metadata:
  name: validation-service
  namespace: trading-system
  labels:
    app: validation-service
    component: validation
    tier: api
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
    service.beta.kubernetes.io/aws-load-balancer-scheme: internal
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP
  - name: metrics
    port: 8001
    targetPort: 8000
    protocol: TCP
  selector:
    app: validation-service
  sessionAffinity: None
---
apiVersion: v1
kind: Service
metadata:
  name: validation-service-headless
  namespace: trading-system
  labels:
    app: validation-service
    component: validation
    tier: api
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP
  selector:
    app: validation-service











