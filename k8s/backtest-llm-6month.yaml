apiVersion: batch/v1
kind: Job
metadata:
  name: backtest-llm-6month
  namespace: trading-system
spec:
  template:
    spec:
      containers:
      - name: backtest
        image: localhost:5000/trading-system:latest
        imagePullPolicy: Never
        command: ["python"]
        args:
        - "run_llm_evaluated_6month_backtest.py"
        env:
        - name: POLYGON_API_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: polygon-api-key
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: database-url
        - name: OLLAMA_URL
          value: "http://ollama:11434"
        - name: OLLAMA_MODEL
          value: "granite3.3:2b"
        - name: USE_LLM_EVALUATION
          value: "true"
        - name: USE_REAL_DATA
          value: "true"
        - name: USE_CACHE
          value: "true"
        # Configurable test period (default: 180 days = 6 months)
        - name: TEST_PERIOD_DAYS
          value: "180"
        # Optional: Specific start date (YYYY-MM-DD format)
        # - name: START_DATE
        #   value: "2024-01-01"
        # Optional: Specific end date (YYYY-MM-DD format, defaults to today)
        # - name: END_DATE
        #   value: "2024-07-01"
        resources:
          requests:
            memory: "2Gi"
            cpu: "1"
          limits:
            memory: "4Gi"
            cpu: "2"
      restartPolicy: Never
  backoffLimit: 1 