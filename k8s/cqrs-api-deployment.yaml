apiVersion: apps/v1
kind: Deployment
metadata:
  name: cqrs-api
  namespace: trading-system
  labels:
    app: cqrs-api
    component: api
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cqrs-api
  template:
    metadata:
      labels:
        app: cqrs-api
        component: api
        tier: frontend
    spec:
      containers:
      - name: cqrs-api
        image: localhost:32000/trading-system:latest
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: redis-url
        - name: RABBITMQ_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: rabbitmq-url
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: jwt-secret-key
        - name: DISCORD_WEBHOOK_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: discord-webhook-url
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: database_url
        - name: API_HOST
          value: "0.0.0.0"
        - name: API_PORT
          value: "8000"
        - name: ENVIRONMENT
          value: "production"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
        command: ["python", "-m", "uvicorn", "src.api.cqrs_api:app", "--host", "0.0.0.0", "--port", "8000"]
---
apiVersion: v1
kind: Service
metadata:
  name: cqrs-api-service
  namespace: trading-system
  labels:
    app: cqrs-api
    component: api
    tier: frontend
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: cqrs-api
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cqrs-api-ingress
  namespace: trading-system
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
spec:
  rules:
  - host: cqrs-api.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: cqrs-api-service
            port:
              number: 8000
