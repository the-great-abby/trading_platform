apiVersion: batch/v1
kind: CronJob
metadata:
  name: order-sync-worker
  namespace: default
  labels:
    app: order-sync-worker
    component: live-trading
spec:
  # Run every 2 minutes during market hours (9:30 AM - 4:00 PM ET)
  # Cron format: minute hour day month day-of-week
  schedule: "*/2 7-14 * * 1-5"  # Every 2 minutes, 9 AM - 4 PM, Mon-Fri
  
  # Keep last 3 successful jobs for debugging
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  
  # Don't start new job if previous one is still running
  concurrencyPolicy: Forbid
  
  jobTemplate:
    metadata:
      labels:
        app: order-sync-worker
        component: live-trading
    spec:
      # Clean up completed pods after 5 minutes
      ttlSecondsAfterFinished: 300
      
      # Allow 2 minutes for sync to complete
      activeDeadlineSeconds: 120
      
      template:
        metadata:
          labels:
            app: order-sync-worker
            component: live-trading
        spec:
          restartPolicy: Never
          
          containers:
          - name: order-sync
            image: curlimages/curl:latest
            imagePullPolicy: IfNotPresent
            
            command:
            - sh
            - -c
            - |
              echo "🔄 Order Sync Worker - $(date)"
              echo "🔍 Syncing pending orders with Public.com..."
              
              # Call the live-trading-service sync endpoint
              RESPONSE=$(curl -s -X POST \
                -H "Content-Type: application/json" \
                http://live-trading-service.default.svc.cluster.local:8080/api/v1/orders/sync/${ACCOUNT_ID})
              
              # Parse response
              SUCCESS=$(echo "$RESPONSE" | grep -o '"success":[^,}]*' | cut -d':' -f2)
              SYNCED=$(echo "$RESPONSE" | grep -o '"synced":[0-9]*' | cut -d':' -f2)
              FILLED=$(echo "$RESPONSE" | grep -o '"filled":[0-9]*' | cut -d':' -f2)
              PENDING=$(echo "$RESPONSE" | grep -o '"still_pending":[0-9]*' | cut -d':' -f2)
              
              echo "📊 Sync Results:"
              echo "   ✅ Synced: ${SYNCED:-0}"
              echo "   💰 Filled: ${FILLED:-0}"
              echo "   ⏳ Still Pending: ${PENDING:-0}"
              
              if [ "$SUCCESS" = "true" ]; then
                echo "✅ Order sync completed successfully"
                exit 0
              else
                echo "❌ Order sync failed"
                echo "Response: $RESPONSE"
                exit 1
              fi
            
            env:
            - name: ACCOUNT_ID
              value: "19c25392-8b61-4b71-a344-0eb04d275528"
            
            resources:
              requests:
                memory: "32Mi"
                cpu: "50m"
              limits:
                memory: "64Mi"
                cpu: "100m"
            
            # Liveness probe to ensure curl is working
            livenessProbe:
              exec:
                command:
                - sh
                - -c
                - "curl --version"
              initialDelaySeconds: 5
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 3

