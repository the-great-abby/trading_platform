apiVersion: apps/v1
kind: Deployment
metadata:
  name: rss-feed-service
  namespace: trading-system
  labels:
    app: rss-feed-service
    service: rss
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rss-feed-service
  template:
    metadata:
      labels:
        app: rss-feed-service
        service: rss
    spec:
      containers:
      - name: rss-feed-service
        image: localhost:5000/rss-feed-service:latest
        ports:
        - containerPort: 8084
        env:
        - name: STRATEGY_SERVICE_URL
          value: "http://strategy-service:8000"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: database-url
        - name: RABBITMQ_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: rabbitmq-url
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8084
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8084
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: rss-feed-service
  namespace: trading-system
  labels:
    app: rss-feed-service
    service: rss
spec:
  selector:
    app: rss-feed-service
  ports:
  - port: 80
    targetPort: 8084
    protocol: TCP
  type: ClusterIP 