apiVersion: apps/v1
kind: Deployment
metadata:
  name: rss-feed-service
  namespace: trading-system
  labels:
    app: rss-feed-service
    service: rss
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rss-feed-service
  template:
    metadata:
      labels:
        app: rss-feed-service
        service: rss
    spec:
      containers:
      - name: rss-feed-service
        image: localhost:32000/rss-feed-service:latest
        ports:
        - containerPort: 11004
        env:
        - name: STRATEGY_SERVICE_URL
          value: "http://strategy-service:80"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: database-url
        - name: RABBITMQ_URL
          value: "amqp://trading_user:trading_pass@rabbitmq-service:5672/trading_vhost"
        - name: LOG_LEVEL
          value: "INFO"
        - name: POLYGON_API_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: polygon_api_key
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 11004
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 11004
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 8
          failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: rss-feed-service
  namespace: trading-system
  labels:
    app: rss-feed-service
    service: rss
spec:
  selector:
    app: rss-feed-service
  ports:
  - port: 80
    targetPort: 11004
    protocol: TCP
  type: ClusterIP 