  namespace: trading-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: central-hub-dashboard
  template:
    metadata:
      labels:
        app: central-hub-dashboard
    spec:
      containers:
      - name: central-hub-dashboard
