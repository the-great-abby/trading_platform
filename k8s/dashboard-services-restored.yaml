# Dashboard Services Restored
# This file restores all the dashboard services that were lost during consolidation

apiVersion: v1
kind: Namespace
metadata:
  name: trading-system

---
# Performance Dashboard - Trading performance analytics
apiVersion: apps/v1
kind: Deployment
metadata:
  name: performance-dashboard
  namespace: trading-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: performance-dashboard
  template:
    metadata:
      labels:
        app: performance-dashboard
    spec:
      containers:
      - name: performance-dashboard
        image: localhost:32000/performance-dashboard:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          value: "postgresql://user:password@postgres:5432/trading"
        - name: BACKTEST_API_URL
          value: "http://trading-ultra-service:11099/api/backtest"
        - name: ANALYTICS_API_URL
          value: "http://trading-ultra-service:11099/api/analytics"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: performance-dashboard
  namespace: trading-system
spec:
  selector:
    app: performance-dashboard
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  type: ClusterIP

---
# Trading Dashboard - Main trading interface
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trading-dashboard-service
  namespace: trading-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trading-dashboard-service
  template:
    metadata:
      labels:
        app: trading-dashboard-service
    spec:
      containers:
      - name: trading-dashboard-service
        image: localhost:32000/trading-dashboard-service:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          value: "postgresql://user:password@postgres:5432/trading"
        - name: MARKET_DATA_SERVICE_URL
          value: "http://trading-ultra-service:11099/api/market-data"
        - name: STRATEGY_SERVICE_URL
          value: "http://trading-ultra-service:11099/api/strategies"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /dashboard/health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /dashboard/health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: trading-dashboard-service
  namespace: trading-system
spec:
  selector:
    app: trading-dashboard-service
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  type: ClusterIP

---
