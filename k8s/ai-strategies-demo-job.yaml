apiVersion: batch/v1
kind: Job
metadata:
  name: ai-strategies-demo
  namespace: trading-system
spec:
  template:
    spec:
      containers:
      - name: ai-strategies-demo
        image: localhost:5000/trading-bot:latest
        command: ["python", "demo_all_ai_strategies.py"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: database-url
        - name: OLLAMA_URL
          value: "http://ollama:11434"
        - name: DATABASE_ONLY_MODE
          value: "true"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
      restartPolicy: Never
  backoffLimit: 3 