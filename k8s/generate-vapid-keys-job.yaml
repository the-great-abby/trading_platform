apiVersion: batch/v1
kind: Job
metadata:
  name: generate-vapid-keys
  namespace: trading-system
  labels:
    app: vapid-key-generator
    job-type: setup
spec:
  template:
    spec:
      serviceAccountName: trading-service-account
      containers:
      - name: vapid-key-generator
        image: localhost:32000/trading-ultra-service:latest
        command: ["python"]
        args:
        - -c
        - |
          import secrets
          import base64
          from cryptography.hazmat.primitives import hashes
          from cryptography.hazmat.primitives.asymmetric import ec
          from cryptography.hazmat.primitives.serialization import Encoding, PublicFormat, PrivateFormat
          from cryptography.hazmat.primitives import serialization
          
          # Generate proper ECDSA P-256 key pair
          private_key = ec.generate_private_key(ec.SECP256R1())
          public_key = private_key.public_key()
          
          # Export private key as raw bytes
          private_key_bytes = private_key.private_bytes(
              encoding=Encoding.DER,
              format=PrivateFormat.PKCS8,
              encryption_algorithm=serialization.NoEncryption()
          )
          
          # Get the raw public key coordinates
          public_numbers = public_key.public_numbers()
          x = public_numbers.x
          y = public_numbers.y
          
          # Create uncompressed format: 0x04 + x + y (65 bytes total)
          public_key_bytes = b'\x04' + x.to_bytes(32, 'big') + y.to_bytes(32, 'big')
          
          # Verify the key format
          print(f"Public key length: {len(public_key_bytes)} bytes")
          print(f"First byte: 0x{public_key_bytes[0]:02x}")
          if len(public_key_bytes) != 65:
              raise ValueError(f"Expected 65 bytes, got {len(public_key_bytes)}")
          if public_key_bytes[0] != 0x04:
              raise ValueError(f"Expected 0x04, got 0x{public_key_bytes[0]:02x}")
          
          # Convert to base64 URL-safe strings (exactly 87 characters for 65 bytes)
          private_key_b64 = base64.urlsafe_b64encode(private_key_bytes).decode('utf-8').rstrip('=')
          public_key_b64 = base64.urlsafe_b64encode(public_key_bytes).decode('utf-8').rstrip('=')
          
          # Verify the base64 length
          print(f"Public key base64 length: {len(public_key_b64)} characters")
          if len(public_key_b64) != 87:
              raise ValueError(f"Expected 87 characters, got {len(public_key_b64)}")
          
          print("=== VAPID Keys Generated ===")
          print(f"VAPID_PUBLIC_KEY={public_key_b64}")
          print(f"VAPID_PRIVATE_KEY={private_key_b64}")
          print("=== Copy these to k8s/vapid-keys-secret.yaml ===")
          
        env:
        - name: PYTHONPATH
          value: "/app/src"
        - name: LOG_LEVEL
          value: "INFO"
        volumeMounts:
        - name: vapid-keys-volume
          mountPath: /app/vapid_keys
      volumes:
      - name: vapid-keys-volume
        emptyDir: {}
      restartPolicy: Never
  backoffLimit: 4
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vapid-keys-config
  namespace: trading-system
data:
  # These will be populated by the job
  vapid-public-key: ""
  vapid-private-key: "" 