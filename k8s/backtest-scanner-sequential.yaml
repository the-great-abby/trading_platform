# Backtest Scanner Jobs - Sequential Processing
# Run one year at a time to avoid API rate limits

---
# 2020 Data Population
apiVersion: batch/v1
kind: Job
metadata:
  name: backtest-scanner-2020
  namespace: trading-system
  labels:
    app: backtest-scanner
    year: "2020"
spec:
  template:
    spec:
      containers:
      - name: backtest-scanner
        image: trading-bot:latest
        imagePullPolicy: IfNotPresent
        command: ["python"]
        args: 
        - "build_backtest_data.py"
        - "--symbols"
        - "AAPL"
        - "MSFT"
        - "GOOGL"
        - "TSLA"
        - "AMZN"
        - "JPM"
        - "BAC"
        - "WFC"
        - "GS"
        - "MS"
        - "JNJ"
        - "PFE"
        - "UNH"
        - "ABBV"
        - "MRK"
        - "XOM"
        - "CVX"
        - "COP"
        - "EOG"
        - "SLB"
        - "SPY"
        - "QQQ"
        - "IWM"
        - "VTI"
        - "VOO"
        - "--start-date"
        - "2020-01-01"
        - "--end-date"
        - "2020-12-31"
        - "--interval"
        - "1d"
        - "--sequential"
        - "--delay-between-symbols"
        - "120"
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: database-url
        - name: ALPHA_VANTAGE_API_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: alpha-vantage-api-key
        - name: POLYGON_API_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: polygon-api-key
        - name: REDIS_URL
          value: "redis://redis-service:6379"
        - name: PYTHONPATH
          value: "/app/src"
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        volumeMounts:
        - name: logs-volume
          mountPath: /app/logs
        - name: data-volume
          mountPath: /app/data
      volumes:
      - name: logs-volume
        emptyDir: {}
      - name: data-volume
        persistentVolumeClaim:
          claimName: backtest-data-pvc
      restartPolicy: Never
  backoffLimit: 3

