apiVersion: batch/v1
kind: Job
metadata:
  name: fix-alembic-heads-job
  namespace: trading-system
spec:
  template:
    spec:
      containers:
      - name: fix
        image: postgres:15
        command: ["/bin/sh", "-c"]
        args:
          - |
            export PGPASSWORD="$POSTGRES_PASSWORD"
            echo "=== FIXING ALEMBIC HEADS ==="
            echo "Current alembic_version table:"
            psql -h $POSTGRES_HOST -U $POSTGRES_USER -d $POSTGRES_DB -c "SELECT * FROM alembic_version;"
            echo "=== CLEARING VERSION TABLE ==="
            psql -h $POSTGRES_HOST -U $POSTGRES_USER -d $POSTGRES_DB -c "DELETE FROM alembic_version;"
            echo "=== SETTING CORRECT VERSION ==="
            psql -h $POSTGRES_HOST -U $POSTGRES_USER -d $POSTGRES_DB -c "INSERT INTO alembic_version (version_num) VALUES ('ca647495b800');"
            echo "=== VERIFYING FIX ==="
            psql -h $POSTGRES_HOST -U $POSTGRES_USER -d $POSTGRES_DB -c "SELECT * FROM alembic_version;"
        env:
        - name: POSTGRES_HOST
          value: "postgres-dev"
        - name: POSTGRES_DB
          value: "trading_bot"
        - name: POSTGRES_USER
          value: "trading_user"
        - name: POSTGRES_PASSWORD
          value: "trading_pass"
      restartPolicy: Never 