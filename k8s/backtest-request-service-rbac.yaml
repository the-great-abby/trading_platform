apiVersion: v1
kind: ServiceAccount
metadata:
  name: backtest-request-service-account
  namespace: trading-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backtest-job-creator
  namespace: trading-system
rules:
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backtest-request-service-binding
  namespace: trading-system
subjects:
- kind: ServiceAccount
  name: backtest-request-service-account
  namespace: trading-system
roleRef:
  kind: Role
  name: backtest-job-creator
  apiGroup: rbac.authorization.k8s.io 