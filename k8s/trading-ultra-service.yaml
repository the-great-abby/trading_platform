apiVersion: apps/v1
kind: Deployment
metadata:
  name: trading-ultra-service
  namespace: trading-system
  labels:
    app: trading-ultra-service
    service: trading
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trading-ultra-service
  template:
    metadata:
      labels:
        app: trading-ultra-service
        service: trading
    spec:
      containers:
      - name: trading-ultra-service
        image: localhost:32000/trading-ultra-service:latest
        ports:
        - containerPort: 11099
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: database-url
        - name: RABBITMQ_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: rabbitmq_url
        - name: POLYGON_API_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: polygon_api_key
        - name: ALPHA_VANTAGE_API_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: alpha_vantage_api_key
        - name: OLLAMA_URL
          value: "http://ollama:11434"
        - name: LOG_LEVEL
          value: "INFO"
        - name: PYTHONPATH
          value: "/app/src"
        # VAPID Keys for Web Push Notifications
        - name: VAPID_PUBLIC_KEY
          valueFrom:
            secretKeyRef:
              name: vapid-keys
              key: vapid-public-key
        - name: VAPID_PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              name: vapid-keys
              key: vapid-private-key
        # Email Configuration
        - name: SMTP_SERVER
          value: "smtp.gmail.com"
        - name: SMTP_PORT
          value: "587"
        - name: SMTP_USERNAME
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: smtp-username
              optional: true
        - name: SMTP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: smtp-password
              optional: true
        - name: SENDER_EMAIL
          value: "noreply@trading-system.com"
        # Slack/Discord Configuration
        - name: SLACK_WEBHOOK_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: slack-webhook-url
              optional: true
        - name: DISCORD_WEBHOOK_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: discord-webhook-url
              optional: true
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 11099
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 11099
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: trading-ultra-service
  namespace: trading-system
  labels:
    app: trading-ultra-service
    service: trading
spec:
  selector:
    app: trading-ultra-service
  ports:
  - port: 80
    targetPort: 11099
    protocol: TCP
  type: ClusterIP 