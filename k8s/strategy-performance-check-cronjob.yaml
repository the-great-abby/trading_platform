apiVersion: batch/v1
kind: CronJob
metadata:
  name: strategy-performance-check
  namespace: trading-system
  labels:
    app: strategy-monitor
    job-type: cronjob
spec:
  schedule: "0 */4 * * *"  # Every 4 hours
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: strategy-monitor
        spec:
          containers:
          - name: strategy-performance-check
            image: localhost:32000/trading-system:latest
            imagePullPolicy: Always
            command: ["python"]
            args: ["run_strategy_performance_monitor.py", "--single-check"]
            env:
            - name: DATABASE_URL
              value: "postgresql://trading_user:trading_password@postgres-service:5432/trading_db"
            - name: REDIS_URL
              value: "redis://redis-service:6379"
            - name: RABBITMQ_URL
              value: "amqp://guest:guest@rabbitmq-service:5672/"
            - name: POLYGON_API_KEY
              valueFrom:
                secretKeyRef:
                  name: trading-secrets
                  key: polygon-api-key
            - name: ALPHA_VANTAGE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: trading-secrets
                  key: alpha-vantage-api-key
            - name: OLLAMA_BASE_URL
              value: "http://192.168.65.3:11434"
            - name: LOG_LEVEL
              value: "INFO"
            resources:
              requests:
                memory: "1Gi"
                cpu: "500m"
              limits:
                memory: "2Gi"
                cpu: "1000m"
            volumeMounts:
            - name: performance-reports
              mountPath: /app/performance_reports
          volumes:
          - name: performance-reports
            persistentVolumeClaim:
              claimName: performance-reports-pvc
          restartPolicy: OnFailure
          serviceAccountName: trading-service-account 