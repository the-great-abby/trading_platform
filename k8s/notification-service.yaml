apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: trading-system
  labels:
    app: notification-service
    service: notification
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
        service: notification
    spec:
      containers:
      - name: notification-service
        image: localhost:32000/notification-service:latest
        ports:
        - containerPort: 8083
        env:
        - name: SMTP_SERVER
          value: "smtp.gmail.com"
        - name: SMTP_PORT
          value: "587"
        - name: SMTP_USERNAME
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: smtp-username
              optional: true
        - name: SMTP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: smtp-password
              optional: true
        - name: SENDER_EMAIL
          value: "noreply@trading-system.com"
        - name: BACKTEST_API_URL
          value: "http://backtest-api:8000"
        - name: DASHBOARD_URL
          value: "http://localhost:8081/dashboard"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8083
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8083
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: trading-system
  labels:
    app: notification-service
    service: notification
spec:
  selector:
    app: notification-service
  ports:
  - port: 80
    targetPort: 8083
    protocol: TCP
  type: ClusterIP 