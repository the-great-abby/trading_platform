apiVersion: apps/v1
kind: Deployment
metadata:
  name: earnings-data-service
  namespace: trading-system
  labels:
    app: earnings-data-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: earnings-data-service
  template:
    metadata:
      labels:
        app: earnings-data-service
    spec:
      containers:
      - name: earnings-data-service
        image: localhost:32000/earnings-data-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          value: "postgresql://trading_user:trading_pass@timescaledb.trading-system.svc.cluster.local:5432/trading_bot"
        - name: LOG_LEVEL
          value: "INFO"
        - name: ENVIRONMENT
          value: "production"
        - name: PORT
          value: "8000"
        - name: POLYGON_API_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: polygon_api_key
        - name: ALPHA_VANTAGE_API_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: alpha_vantage_api_key
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "400m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: earnings-data-service
  namespace: trading-system
  labels:
    app: earnings-data-service
spec:
  selector:
    app: earnings-data-service
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  type: ClusterIP
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: earnings-scanning-cronjob
  namespace: trading-system
  labels:
    app: earnings-scanner
    job-type: cronjob
spec:
  schedule: "0 6 * * 1-5"  # 6 AM on weekdays
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: earnings-scanner
        spec:
          containers:
          - name: earnings-scanner
            image: localhost:32000/earnings-data-service:latest
            command: ["python", "-c"]
            args:
            - |
              import asyncio
              import aiohttp
              import json
              import os
              
              async def fetch_earnings():
                  symbols = ["AAPL", "MSFT", "GOOGL", "AMZN", "TSLA", "META", "NVDA", "NFLX", "AMD", "INTC"]
                  url = "http://earnings-data-service:8000/api/earnings/fetch"
                  payload = {
                      "symbols": symbols,
                      "include_estimates": True,
                      "include_guidance": True
                  }
                  
                  async with aiohttp.ClientSession() as session:
                      async with session.post(url, json=payload) as response:
                          if response.status == 200:
                              result = await response.json()
                              print(f"✅ Earnings fetch started: {result}")
                          else:
                              print(f"❌ Earnings fetch failed: {response.status}")
              
              asyncio.run(fetch_earnings())
            env:
            - name: DATABASE_URL
              value: "postgresql://trading_user:trading_pass@timescaledb.trading-system.svc.cluster.local:5432/trading_bot"
            - name: LOG_LEVEL
              value: "INFO"
          restartPolicy: OnFailure
