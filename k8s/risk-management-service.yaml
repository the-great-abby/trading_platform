---
# Comprehensive Risk Management Service
# Kubernetes deployment configuration for the risk management framework

apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-management-service
  namespace: trading-system
  labels:
    app: risk-management-service
    component: risk-management
    tier: backend
    version: v1.0.0
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: risk-management-service
  template:
    metadata:
      labels:
        app: risk-management-service
        component: risk-management
        tier: backend
        version: v1.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: risk-management-service
        image: localhost:32000/risk-management-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        - containerPort: 9090
          name: metrics
          protocol: TCP
        env:
        # Database Configuration
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: risk-management-config
              key: db.host
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: risk-management-config
              key: db.port
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: risk-management-config
              key: db.name
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: risk-management-secrets
              key: db.user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: risk-management-secrets
              key: db.password
        # Redis Configuration
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: risk-management-config
              key: redis.host
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: risk-management-config
              key: redis.port
        - name: REDIS_DB
          valueFrom:
            configMapKeyRef:
              name: risk-management-config
              key: redis.db
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: risk-management-secrets
              key: redis.password
              optional: true
        # API Configuration
        - name: API_HOST
          value: "0.0.0.0"
        - name: API_PORT
          value: "8080"
        - name: API_DEBUG
          value: "false"
        # Risk Management Configuration
        - name: RISK_MONITORING_FREQUENCY_MINUTES
          valueFrom:
            configMapKeyRef:
              name: risk-management-config
              key: risk.monitoring.frequency_minutes
        - name: VAR_DEFAULT_DATA_PERIOD_DAYS
          valueFrom:
            configMapKeyRef:
              name: risk-management-config
              key: var.default_data_period_days
        - name: VAR_CALCULATION_TIMEOUT_SECONDS
          valueFrom:
            configMapKeyRef:
              name: risk-management-config
              key: var.calculation_timeout_seconds
        - name: STRESS_TEST_TIMEOUT_SECONDS
          valueFrom:
            configMapKeyRef:
              name: risk-management-config
              key: stress_test.timeout_seconds
        - name: CORRELATION_DEFAULT_PERIOD_DAYS
          valueFrom:
            configMapKeyRef:
              name: risk-management-config
              key: correlation.default_period_days
        # External API Keys
        - name: POLYGON_API_KEY
          valueFrom:
            secretKeyRef:
              name: risk-management-secrets
              key: polygon.api_key
              optional: true
        - name: ALPHA_VANTAGE_API_KEY
          valueFrom:
            secretKeyRef:
              name: risk-management-secrets
              key: alpha_vantage.api_key
              optional: true
        # Logging Configuration
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: risk-management-config
              key: logging.level
        - name: LOG_FILE_PATH
          valueFrom:
            configMapKeyRef:
              name: risk-management-config
              key: logging.file_path
              optional: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 10
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
          readOnly: true
        - name: logs-volume
          mountPath: /app/logs
      volumes:
      - name: config-volume
        configMap:
          name: risk-management-config
      - name: logs-volume
        emptyDir: {}
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000

---
# Service for Risk Management Service
apiVersion: v1
kind: Service
metadata:
  name: risk-management-service
  namespace: trading-system
  labels:
    app: risk-management-service
    component: risk-management
    tier: backend
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: metrics
  selector:
    app: risk-management-service

---
# ConfigMap for Risk Management Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: risk-management-config
  namespace: trading-system
  labels:
    app: risk-management-service
    component: risk-management
data:
  # Database Configuration
  db.host: "postgresql-service"
  db.port: "5432"
  db.name: "trading_risk"
  
  # Redis Configuration
  redis.host: "redis-service"
  redis.port: "6379"
  redis.db: "0"
  
  # Risk Management Configuration
  risk.monitoring.frequency_minutes: "15"
  var.default_data_period_days: "252"
  var.calculation_timeout_seconds: "30"
  stress_test.timeout_seconds: "60"
  correlation.default_period_days: "30"
  
  # Logging Configuration
  logging.level: "INFO"
  logging.file_path: "/app/logs/risk-management.log"

---
# Secret for Risk Management Sensitive Data
apiVersion: v1
kind: Secret
metadata:
  name: risk-management-secrets
  namespace: trading-system
  labels:
    app: risk-management-service
    component: risk-management
type: Opaque
data:
  # Database credentials (base64 encoded)
  db.user: cmlza191c2Vy  # risk_user
  db.password: cmlza19wYXNzd29yZA==  # risk_password
  
  # Redis password (base64 encoded, optional)
  redis.password: ""  # Empty if no password
  
  # External API keys (base64 encoded, optional)
  polygon.api_key: ""  # Add your Polygon API key
  alpha_vantage.api_key: ""  # Add your Alpha Vantage API key

---
# HorizontalPodAutoscaler for Risk Management Service
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: risk-management-service-hpa
  namespace: trading-system
  labels:
    app: risk-management-service
    component: risk-management
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: risk-management-service
  minReplicas: 1
  maxReplicas: 2
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60

---
# NetworkPolicy for Risk Management Service
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: risk-management-service-netpol
  namespace: trading-system
  labels:
    app: risk-management-service
    component: risk-management
spec:
  podSelector:
    matchLabels:
      app: risk-management-service
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: trading
    - podSelector:
        matchLabels:
          app: portfolio-service
    - podSelector:
        matchLabels:
          app: trading-engine
    - podSelector:
        matchLabels:
          app: grafana
    ports:
    - protocol: TCP
      port: 8080
    - protocol: TCP
      port: 9090
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: postgresql-service
    ports:
    - protocol: TCP
      port: 5432
  - to:
    - podSelector:
        matchLabels:
          app: redis-service
    ports:
    - protocol: TCP
      port: 6379
  - to: []  # Allow external API calls
    ports:
    - protocol: TCP
      port: 443  # HTTPS
    - protocol: TCP
      port: 80   # HTTP

---
# PodDisruptionBudget for Risk Management Service
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: risk-management-service-pdb
  namespace: trading-system
  labels:
    app: risk-management-service
    component: risk-management
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: risk-management-service
