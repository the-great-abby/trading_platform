apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-all-fixed
  namespace: trading-system
data:
  # Dashboard Provider Configuration
  dashboard-provider.yaml: |
    apiVersion: 1
    
    providers:
      - name: 'Trading System Dashboards'
        orgId: 1
        folder: 'Trading System'
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /etc/grafana/provisioning/dashboards

  # Original dashboards from grafana-dashboards-complete
  ai-performance.json: |
    {
      "id": null,
      "title": "AI Performance Dashboard",
      "tags": ["ai", "llm", "performance", "trading"],
      "style": "dark",
      "timezone": "browser",
      "panels": [
        {
          "id": 1,
          "title": "LLM Request Rate",
          "type": "timeseries",
          "targets": [
            {
              "expr": "rate(llm_requests_total[5m])",
              "legendFormat": "{{operation}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "unit": "reqps"
            }
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0}
        }
      ],
      "time": {"from": "now-1h", "to": "now"},
      "refresh": "30s"
    }
  
  backtest-performance.json: |
    {
      "id": null,
      "title": "Backtest Performance Dashboard",
      "tags": ["backtest", "performance", "trading"],
      "style": "dark",
      "timezone": "browser",
      "panels": [
        {
          "id": 1,
          "title": "Backtest Results",
          "type": "timeseries",
          "targets": [
            {
              "expr": "backtest_total_return",
              "legendFormat": "Total Return"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "unit": "percent"
            }
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0}
        }
      ],
      "time": {"from": "now-1h", "to": "now"},
      "refresh": "30s"
    }
  
  risk-management.json: |
    {
      "id": null,
      "title": "Risk Management Dashboard",
      "tags": ["risk", "management", "trading"],
      "style": "dark",
      "timezone": "browser",
      "panels": [
        {
          "id": 1,
          "title": "Risk Metrics",
          "type": "timeseries",
          "targets": [
            {
              "expr": "risk_metrics_total",
              "legendFormat": "Risk Level"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 50},
                  {"color": "red", "value": 80}
                ]
              }
            }
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0}
        }
      ],
      "time": {"from": "now-1h", "to": "now"},
      "refresh": "30s"
    }
  
  strategy-performance.json: |
    {
      "id": null,
      "title": "Strategy Performance Dashboard",
      "tags": ["strategy", "performance", "trading"],
      "style": "dark",
      "timezone": "browser",
      "panels": [
        {
          "id": 1,
          "title": "Strategy Returns",
          "type": "timeseries",
          "targets": [
            {
              "expr": "strategy_returns_total",
              "legendFormat": "Strategy Performance"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "unit": "percent"
            }
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0}
        }
      ],
      "time": {"from": "now-1h", "to": "now"},
      "refresh": "30s"
    }
  
  system-infrastructure.json: |
    {
      "id": null,
      "title": "System Infrastructure Dashboard",
      "tags": ["infrastructure", "system", "monitoring"],
      "style": "dark",
      "timezone": "browser",
      "panels": [
        {
          "id": 1,
          "title": "Service Health Overview",
          "type": "stat",
          "targets": [
            {
              "expr": "up",
              "legendFormat": "{{job}} - {{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {
                "steps": [
                  {"color": "red", "value": 0},
                  {"color": "green", "value": 1}
                ]
              },
              "unit": "short"
            }
          },
          "gridPos": {"h": 4, "w": 12, "x": 0, "y": 0}
        },
        {
          "id": 2,
          "title": "Market Data HTTP Requests",
          "type": "timeseries",
          "targets": [
            {
              "expr": "market_data_http_requests_total",
              "legendFormat": "{{status}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"}
            }
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4}
        },
        {
          "id": 3,
          "title": "Market Data Response Time",
          "type": "timeseries",
          "targets": [
            {
              "expr": "market_data_http_request_duration_seconds_sum / market_data_http_request_duration_seconds_count",
              "legendFormat": "Average Response Time"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "unit": "s",
              "thresholds": {
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 1},
                  {"color": "red", "value": 5}
                ]
              }
            }
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4}
        },
        {
          "id": 4,
          "title": "Backtest Requests",
          "type": "timeseries",
          "targets": [
            {
              "expr": "backtest_requests_total",
              "legendFormat": "Total Requests"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"}
            }
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12}
        },
        {
          "id": 5,
          "title": "Backtest Queue Depth",
          "type": "timeseries",
          "targets": [
            {
              "expr": "backtest_queue_depth",
              "legendFormat": "Queue Depth"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 10},
                  {"color": "red", "value": 50}
                ]
              }
            }
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12}
        },
        {
          "id": 6,
          "title": "Strategy Requests",
          "type": "timeseries",
          "targets": [
            {
              "expr": "strategy_requests_total",
              "legendFormat": "Total Strategy Requests"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"}
            }
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 20}
        },
        {
          "id": 7,
          "title": "Strategy Response Time",
          "type": "timeseries",
          "targets": [
            {
              "expr": "strategy_request_duration_seconds_sum / strategy_request_duration_seconds_count",
              "legendFormat": "Average Response Time"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "unit": "s",
              "thresholds": {
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 1},
                  {"color": "red", "value": 5}
                ]
              }
            }
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 20}
        },
        {
          "id": 8,
          "title": "Database Status",
          "type": "stat",
          "targets": [
            {
              "expr": "pg_up",
              "legendFormat": "PostgreSQL Status"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {
                "steps": [
                  {"color": "red", "value": 0},
                  {"color": "green", "value": 1}
                ]
              }
            }
          },
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 28}
        },
        {
          "id": 9,
          "title": "RabbitMQ Status",
          "type": "stat",
          "targets": [
            {
              "expr": "rabbitmq_up",
              "legendFormat": "RabbitMQ Status"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {
                "steps": [
                  {"color": "red", "value": 0},
                  {"color": "green", "value": 1}
                ]
              }
            }
          },
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 28}
        },
        {
          "id": 10,
          "title": "System Uptime",
          "type": "stat",
          "targets": [
            {
              "expr": "system_uptime_seconds",
              "legendFormat": "System Uptime (seconds)"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "unit": "s"
            }
          },
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 28}
        },
        {
          "id": 11,
          "title": "Network Interfaces",
          "type": "stat",
          "targets": [
            {
              "expr": "node_network_up",
              "legendFormat": "{{device}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {
                "steps": [
                  {"color": "red", "value": 0},
                  {"color": "green", "value": 1}
                ]
              }
            }
          },
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 28}
        },
        {
          "id": 12,
          "title": "Database Operations",
          "type": "timeseries",
          "targets": [
            {
              "expr": "pg_stat_database_tup_inserted",
              "legendFormat": "Tuples Inserted"
            },
            {
              "expr": "pg_stat_database_tup_updated",
              "legendFormat": "Tuples Updated"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"}
            }
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 32}
        },
        {
          "id": 13,
          "title": "Service Response Times",
          "type": "timeseries",
          "targets": [
            {
              "expr": "market_data_http_request_duration_seconds_sum / market_data_http_request_duration_seconds_count",
              "legendFormat": "Market Data"
            },
            {
              "expr": "strategy_request_duration_seconds_sum / strategy_request_duration_seconds_count",
              "legendFormat": "Strategy Service"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "unit": "s"
            }
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 32}
        }
      ],
      "time": {"from": "now-1h", "to": "now"},
      "refresh": "30s"
    }
  
  trading-engine.json: |
    {
      "id": null,
      "title": "Trading Engine Dashboard",
      "tags": ["trading", "engine", "performance"],
      "style": "dark",
      "timezone": "browser",
      "panels": [
        {
          "id": 1,
          "title": "Trading Engine Performance",
          "type": "timeseries",
          "targets": [
            {
              "expr": "trading_engine_orders_total",
              "legendFormat": "Orders Processed"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "unit": "short"
            }
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0}
        }
      ],
      "time": {"from": "now-1h", "to": "now"},
      "refresh": "30s"
    }
  
  # Fixed Market Data Dashboard
  market-data-dashboard-fixed.json: |
    {
      "id": null,
      "uid": "market-data-dashboard",
      "title": "Market Data Dashboard (Fixed)",
      "tags": ["market-data", "trading"],
      "style": "dark",
      "timezone": "browser",
      "panels": [
        {
          "id": 1,
          "title": "Market Data HTTP Requests",
          "type": "timeseries",
          "targets": [
            {
              "expr": "market_data_http_requests_total",
              "legendFormat": "{{endpoint}} - {{status}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "unit": "short"
            }
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0}
        },
        {
          "id": 2,
          "title": "Market Data Request Rate",
          "type": "timeseries",
          "targets": [
            {
              "expr": "rate(market_data_http_requests_total[5m])",
              "legendFormat": "{{endpoint}} - {{status}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "unit": "reqps"
            }
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0}
        },
        {
          "id": 3,
          "title": "Market Data Response Time",
          "type": "timeseries",
          "targets": [
            {
              "expr": "rate(market_data_http_request_duration_seconds_sum[5m]) / rate(market_data_http_request_duration_seconds_count[5m])",
              "legendFormat": "{{endpoint}} - {{status}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "unit": "s",
              "thresholds": {
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 1},
                  {"color": "red", "value": 5}
                ]
              }
            }
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8}
        },
        {
          "id": 4,
          "title": "Market Data Service Health",
          "type": "stat",
          "targets": [
            {
              "expr": "up{job=\"trading-services\", instance=~\".*market-data.*\"}",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {
                "steps": [
                  {"color": "red", "value": 0},
                  {"color": "green", "value": 1}
                ]
              }
            }
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8}
        },
        {
          "id": 5,
          "title": "Market Data Request Duration Percentiles",
          "type": "timeseries",
          "targets": [
            {
              "expr": "histogram_quantile(0.95, rate(market_data_http_request_duration_seconds_bucket[5m]))",
              "legendFormat": "95th Percentile"
            },
            {
              "expr": "histogram_quantile(0.99, rate(market_data_http_request_duration_seconds_bucket[5m]))",
              "legendFormat": "99th Percentile"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "unit": "s",
              "thresholds": {
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 2},
                  {"color": "red", "value": 5}
                ]
              }
            }
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16}
        },
        {
          "id": 6,
          "title": "Market Data Error Rate",
          "type": "timeseries",
          "targets": [
            {
              "expr": "rate(market_data_http_requests_total{status=~\".*[45].*\"}[5m])",
              "legendFormat": "Error Rate"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "unit": "reqps",
              "thresholds": {
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 0.1},
                  {"color": "red", "value": 1}
                ]
              }
            }
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 16}
        },
        {
          "id": 7,
          "title": "Market Data Success Rate",
          "type": "timeseries",
          "targets": [
            {
              "expr": "rate(market_data_http_requests_total{status=~\".*[23].*\"}[5m])",
              "legendFormat": "Success Rate"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "unit": "reqps"
            }
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 24}
        },
        {
          "id": 8,
          "title": "Market Data Performance Summary",
          "type": "stat",
          "targets": [
            {
              "expr": "market_data_http_requests_total",
              "legendFormat": "Total Requests"
            },
            {
              "expr": "rate(market_data_http_requests_total[5m])",
              "legendFormat": "Request Rate"
            },
            {
              "expr": "rate(market_data_http_request_duration_seconds_sum[5m]) / rate(market_data_http_request_duration_seconds_count[5m])",
              "legendFormat": "Avg Response Time"
            },
            {
              "expr": "up{job=\"trading-services\", instance=~\".*market-data.*\"}",
              "legendFormat": "Service Health"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "green", "value": 0}
                ]
              }
            }
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 24}
        }
      ],
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "refresh": "30s"
    } 