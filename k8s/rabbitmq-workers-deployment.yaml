apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq-workers
  namespace: trading-system
  labels:
    app: rabbitmq-workers
    component: background-workers
spec:
  replicas: 2  # Run 2 worker instances for high availability
  selector:
    matchLabels:
      app: rabbitmq-workers
  template:
    metadata:
      labels:
        app: rabbitmq-workers
        component: background-workers
    spec:
      containers:
      - name: news-worker
        image: trading-bot:latest
        imagePullPolicy: Never
        imagePullPolicy: IfNotPresent
        command: ["python"]
        args: ["-m", "src.services.workers.news_worker"]
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: LOG_LEVEL
          value: "INFO"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: redis-url
        - name: RABBITMQ_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: rabbitmq-url
        - name: KAFKA_BOOTSTRAP_SERVERS
          valueFrom:
            configMapKeyRef:
              name: trading-config
              key: kafka-bootstrap-servers
        - name: EVENTSTORE_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: eventstore-url
        - name: OLLAMA_URL
          valueFrom:
            configMapKeyRef:
              name: trading-config
              key: ollama-url
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - python
            - -c
            - "import asyncio; from src.services.workers.news_worker import NewsWorker; from src.utils.config import Config; asyncio.run(NewsWorker(Config()).health_check())"
          initialDelaySeconds: 30
          periodSeconds: 60
        readinessProbe:
          exec:
            command:
            - python
            - -c
            - "import asyncio; from src.services.queue.rabbitmq_service import RabbitMQService; from src.utils.config import Config; asyncio.run(RabbitMQService(Config()).health_check())"
          initialDelaySeconds: 10
          periodSeconds: 30
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
          readOnly: true
      - name: trading-signal-worker
        image: trading-bot:latest
        imagePullPolicy: Never
        imagePullPolicy: IfNotPresent
        command: ["python"]
        args: ["-m", "src.services.workers.trading_signal_worker"]
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: LOG_LEVEL
          value: "INFO"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: redis-url
        - name: RABBITMQ_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: rabbitmq-url
        - name: KAFKA_BOOTSTRAP_SERVERS
          valueFrom:
            configMapKeyRef:
              name: trading-config
              key: kafka-bootstrap-servers
        - name: EVENTSTORE_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: eventstore-url
        - name: OLLAMA_URL
          valueFrom:
            configMapKeyRef:
              name: trading-config
              key: ollama-url
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - python
            - -c
            - "import asyncio; from src.services.workers.trading_signal_worker import TradingSignalWorker; from src.utils.config import Config; asyncio.run(TradingSignalWorker(Config()).health_check())"
          initialDelaySeconds: 30
          periodSeconds: 60
        readinessProbe:
          exec:
            command:
            - python
            - -c
            - "import asyncio; from src.services.queue.rabbitmq_service import RabbitMQService; from src.utils.config import Config; asyncio.run(RabbitMQService(Config()).health_check())"
          initialDelaySeconds: 10
          periodSeconds: 30
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
          readOnly: true
      volumes:
      - name: config-volume
        configMap:
          name: news-scanning-config
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-workers-service
  namespace: trading-system
  labels:
    app: rabbitmq-workers
spec:
  selector:
    app: rabbitmq-workers
  ports:
  - name: health
    port: 8080
    targetPort: 8080
  type: ClusterIP 