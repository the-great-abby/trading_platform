apiVersion: batch/v1
kind: Job
metadata:
  name: backtest-advanced-strategies-real-data
  namespace: trading-system
spec:
  template:
    spec:
      containers:
      - name: backtest
        image: localhost:32000/trading-system:latest
        imagePullPolicy: Always
        command: ["python"]
        args:
        - "run_backtest_with_real_data.py"
        env:
        - name: OLLAMA_URL
          value: "http://ollama:11434"
        - name: DATABASE_URL
          value: "postgresql://trading_user:trading_pass@postgres:5432/trading_bot"
        - name: REDIS_URL
          value: "redis://redis.redis.svc.cluster.local:6379"
        - name: RABBITMQ_URL
          value: "amqp://guest:guest@rabbitmq:5672/"
        - name: LOG_LEVEL
          value: "INFO"
        - name: BACKTEST_MODE
          value: "advanced_strategies_real_data"
        - name: USE_AI_ENHANCED_STRATEGIES
          value: "true"
        - name: USE_LLM_EVALUATION
          value: "true"
        - name: DATABASE_ONLY
          value: "true"
        - name: POLYGON_API_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: polygon-api-key
        - name: ALPHA_VANTAGE_API_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: alpha-vantage-api-key
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
      restartPolicy: Never
  backoffLimit: 1 