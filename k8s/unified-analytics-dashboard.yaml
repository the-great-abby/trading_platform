apiVersion: apps/v1
kind: Deployment
metadata:
  name: unified-analytics-dashboard
  namespace: trading-system
  labels:
    app: unified-analytics-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unified-analytics-dashboard
  template:
    metadata:
      labels:
        app: unified-analytics-dashboard
    spec:
      containers:
      - name: unified-analytics-dashboard
        image: localhost:32000/unified-analytics-dashboard:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        env:
        - name: VECTOR_STORAGE_URL
          value: "postgresql://postgres:postgres@postgres-vector-external.postgres-infra.svc.cluster.local:5432/trading"
        - name: LLM_PROXY_URL
          value: "http://ollama-controller-api-service.ollama-controller.svc.cluster.local:12001"
        - name: BACKTEST_API_URL
          value: "http://backtest-api:11101"
        - name: MARKET_DATA_URL
          value: "http://market-data-service:11084"
        - name: RSS_FEED_URL
          value: "http://rss-feed-service:11004"
        - name: NOTIFICATION_SERVICE_URL
          value: "http://notification-service:11111"
        - name: TRANSFORMATION_PIPELINE_URL
          value: "http://data-transformation-pipeline:11135"
        - name: ANALYSIS_SERVICE_URL
          value: "http://data-analysis-service:11136"
        - name: DATABASE_URL
          value: "postgresql://postgres:postgres@postgres-timescale-external.postgres-infra.svc.cluster.local:5432/trading_bot"
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "512Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: unified-analytics-dashboard
  namespace: trading-system
spec:
  selector:
    app: unified-analytics-dashboard
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
  type: ClusterIP 