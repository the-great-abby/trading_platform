apiVersion: apps/v1
kind: Deployment
metadata:
  name: unified-news-dashboard
  namespace: trading-system
  labels:
    app: unified-news-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unified-news-dashboard
  template:
    metadata:
      labels:
        app: unified-news-dashboard
    spec:
      containers:
      - name: unified-news-dashboard
        image: localhost:32000/unified-news-dashboard:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        env:
        - name: RSS_SERVICE_URL
          value: "http://rss-feed-service:11004"
        - name: STRATEGY_SERVICE_URL
          value: "http://strategy-service:11103"
        - name: REFRESH_INTERVAL
          value: "30"
        - name: DATABASE_URL
          value: "postgresql://trading_user:trading_pass@timescaledb.trading-system.svc.cluster.local:5432/trading_bot"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: unified-news-dashboard
  namespace: trading-system
spec:
  selector:
    app: unified-news-dashboard
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
  type: ClusterIP 