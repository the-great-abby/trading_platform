apiVersion: batch/v1
kind: Job
metadata:
  name: backtest-2year-llm
  namespace: trading-system
  labels:
    app: backtest
    type: 2year-llm
spec:
  template:
    metadata:
      labels:
        app: backtest
        type: 2year-llm
    spec:
      containers:
      - name: backtest-2year-llm
        image: localhost:5000/trading-system:latest
        imagePullPolicy: Always
        command: ["python"]
        args: ["run_2year_llm_backtest.py"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: database-url
        - name: REDIS_URL
          value: "redis://redis-dev:6379"
        - name: RABBITMQ_URL
          value: "amqp://guest:guest@rabbitmq-service:5672/"
        - name: OLLAMA_BASE_URL
          value: "http://192.168.65.3:11434"
        - name: OLLAMA_MODEL
          value: "gemma3:1b"
        - name: OLLAMA_TIMEOUT
          value: "10.0"
        - name: POLYGON_API_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: polygon-api-key
        - name: ALPHA_VANTAGE_API_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: alpha-vantage-api-key
        - name: NEWS_API_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: news-api-key
              optional: true
        - name: USE_LLM_EVALUATION
          value: "true"
        - name: USE_CACHE
          value: "true"
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            cpu: "1000m"
            memory: "2Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
        volumeMounts:
        - name: backtest-results
          mountPath: /app/backtest_results
      volumes:
      - name: backtest-results
        persistentVolumeClaim:
          claimName: backtest-results-pvc
      restartPolicy: Never
  backoffLimit: 1
  activeDeadlineSeconds: 7200  # 2 hours timeout 