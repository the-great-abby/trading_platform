  ai-performance.json: "{\n  \"dashboard\": {\n    \"id\": null,\n    \"title\": \"AI
    Performance Dashboard\",\n    \"tags\": [\"ai\", \"llm\", \"performance\", \"trading\"],\n
    \   \"style\": \"dark\",\n    \"timezone\": \"browser\",\n    \"panels\": [\n
    \     {\n        \"id\": 1,\n        \"title\": \"LLM Request Rate\",\n        \"type\":
    \"timeseries\",\n        \"targets\": [\n          {\n            \"expr\": \"rate(llm_requests_total[5m])\",\n
    \           \"legendFormat\": \"{{operation}}\"\n          }\n        ],\n        \"fieldConfig\":
    {\n          \"defaults\": {\n            \"color\": {\"mode\": \"palette-classic\"},\n
    \           \"unit\": \"reqps\"\n          }\n        },\n        \"gridPos\":
    {\"h\": 8, \"w\": 12, \"x\": 0, \"y\": 0}\n      },\n      {\n        \"id\":
    2,\n        \"title\": \"LLM Response Time\",\n        \"type\": \"timeseries\",\n
    \       \"targets\": [\n          {\n            \"expr\": \"rate(llm_request_duration_seconds_sum[5m])
    / rate(llm_request_duration_seconds_count[5m])\",\n            \"legendFormat\":
    \"{{operation}}\"\n          }\n        ],\n        \"fieldConfig\": {\n          \"defaults\":
    {\n            \"color\": {\"mode\": \"thresholds\"},\n            \"unit\": \"s\",\n
    \           \"thresholds\": {\n              \"steps\": [\n                {\"color\":
    \"green\", \"value\": null},\n                {\"color\": \"yellow\", \"value\":
    5},\n                {\"color\": \"red\", \"value\": 10}\n              ]\n            }\n
    \         }\n        },\n        \"gridPos\": {\"h\": 8, \"w\": 12, \"x\": 12,
    \"y\": 0}\n      },\n      {\n        \"id\": 3,\n        \"title\": \"LLM Success
    Rate\",\n        \"type\": \"timeseries\",\n        \"targets\": [\n          {\n
    \           \"expr\": \"rate(llm_successful_requests_total[5m]) / rate(llm_requests_total[5m])
    * 100\",\n            \"legendFormat\": \"Success Rate %\"\n          }\n        ],\n
    \       \"fieldConfig\": {\n          \"defaults\": {\n            \"color\":
    {\"mode\": \"thresholds\"},\n            \"unit\": \"percent\",\n            \"thresholds\":
    {\n              \"steps\": [\n                {\"color\": \"red\", \"value\":
    null},\n                {\"color\": \"yellow\", \"value\": 90},\n                {\"color\":
    \"green\", \"value\": 95}\n              ]\n            }\n          }\n        },\n
    \       \"gridPos\": {\"h\": 8, \"w\": 12, \"x\": 0, \"y\": 8}\n      },\n      {\n
    \       \"id\": 4,\n        \"title\": \"AI Signal Generation Rate\",\n        \"type\":
    \"timeseries\",\n        \"targets\": [\n          {\n            \"expr\": \"rate(ai_signals_generated_total[5m])\",\n
    \           \"legendFormat\": \"AI Signals per Second\"\n          }\n        ],\n
    \       \"fieldConfig\": {\n          \"defaults\": {\n            \"color\":
    {\"mode\": \"palette-classic\"},\n            \"unit\": \"reqps\"\n          }\n
    \       },\n        \"gridPos\": {\"h\": 8, \"w\": 12, \"x\": 12, \"y\": 8}\n
    \     },\n      {\n        \"id\": 5,\n        \"title\": \"AI Signal Accuracy\",\n
    \       \"type\": \"timeseries\",\n        \"targets\": [\n          {\n            \"expr\":
    \"rate(ai_signals_correct_total[5m]) / rate(ai_signals_total[5m]) * 100\",\n            \"legendFormat\":
    \"Signal Accuracy %\"\n          }\n        ],\n        \"fieldConfig\": {\n          \"defaults\":
    {\n            \"color\": {\"mode\": \"thresholds\"},\n            \"unit\": \"percent\",\n
    \           \"thresholds\": {\n              \"steps\": [\n                {\"color\":
    \"red\", \"value\": null},\n                {\"color\": \"yellow\", \"value\":
    60},\n                {\"color\": \"green\", \"value\": 70}\n              ]\n
    \           }\n          }\n        },\n        \"gridPos\": {\"h\": 8, \"w\":
    12, \"x\": 0, \"y\": 16}\n      },\n      {\n        \"id\": 6,\n        \"title\":
    \"AI Model Confidence\",\n        \"type\": \"timeseries\",\n        \"targets\":
    [\n          {\n            \"expr\": \"ai_signal_confidence_avg\",\n            \"legendFormat\":
    \"Average Confidence\"\n          }\n        ],\n        \"fieldConfig\": {\n
    \         \"defaults\": {\n            \"color\": {\"mode\": \"thresholds\"},\n
    \           \"unit\": \"percent\",\n            \"thresholds\": {\n              \"steps\":
    [\n                {\"color\": \"red\", \"value\": null},\n                {\"color\":
    \"yellow\", \"value\": 70},\n                {\"color\": \"green\", \"value\":
    80}\n              ]\n            }\n          }\n        },\n        \"gridPos\":
    {\"h\": 8, \"w\": 12, \"x\": 12, \"y\": 16}\n      },\n      {\n        \"id\":
    7,\n        \"title\": \"LLM Cache Hit Rate\",\n        \"type\": \"timeseries\",\n
    \       \"targets\": [\n          {\n            \"expr\": \"rate(llm_cache_hits_total[5m])
    / (rate(llm_cache_hits_total[5m]) + rate(llm_cache_misses_total[5m])) * 100\",\n
    \           \"legendFormat\": \"Cache Hit Rate %\"\n          }\n        ],\n
    \       \"fieldConfig\": {\n          \"defaults\": {\n            \"color\":
    {\"mode\": \"thresholds\"},\n            \"unit\": \"percent\",\n            \"thresholds\":
    {\n              \"steps\": [\n                {\"color\": \"red\", \"value\":
    null},\n                {\"color\": \"yellow\", \"value\": 50},\n                {\"color\":
    \"green\", \"value\": 80}\n              ]\n            }\n          }\n        },\n
    \       \"gridPos\": {\"h\": 8, \"w\": 12, \"x\": 0, \"y\": 24}\n      },\n      {\n
    \       \"id\": 8,\n        \"title\": \"AI P&L Contribution\",\n        \"type\":
    \"timeseries\",\n        \"targets\": [\n          {\n            \"expr\": \"ai_pnl_contribution\",\n
    \           \"legendFormat\": \"AI P&L Contribution\"\n          }\n        ],\n
    \       \"fieldConfig\": {\n          \"defaults\": {\n            \"color\":
    {\"mode\": \"thresholds\"},\n            \"unit\": \"currencyUSD\",\n            \"thresholds\":
    {\n              \"steps\": [\n                {\"color\": \"red\", \"value\":
    null},\n                {\"color\": \"green\", \"value\": 0}\n              ]\n
    \           }\n          }\n        },\n        \"gridPos\": {\"h\": 8, \"w\":
    12, \"x\": 12, \"y\": 24}\n      },\n      {\n        \"id\": 9,\n        \"title\":
    \"LLM Error Rate\",\n        \"type\": \"timeseries\",\n        \"targets\": [\n
    \         {\n            \"expr\": \"rate(llm_failed_requests_total[5m])\",\n
    \           \"legendFormat\": \"{{error_type}}\"\n          }\n        ],\n        \"fieldConfig\":
    {\n          \"defaults\": {\n            \"color\": {\"mode\": \"thresholds\"},\n
    \           \"unit\": \"reqps\",\n            \"thresholds\": {\n              \"steps\":
    [\n                {\"color\": \"green\", \"value\": null},\n                {\"color\":
    \"red\", \"value\": 0.1}\n              ]\n            }\n          }\n        },\n
    \       \"gridPos\": {\"h\": 8, \"w\": 12, \"x\": 0, \"y\": 32}\n      },\n      {\n
    \       \"id\": 10,\n        \"title\": \"AI Signal Types\",\n        \"type\":
    \"piechart\",\n        \"targets\": [\n          {\n            \"expr\": \"ai_signals_total\",\n
    \           \"legendFormat\": \"{{signal_type}}\"\n          }\n        ],\n        \"fieldConfig\":
    {\n          \"defaults\": {\n            \"color\": {\"mode\": \"palette-classic\"}\n
    \         }\n        },\n        \"gridPos\": {\"h\": 8, \"w\": 12, \"x\": 12,
    \"y\": 32}\n      },\n      {\n        \"id\": 11,\n        \"title\": \"LLM Model
    Performance\",\n        \"type\": \"table\",\n        \"targets\": [\n          {\n
    \           \"expr\": \"llm_model_accuracy\",\n            \"format\": \"table\",\n
    \           \"instant\": true\n          }\n        ],\n        \"transformations\":
    [\n          {\n            \"id\": \"organize\",\n            \"options\": {\n
    \             \"excludeByName\": {\n                \"Time\": true,\n                \"__name__\":
    true,\n                \"job\": true,\n                \"instance\": true\n              },\n
    \             \"indexByName\": {},\n              \"renameByName\": {\n                \"model\":
    \"Model\",\n                \"Value\": \"Accuracy\"\n              }\n            }\n
    \         }\n        ],\n        \"fieldConfig\": {\n          \"defaults\": {\n
    \           \"color\": {\"mode\": \"thresholds\"},\n            \"unit\": \"percent\",\n
    \           \"thresholds\": {\n              \"steps\": [\n                {\"color\":
    \"red\", \"value\": null},\n                {\"color\": \"yellow\", \"value\":
    70},\n                {\"color\": \"green\", \"value\": 80}\n              ]\n
    \           }\n          }\n        },\n        \"gridPos\": {\"h\": 8, \"w\":
    24, \"x\": 0, \"y\": 40}\n      },\n      {\n        \"id\": 12,\n        \"title\":
    \"AI Signal Processing Time\",\n        \"type\": \"timeseries\",\n        \"targets\":
    [\n          {\n            \"expr\": \"rate(ai_signal_processing_duration_seconds_sum[5m])
    / rate(ai_signal_processing_duration_seconds_count[5m])\",\n            \"legendFormat\":
    \"Processing Time\"\n          }\n        ],\n        \"fieldConfig\": {\n          \"defaults\":
    {\n            \"color\": {\"mode\": \"thresholds\"},\n            \"unit\": \"s\",\n
    \           \"thresholds\": {\n              \"steps\": [\n                {\"color\":
    \"green\", \"value\": null},\n                {\"color\": \"yellow\", \"value\":
    1},\n                {\"color\": \"red\", \"value\": 5}\n              ]\n            }\n
    \         }\n        },\n        \"gridPos\": {\"h\": 8, \"w\": 12, \"x\": 0,
    \"y\": 48}\n      }\n    ],\n    \"time\": {\n      \"from\": \"now-1h\",\n      \"to\":
    \"now\"\n    },\n    \"refresh\": \"30s\"\n  }\n} "
