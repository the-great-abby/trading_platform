apiVersion: apps/v1
kind: Deployment
metadata:
  name: backtest-request-service
  namespace: trading-system
  labels:
    app: backtest-request-service
    service: web-interface
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backtest-request-service
  template:
    metadata:
      labels:
        app: backtest-request-service
        service: web-interface
    spec:
      containers:
      - name: backtest-request-service
        image: localhost:5000/backtest-request-service:latest
        ports:
        - containerPort: 8082
        env:
        - name: KUBERNETES_NAMESPACE
          value: "trading-system"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backtest-request-service
  namespace: trading-system
  labels:
    app: backtest-request-service
    service: web-interface
spec:
  selector:
    app: backtest-request-service
  ports:
  - port: 80
    targetPort: 8082
    protocol: TCP
  type: ClusterIP 