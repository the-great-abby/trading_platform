apiVersion: batch/v1
kind: Job
metadata:
  name: backtest-comprehensive-options
  namespace: trading-system
  labels:
    app: backtest
    strategy: comprehensive-options
    cache-integrated: "true"
spec:
  template:
    metadata:
      labels:
        app: backtest
        strategy: comprehensive-options
    spec:
      serviceAccountName: default
      containers:
      - name: backtest
        image: localhost:5000/backtest:latest
        command: ["python", "run_comprehensive_options_backtest.py"]
        env:
        - name: DATABASE_URL
          value: "postgresql://trading_user:trading_pass@postgres-dev:5432/trading_bot"
        - name: POLYGON_API_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: polygon-api-key
        - name: LOG_LEVEL
          value: "INFO"
        - name: CACHE_ONLY
          value: "true"
        - name: ENABLE_LLM_EVALUATION
          value: "false"
        - name: PARALLEL_EXECUTION
          value: "true"
        - name: MAX_WORKERS
          value: "4"
        - name: DATABASE_ONLY
          value: "true"
        resources:
          requests:
            memory: "4Gi"
            cpu: "2000m"
          limits:
            memory: "8Gi"
            cpu: "4000m"
        volumeMounts:
        - name: shared-data
          mountPath: /app/data
      volumes:
      - name: shared-data
        emptyDir: {}
      restartPolicy: Never
  backoffLimit: 2 