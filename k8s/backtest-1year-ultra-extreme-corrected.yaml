apiVersion: batch/v1
kind: Job
metadata:
  name: backtest-1year-ultra-extreme-corrected
  namespace: trading-system
spec:
  template:
    spec:
      serviceAccountName: trading-service-account
      containers:
      - name: backtest
        image: localhost:32000/backtest:latest
        command: ["python", "run_1year_ultra_extreme_backtest_corrected.py"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: database-url
        - name: POLYGON_API_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: polygon-api-key
        - name: ENABLE_LLM_EVALUATION
          value: "false"
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
      restartPolicy: Never
  backoffLimit: 1 