# Enhanced Portfolio Service - Kubernetes Deployment
# Advanced Portfolio Management with MPT, Black-Litterman, Risk Parity, Tax Optimization, and Backtesting

---
# Enhanced Portfolio Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: enhanced-portfolio-service
  namespace: trading-system
  labels:
    app: enhanced-portfolio-service
    component: portfolio-management
    version: "3.0.0"
    service-type: "advanced-portfolio"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: enhanced-portfolio-service
  template:
    metadata:
      labels:
        app: enhanced-portfolio-service
        component: portfolio-management
        version: "3.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: enhanced-portfolio-service
        image: localhost:32000/enhanced-portfolio-service:latest
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        # Database Configuration
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: database-url
        - name: REDIS_URL
          value: "redis://redis.redis.svc.cluster.local:6379/2"
        
        # Portfolio Configuration
        - name: PORTFOLIO_CONFIG_FILE
          value: "/app/config/portfolio_config.json"
        - name: DEFAULT_RISK_TOLERANCE
          value: "MODERATE"
        - name: DEFAULT_BASE_CURRENCY
          value: "USD"
        - name: DEFAULT_REBALANCING_FREQUENCY
          value: "MONTHLY"
        
        # Optimization Configuration
        - name: MPT_RISK_FREE_RATE
          value: "0.02"
        - name: MPT_MAX_ITERATIONS
          value: "1000"
        - name: MPT_CONVERGENCE_TOLERANCE
          value: "1e-6"
        - name: BL_DEFAULT_CONFIDENCE
          value: "0.5"
        - name: BL_DEFAULT_RISK_AVERSION
          value: "3.0"
        
        # Risk Management Configuration
        - name: VAR_CONFIDENCE_LEVELS
          value: "0.95,0.99"
        - name: MAX_PORTFOLIO_VOLATILITY
          value: "0.30"
        - name: MAX_SINGLE_ASSET_WEIGHT
          value: "0.20"
        - name: MAX_SECTOR_WEIGHT
          value: "0.40"
        
        # Rebalancing Configuration
        - name: REBALANCING_DRIFT_THRESHOLD
          value: "0.05"
        - name: REBALANCING_STRATEGY
          value: "intelligent"
        - name: ENABLE_TAX_OPTIMIZATION
          value: "true"
        - name: TAX_LOSS_HARVESTING_THRESHOLD
          value: "0.03"
        
        # Market Data Configuration
        - name: PRIMARY_DATA_SOURCE
          value: "yfinance"
        - name: BACKUP_DATA_SOURCE
          value: "polygon"
        - name: DATA_REFRESH_INTERVAL_MINUTES
          value: "15"
        - name: CACHE_DURATION_HOURS
          value: "1"
        
        # API Configuration
        - name: PORT
          value: "8080"
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: trading-config
              key: LOG_LEVEL
        - name: ENABLE_METRICS
          value: "true"
        - name: METRICS_RETENTION_DAYS
          value: "90"
        
        # Performance Configuration
        - name: MAX_CONCURRENT_OPTIMIZATIONS
          value: "5"
        - name: OPTIMIZATION_TIMEOUT_SECONDS
          value: "300"
        - name: CACHE_OPTIMIZATION_RESULTS
          value: "true"
        
        # Health and Monitoring
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        
        # Resource Management
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        
        # Volume Mounts
        volumeMounts:
        - name: portfolio-config
          mountPath: /app/config
          readOnly: true
        - name: portfolio-cache
          mountPath: /app/cache
        - name: portfolio-logs
          mountPath: /app/logs
        
        # Security Context
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      
      # Volumes
      volumes:
      - name: portfolio-config
        configMap:
          name: enhanced-portfolio-config
      - name: portfolio-cache
        emptyDir:
          sizeLimit: 2Gi
      - name: portfolio-logs
        emptyDir:
          sizeLimit: 1Gi
      
      # Security Context
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
      
      # Restart Policy
      restartPolicy: Always
      
      # Termination Grace Period
      terminationGracePeriodSeconds: 30

---
# Enhanced Portfolio Service
apiVersion: v1
kind: Service
metadata:
  name: enhanced-portfolio-service
  namespace: trading-system
  labels:
    app: enhanced-portfolio-service
    component: portfolio-management
    version: "3.0.0"
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app: enhanced-portfolio-service
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 8080
  - name: metrics
    protocol: TCP
    port: 9090
    targetPort: 8080
    path: "/metrics"
  type: ClusterIP
  sessionAffinity: None

---
# Enhanced Portfolio Service ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: enhanced-portfolio-config
  namespace: trading-system
  labels:
    app: enhanced-portfolio-service
    component: portfolio-management
data:
  portfolio_config.json: |
    {
      "default_risk_tolerance": "MODERATE",
      "default_base_currency": "USD",
      "default_rebalancing_frequency": "MONTHLY",
      "optimization": {
        "mpt_risk_free_rate": 0.02,
        "mpt_max_iterations": 1000,
        "mpt_convergence_tolerance": 1e-6,
        "mpt_max_single_asset_weight": 0.20,
        "mpt_min_single_asset_weight": 0.0,
        "bl_default_confidence": 0.5,
        "bl_default_risk_aversion": 3.0,
        "bl_view_uncertainty": 0.1,
        "bl_tau": 0.05,
        "rp_convergence_tolerance": 1e-6,
        "rp_max_iterations": 1000,
        "rp_risk_budget_method": "equal",
        "default_optimization_type": "MPT",
        "enable_short_selling": false,
        "transaction_cost_rate": 0.001,
        "min_trade_size": 100.0,
        "max_trade_size": 10000.0
      },
      "risk": {
        "var_confidence_levels": [0.95, 0.99],
        "cvar_confidence_levels": [0.95, 0.99],
        "var_lookback_period": 252,
        "max_portfolio_volatility": 0.30,
        "max_single_asset_weight": 0.20,
        "max_sector_weight": 0.40,
        "max_correlation_limit": 0.80,
        "min_cash_reserve": 0.05,
        "stress_test_scenarios": [
          {"name": "Market Crash", "shock_return": -0.20},
          {"name": "Interest Rate Shock", "shock_return": 0.02},
          {"name": "Currency Crisis", "shock_return": -0.15}
        ],
        "risk_alert_thresholds": {
          "var_breach": 0.05,
          "volatility_breach": 0.25,
          "concentration_breach": 0.18,
          "correlation_breach": 0.75
        }
      },
      "rebalancing": {
        "rebalancing_frequency": "MONTHLY",
        "drift_threshold": 0.05,
        "volatility_threshold": 0.02,
        "rebalancing_strategy": "intelligent",
        "max_rebalancing_trades": 20,
        "min_trade_value": 100.0,
        "max_trade_value": 50000.0,
        "transaction_cost_rate": 0.001,
        "market_impact_rate": 0.0005,
        "slippage_rate": 0.0002,
        "enable_tax_optimization": true,
        "tax_loss_harvesting_threshold": 0.03,
        "wash_sale_period_days": 30
      },
      "tax": {
        "short_term_capital_gains_rate": 0.37,
        "long_term_capital_gains_rate": 0.20,
        "dividend_tax_rate": 0.20,
        "interest_tax_rate": 0.37,
        "enable_tax_loss_harvesting": true,
        "min_harvest_amount": 1000.0,
        "wash_sale_period_days": 30,
        "tax_lot_method": "FIFO",
        "enable_tax_reporting": true,
        "tax_year_end": "12-31",
        "generate_1099": true
      },
      "backtesting": {
        "default_start_date": "2020-01-01",
        "default_end_date": "2023-12-31",
        "benchmark_symbol": "SPY",
        "default_transaction_cost": 0.001,
        "default_slippage": 0.0005,
        "default_market_impact": 0.0002,
        "risk_free_rate": 0.02,
        "confidence_levels": [0.95, 0.99],
        "enable_walk_forward": true,
        "walk_forward_window": 252,
        "walk_forward_step": 63
      },
      "market_data": {
        "primary_data_source": "yfinance",
        "backup_data_source": "polygon",
        "data_refresh_interval_minutes": 15,
        "historical_data_days": 1260,
        "real_time_data_enabled": false,
        "cache_duration_hours": 1,
        "max_cache_size_mb": 1000,
        "enable_data_compression": true,
        "api_rate_limit_per_minute": 60,
        "api_timeout_seconds": 30,
        "retry_attempts": 3
      },
      "system": {
        "enable_logging": true,
        "log_level": "INFO",
        "enable_metrics": true,
        "metrics_retention_days": 90,
        "max_concurrent_optimizations": 5,
        "optimization_timeout_seconds": 300,
        "cache_optimization_results": true,
        "cache_duration_hours": 24
      }
    }

---
# HorizontalPodAutoscaler for Enhanced Portfolio Service
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: enhanced-portfolio-service-hpa
  namespace: trading-system
  labels:
    app: enhanced-portfolio-service
    component: portfolio-management
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: enhanced-portfolio-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Max

---
# PodDisruptionBudget for Enhanced Portfolio Service
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: enhanced-portfolio-service-pdb
  namespace: trading-system
  labels:
    app: enhanced-portfolio-service
    component: portfolio-management
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: enhanced-portfolio-service

---
# NetworkPolicy for Enhanced Portfolio Service
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: enhanced-portfolio-service-netpol
  namespace: trading-system
  labels:
    app: enhanced-portfolio-service
    component: portfolio-management
spec:
  podSelector:
    matchLabels:
      app: enhanced-portfolio-service
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: trading-system
    - podSelector:
        matchLabels:
          app: unified-trading-dashboard
    - podSelector:
        matchLabels:
          app: unified-analytics-dashboard
    ports:
    - protocol: TCP
      port: 8080
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: trading-system
    ports:
    - protocol: TCP
      port: 5432  # PostgreSQL/TimescaleDB
    - protocol: TCP
      port: 6379  # Redis
    - protocol: TCP
      port: 5672  # RabbitMQ
  - to: []  # Allow external API calls for market data
    ports:
    - protocol: TCP
      port: 443  # HTTPS
    - protocol: TCP
      port: 80   # HTTP






















