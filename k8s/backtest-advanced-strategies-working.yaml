apiVersion: batch/v1
kind: Job
metadata:
  name: backtest-advanced-strategies-working
  namespace: trading-system
spec:
  template:
    spec:
      containers:
      - name: backtest
        image: trading-system:latest
        imagePullPolicy: Never
        command: ["python"]
        args:
        - "run_advanced_strategies_working.py"
        env:
        - name: OLLAMA_URL
          value: "http://ollama:11434"
        - name: DATABASE_URL
          value: "postgresql://trading_user:trading_password@postgres:5432/trading_db"
        - name: REDIS_URL
          value: "redis://redis.redis.svc.cluster.local:6379"
        - name: RABBITMQ_URL
          value: "amqp://guest:guest@rabbitmq:5672/"
        - name: LOG_LEVEL
          value: "INFO"
        - name: BACKTEST_MODE
          value: "advanced_strategies"
        - name: USE_AI_ENHANCED_STRATEGIES
          value: "true"
        - name: USE_ADVANCED_EXIT_STRATEGIES
          value: "true"
        - name: USE_LLM_EVALUATION
          value: "true"
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
      restartPolicy: Never
  backoffLimit: 1 