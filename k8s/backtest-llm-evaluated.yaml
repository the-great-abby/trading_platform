apiVersion: batch/v1
kind: Job
metadata:
  name: backtest-llm-evaluated
  namespace: trading-system
spec:
  template:
    spec:
      containers:
      - name: backtest
        image: localhost:5000/trading-system:latest
        imagePullPolicy: Never
        command: ["python"]
        args:
        - "run_llm_evaluated_backtest.py"
        env:
        - name: POLYGON_API_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: polygon-api-key
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: database-url
        - name: OLLAMA_URL
          value: "http://ollama:11434"
        - name: OLLAMA_MODEL
          value: "gemma3:1b"
        - name: OLLAMA_TIMEOUT
          value: "300.0"
        - name: USE_LLM_EVALUATION
          value: "true"
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
      restartPolicy: Never
  backoffLimit: 1 