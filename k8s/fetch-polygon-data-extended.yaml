apiVersion: batch/v1
kind: Job
metadata:
  name: fetch-polygon-data-extended
  namespace: default
spec:
  template:
    spec:
      containers:
      - name: fetch-polygon-data
        image: trading-bot:latest
        imagePullPolicy: IfNotPresent
        command: ["python3"]
        args: ["fetch_and_store_polygon_data.py"]
        env:
        - name: POLYGON_API_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: polygon-api-key
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: redis-url
        - name: RABBITMQ_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: rabbitmq-url
        volumeMounts:
        - name: app-volume
          mountPath: /app
        workingDir: /app
      volumes:
      - name: app-volume
        hostPath:
          path: /Users/abby/code/test1
          type: Directory
      restartPolicy: Never
  backoffLimit: 3
