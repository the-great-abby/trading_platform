apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backtest-scanner-ingress
  namespace: trading-bot
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  rules:
  - host: backtest-scanner.local
    http:
      paths:
      - path: /api/v1/scan
        pathType: Prefix
        backend:
          service:
            name: backtest-scanner-service
            port:
              number: 8080
      - path: /api/v1/coverage
        pathType: Prefix
        backend:
          service:
            name: backtest-scanner-service
            port:
              number: 8080
      - path: /api/v1/health
        pathType: Prefix
        backend:
          service:
            name: backtest-scanner-service
            port:
              number: 8080
      - path: /api/v1/metrics
        pathType: Prefix
        backend:
          service:
            name: backtest-scanner-service
            port:
              number: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: backtest-scanner-api
  namespace: trading-bot
  labels:
    app: backtest-scanner-api
spec:
  selector:
    app: backtest-scanner
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  - name: metrics
    port: 9090
    targetPort: 9090
  type: ClusterIP 