apiVersion: v1
kind: Service
metadata:
  name: ollama-controller-api-service
  namespace: trading-system
  labels:
    app: ollama-controller-api
    purpose: "connect-trading-system-to-ollama-controller"
spec:
  type: ExternalName
  externalName: ollama-controller-api-service.ollama-controller.svc.cluster.local
  ports:
  - name: api
    port: 12001
    targetPort: 12001
    protocol: TCP




