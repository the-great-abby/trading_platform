apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-worker
  namespace: trading-system
  labels:
    app: risk-worker
    component: risk-management
    version: v1.0.0
spec:
  replicas: 2  # Run 2 instances for high availability
  selector:
    matchLabels:
      app: risk-worker
  template:
    metadata:
      labels:
        app: risk-worker
        component: risk-management
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      containers:
      - name: risk-worker
        image: localhost:32000/trading-system:latest
        command: ["python", "-m", "src.services.workers.risk_worker", "--worker"]
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: database-url
        - name: RABBITMQ_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: rabbitmq-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: redis-url
        - name: POLYGON_API_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: polygon-api-key
        - name: ALPHA_VANTAGE_API_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: alpha-vantage-api-key
        - name: OLLAMA_URL
          value: "http://ollama:11434"
        - name: ACCOUNT_SIZE
          value: "1000.0"  # $1,000 account size
        - name: RISK_PROFILE
          value: "moderate"  # moderate risk profile
        - name: LOG_LEVEL
          value: "INFO"
        - name: PYTHONPATH
          value: "/app/src"
        - name: WORKER_TYPE
          value: "risk_worker"
        - name: MAX_WORKERS
          value: "4"
        - name: PREFETCH_COUNT
          value: "10"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
          readOnly: true
        - name: logs-volume
          mountPath: /app/logs
      volumes:
      - name: config-volume
        configMap:
          name: risk-config
      - name: logs-volume
        emptyDir: {}
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: risk-worker-service
  namespace: trading-system
  labels:
    app: risk-worker
    component: risk-management
spec:
  selector:
    app: risk-worker
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: risk-config
  namespace: trading-system
  labels:
    app: risk-worker
    component: risk-management
data:
  risk_config.yaml: |
    # Risk Management Configuration
    risk_profile: moderate
    account_size: 1000.0
    
    # Position Limits
    max_position_size: 0.15
    max_position_value: 150.0
    max_sector_concentration: 0.30
    
    # Portfolio Limits
    max_positions: 5
    max_drawdown: 0.25
    min_cash_reserve: 0.10
    
    # Trading Limits
    max_daily_loss: 100.0
    max_daily_trades: 10
    stop_loss_pct: 0.08
    take_profit_pct: 0.15
    
    # Risk Thresholds
    var_95_limit: 0.02
    volatility_limit: 0.30
    
    # Alert Configuration
    high_risk_threshold: 0.7
    medium_risk_threshold: 0.5
    low_risk_threshold: 0.3
    
    # Market Adjustments
    high_volatility_multiplier: 0.7
    low_volatility_multiplier: 1.2
    bull_market_multiplier: 1.1
    bear_market_multiplier: 0.6
    crisis_multiplier: 0.3
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: risk-worker-hpa
  namespace: trading-system
  labels:
    app: risk-worker
    component: risk-management
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: risk-worker
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: risk-worker-pdb
  namespace: trading-system
  labels:
    app: risk-worker
    component: risk-management
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: risk-worker
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: risk-worker-network-policy
  namespace: trading-system
  labels:
    app: risk-worker
    component: risk-management
spec:
  podSelector:
    matchLabels:
      app: risk-worker
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: trading-system
    ports:
    - protocol: TCP
      port: 8000
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: trading-system
    ports:
    - protocol: TCP
      port: 5672  # RabbitMQ
    - protocol: TCP
      port: 5432  # PostgreSQL
    - protocol: TCP
      port: 6379  # Redis
  - to: []  # Allow DNS
    ports:
    - protocol: UDP
      port: 53
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: risk-worker-sa
  namespace: trading-system
  labels:
    app: risk-worker
    component: risk-management
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: risk-worker-role
  namespace: trading-system
  labels:
    app: risk-worker
    component: risk-management
rules:
- apiGroups: [""]
  resources: ["pods", "services", "endpoints"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: risk-worker-role-binding
  namespace: trading-system
  labels:
    app: risk-worker
    component: risk-management
subjects:
- kind: ServiceAccount
  name: risk-worker-sa
  namespace: trading-system
roleRef:
  kind: Role
  name: risk-worker-role
  apiGroup: rbac.authorization.k8s.io 