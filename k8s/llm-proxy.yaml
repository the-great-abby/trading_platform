apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-proxy
  namespace: trading-system
  labels:
    app: llm-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-proxy
  template:
    metadata:
      labels:
        app: llm-proxy
    spec:
      containers:
      - name: llm-proxy
        image: localhost:32000/llm-proxy:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8081
        env:
        - name: LLM_SERVICE_URL
          value: "http://ollama:11434"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: llm-proxy
  namespace: trading-system
  labels:
    app: llm-proxy
spec:
  selector:
    app: llm-proxy
  ports:
  - protocol: TCP
    port: 11081
    targetPort: 8081
    name: http
  type: ClusterIP 