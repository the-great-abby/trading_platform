          value: "http://market-data-service:8004"
        - name: COMPLIANCE_URL
          value: "http://compliance-service:8005"
        - name: ANALYTICS_URL
          value: "http://analytics-service:8006"
        - name: NOTIFICATION_URL
          value: "http://notification-service:8007"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
