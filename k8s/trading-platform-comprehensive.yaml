apiVersion: v1
kind: ConfigMap
metadata:
  name: trading-platform-config
  namespace: trading-system
data:
  # Order Management Configuration
  ORDER_MANAGEMENT_CONFIG: |
    {
      "max_position_size": 10000,
      "max_order_value": 100000,
      "max_daily_value": 1000000,
      "execution_venues": ["NYSE", "NASDAQ", "ARCA"],
      "heartbeat_timeout_minutes": 5,
      "order_validation_rules": ["basic", "risk", "compliance"],
      "order_routing_strategy": "best_execution",
      "order_analytics_enabled": true,
      "order_monitoring_enabled": true
    }
  
  # Strategy Management Configuration
  STRATEGY_MANAGEMENT_CONFIG: |
    {
      "max_strategies_per_user": 50,
      "strategy_validation_rules": ["basic", "risk", "compliance", "performance"],
      "strategy_deployment_targets": ["live", "paper", "backtest"],
      "strategy_monitoring_enabled": true,
      "strategy_analytics_enabled": true,
      "strategy_optimization_enabled": true,
      "strategy_backtesting_enabled": true
    }
  
  # Signal Management Configuration
  SIGNAL_MANAGEMENT_CONFIG: |
    {
      "max_signals_per_user": 1000,
      "signal_validation_rules": ["basic", "accuracy", "performance"],
      "signal_monitoring_enabled": true,
      "signal_analytics_enabled": true,
      "signal_notification_enabled": true,
      "signal_distribution_enabled": true
    }
  
  # Risk Management Configuration
  RISK_MANAGEMENT_CONFIG: |
    {
      "max_daily_loss": 1000,
      "max_position_size": 10000,
      "max_concentration": 0.1,
      "max_correlation": 0.7,
      "var_confidence_level": 0.95,
      "var_time_horizon": 1,
      "stress_test_enabled": true,
      "scenario_analysis_enabled": true
    }
  
  # Market Data Configuration
  MARKET_DATA_CONFIG: |
    {
      "data_providers": ["polygon", "alpha_vantage", "yahoo"],
      "cache_enabled": true,
      "cache_ttl_minutes": 5,
      "real_time_enabled": true,
      "historical_data_enabled": true,
      "options_data_enabled": true,
      "news_data_enabled": true
    }
  
  # Compliance Configuration
  COMPLIANCE_CONFIG: |
    {
      "regulatory_rules": ["SEC", "FINRA", "CFTC"],
      "compliance_checks_enabled": true,
      "audit_trail_enabled": true,
      "reporting_enabled": true,
      "monitoring_enabled": true
    }
  
  # Analytics Configuration
  ANALYTICS_CONFIG: |
    {
      "performance_metrics_enabled": true,
      "risk_metrics_enabled": true,
      "execution_quality_enabled": true,
      "market_impact_enabled": true,
      "correlation_analysis_enabled": true,
      "attribution_analysis_enabled": true
    }
  
  # Notification Configuration
  NOTIFICATION_CONFIG: |
    {
      "email_enabled": true,
      "sms_enabled": true,
      "push_enabled": true,
      "webhook_enabled": true,
      "alert_levels": ["info", "warning", "error", "critical"]
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-management-service
  namespace: trading-system
spec:
  replicas: 3
  selector:
    matchLabels:
      app: order-management-service
  template:
    metadata:
      labels:
        app: order-management-service
    spec:
      containers:
      - name: order-management
        image: localhost:5000/order-management-service:latest
        ports:
        - containerPort: 8000
        env:
        - name: ORDER_MANAGEMENT_CONFIG
          valueFrom:
            configMapKeyRef:
              name: trading-platform-config
              key: ORDER_MANAGEMENT_CONFIG
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: database_url
        - name: RABBITMQ_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: rabbitmq_url
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: order-management-service
  namespace: trading-system
spec:
  selector:
    app: order-management-service
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP

