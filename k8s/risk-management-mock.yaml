---
# Mock Risk Management Service for testing
# Uses nginx as a simple HTTP server to test connectivity

apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-management-mock
  namespace: trading-system
  labels:
    app: risk-management-mock
    component: risk-management
spec:
  replicas: 1
  selector:
    matchLabels:
      app: risk-management-mock
  template:
    metadata:
      labels:
        app: risk-management-mock
        component: risk-management
    spec:
      containers:
      - name: risk-management-mock
        image: nginx:alpine
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"

---
apiVersion: v1
kind: Service
metadata:
  name: risk-management-mock
  namespace: trading-system
  labels:
    app: risk-management-mock
spec:
  selector:
    app: risk-management-mock
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP



