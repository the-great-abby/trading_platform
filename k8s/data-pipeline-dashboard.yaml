apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-pipeline-dashboard
  namespace: trading-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-pipeline-dashboard
  template:
    metadata:
      labels:
        app: data-pipeline-dashboard
    spec:
      containers:
      - name: data-pipeline-dashboard
        image: localhost:32000/data-pipeline-dashboard:latest
        ports:
        - containerPort: 11137
        env:
        - name: TRANSFORMATION_PIPELINE_URL
          value: "http://data-transformation-pipeline:11135"
        - name: ANALYSIS_SERVICE_URL
          value: "http://data-analysis-service:11136"
        - name: MARKET_DATA_URL
          value: "http://market-data-service:80"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 11137
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 11137
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: data-pipeline-dashboard
  namespace: trading-system
spec:
  type: ClusterIP
  ports:
  - port: 11137
    targetPort: 11137
    protocol: TCP
    name: http
  selector:
    app: data-pipeline-dashboard 