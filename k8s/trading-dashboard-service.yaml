apiVersion: apps/v1
kind: Deployment
metadata:
  name: trading-dashboard-service
  namespace: trading-system
  labels:
    app: trading-dashboard-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trading-dashboard-service
  template:
    metadata:
      labels:
        app: trading-dashboard-service
    spec:
      containers:
      - name: trading-dashboard-service
        image: localhost:5000/trading-dashboard-service:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          value: "postgresql://trading_user:trading_pass@postgres-dev:5432/trading_bot"
        - name: MARKET_DATA_SERVICE_URL
          value: "http://market-data-service:8000"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /dashboard/health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /dashboard/health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: trading-dashboard-service
  namespace: trading-system
  labels:
    app: trading-dashboard-service
spec:
  selector:
    app: trading-dashboard-service
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  type: ClusterIP 