apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-analysis-service
  namespace: trading-system
  labels:
    app: ai-analysis-service
    tier: management
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-analysis-service
  template:
    metadata:
      labels:
        app: ai-analysis-service
        tier: management
    spec:
      containers:
      - name: ai-analysis-service
        image: localhost:32000/ai-analysis-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 11085
        env:
        - name: LLM_PROXY_URL
          value: "http://llm-proxy:12001"
        - name: MARKET_DATA_URL
          value: "http://market-data-service:8002"
        - name: DATABASE_URL
          value: "postgresql://user:password@postgres:5432/trading"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 11085
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 11085
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: ai-analysis-service
  namespace: trading-system
  labels:
    app: ai-analysis-service
    tier: management
spec:
  type: ClusterIP
  ports:
  - port: 11085
    targetPort: 11085
    protocol: TCP
    name: http
  selector:
    app: ai-analysis-service 