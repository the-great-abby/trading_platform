apiVersion: v1
kind: ConfigMap
metadata:
  name: trading-config
  namespace: trading-system
data:
  # Database URLs
  DATABASE_URL_WRITE: "postgresql://postgres:password@postgres-regular-external.postgres-infra.svc.cluster.local:5432/trading_write"
  DATABASE_URL_READ: "postgresql://postgres:password@postgres-regular-external.postgres-infra.svc.cluster.local:5432/trading_read"
  DATABASE_URL_TIMESERIES: "postgresql://postgres:password@postgres-timescale-external.postgres-infra.svc.cluster.local:5432/trading_bot"
  
  # Event Store
  EVENT_STORE_URL: "eventstore:2113"
  
  # Message Broker
  KAFKA_BROKERS: "kafka:9092"
  
  # Cache
  REDIS_URL: "redis://redis.redis.svc.cluster.local:6379"
  
  # Time Series Database
  INFLUXDB_URL: "http://influxdb:8086"
  
  # Public API
  PUBLIC_API_URL: "http://public-api:8000"
  
  # Environment
  ENVIRONMENT: "production"
  
  # Logging
  LOG_LEVEL: "INFO"
  
  # Trading Configuration
  INITIAL_CAPITAL: "10000"
  MAX_POSITION_SIZE: "0.1"
  STOP_LOSS_PERCENTAGE: "0.02"
  TAKE_PROFIT_PERCENTAGE: "0.05" 