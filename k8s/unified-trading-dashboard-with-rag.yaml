apiVersion: apps/v1
kind: Deployment
metadata:
  name: unified-trading-dashboard
  namespace: trading-system
  labels:
    app: unified-trading-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unified-trading-dashboard
  template:
    metadata:
      labels:
        app: unified-trading-dashboard
    spec:
      containers:
      - name: unified-trading-dashboard
        image: localhost:32000/unified-trading-dashboard:latest
        ports:
        - containerPort: 8080
        env:
        - name: BACKTEST_API_URL
          value: "http://backtest-api:11101"
        - name: ANALYTICS_API_URL
          value: "http://backtest-api:11101"
        - name: MARKET_DATA_URL
          value: "http://market-data-service:8000"
        - name: REDIS_URL
          value: "redis://redis.redis.svc.cluster.local:6379"
        - name: DATABASE_URL
          value: "postgresql://trading_user:trading_pass@timescaledb.trading-system.svc.cluster.local:5432/trading_bot"
        - name: LLM_PROXY_URL
          value: "http://host.docker.internal:12001"
        - name: VECTOR_STORAGE_URL
          value: "http://postgres-vector-storage:11006"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: unified-trading-dashboard
  namespace: trading-system
  labels:
    app: unified-trading-dashboard
spec:
  selector:
    app: unified-trading-dashboard
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: unified-trading-dashboard-config
  namespace: trading-system
data:
  # Configuration for the integrated RAG chat
  RAG_CHAT_ENABLED: "true"
  K8S_KNOWLEDGE_ENABLED: "true"
  LLM_PROXY_ENABLED: "true"
