apiVersion: v1
kind: Service
metadata:
  name: ai-stock-dashboard
  namespace: trading-system
  labels:
    app: ai-stock-dashboard
spec:
  selector:
    app: ai-stock-dashboard
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-stock-dashboard
  namespace: trading-system
  labels:
    app: ai-stock-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-stock-dashboard
  template:
    metadata:
      labels:
        app: ai-stock-dashboard
    spec:
      containers:
      - name: ai-stock-dashboard
        image: localhost:32000/ai-stock-dashboard:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
        - name: VECTOR_STORAGE_URL
          value: "http://postgres-vector-storage:80"
        - name: LLM_PROXY_URL
          value: "http://llm-proxy:11081"
        - name: BACKTEST_API_URL
          value: "http://backtest-api:80"
        - name: MARKET_DATA_URL
          value: "http://market-data-service:11084"
        - name: RSS_FEED_URL
          value: "http://rss-feed-service:11004"
        - name: NOTIFICATION_SERVICE_URL
          value: "http://notification-service:80"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5 