apiVersion: v1
kind: Service
metadata:
  name: postgres-vector-storage
  namespace: trading-system
  labels:
    app: postgres-vector-storage
spec:
  selector:
    app: postgres-vector-storage
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-vector-storage
  namespace: trading-system
  labels:
    app: postgres-vector-storage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-vector-storage
  template:
    metadata:
      labels:
        app: postgres-vector-storage
    spec:
      containers:
      - name: postgres-vector-storage
        image: localhost:32000/postgres-vector-storage:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          value: "postgresql://trading_user:trading_pass@timescaledb.trading-system.svc.cluster.local:5432/trading_bot"
        - name: LLM_PROXY_URL
          value: "http://ollama-controller-api-service.ollama-controller.svc.cluster.local:12001"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5 