apiVersion: batch/v1
kind: Job
metadata:
  name: fix-llm-column-migration-job
  namespace: trading-system
spec:
  template:
    spec:
      containers:
      - name: migration
        image: localhost:5000/trading-system:latest
        command: ["python", "fix_llm_column.py"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: database_url
      restartPolicy: Never
  backoffLimit: 3 