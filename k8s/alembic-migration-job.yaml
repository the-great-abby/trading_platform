apiVersion: batch/v1
kind: Job
metadata:
  name: alembic-migration
  namespace: trading-system
spec:
  template:
    spec:
      serviceAccountName: trading-service-account
      containers:
      - name: alembic-migration
        image: localhost:32000/strategy-service:latest
        command: ["python", "-m", "alembic", "upgrade", "head"]
        workingDir: /app
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: database-url
        - name: LOG_LEVEL
          value: "INFO"
        volumeMounts:
        - name: alembic-config
          mountPath: /app/alembic.ini
          subPath: alembic.ini
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
      volumes:
      - name: alembic-config
        configMap:
          name: alembic-config
      restartPolicy: Never
  backoffLimit: 3 