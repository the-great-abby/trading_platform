apiVersion: batch/v1
kind: Job
metadata:
  name: alembic-migration-job
  namespace: trading-system
spec:
  template:
    spec:
      containers:
      - name: alembic-migration
        image: localhost:32000/strategy-service:latest
        imagePullPolicy: Always
        command: ["/bin/sh", "-c"]
        args:
        - |
          echo "🔧 Running Alembic migrations..."
          cd /app
          export DATABASE_URL="postgresql://trading_user:trading_pass@timescaledb.trading-system.svc.cluster.local:5432/trading_bot"
          alembic upgrade head
          echo "✅ Migrations completed!"
        env:
        - name: DATABASE_URL
          value: "postgresql://trading_user:trading_pass@timescaledb.trading-system.svc.cluster.local:5432/trading_bot"
      restartPolicy: Never 