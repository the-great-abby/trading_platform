apiVersion: v1
kind: ConfigMap
metadata:
  name: backtest-scanner-config
  namespace: trading-system
data:
  # Use centralized symbol list from trading_config.py
  # This will be populated by the application using get_symbols()
  DEFAULT_SYMBOLS: "AAPL,MSFT,GOOGL,AMZN,TSLA,NVDA,META,NFLX,AMD,INTC,JPM,BAC,WFC,GS,MS,JNJ,PFE,UNH,HD,DIS,V,MA,PYPL,ADBE,CRM,ORCL,CSCO,QCOM,TXN,AVGO,SPY,QQQ,VTI,VOO,VUG,XLK,XLF,XLE,XLV,XLY"
  
  # Default scan periods
  DEFAULT_PERIODS: |
    [
      {"start_date": "2024-01-01", "end_date": "2024-12-31", "interval": "1d"},
      {"start_date": "2023-01-01", "end_date": "2023-12-31", "interval": "1d"},
      {"start_date": "2022-01-01", "end_date": "2022-12-31", "interval": "1d"}
    ]
  
  # Scanner configuration
  PARALLEL_WORKERS: "4"
  BATCH_SIZE: "10"
  FORCE_REFRESH: "false"
  
  # Data retention
  DAYS_TO_KEEP: "365"
  CLEANUP_ENABLED: "true"
  
  # Performance settings
  CACHE_TTL: "3600"
  MAX_RETRIES: "3"
  RETRY_DELAY: "5"
  
  # Logging configuration
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
  LOG_DIR: "/app/logs"
  
  # Health check settings
  HEALTH_CHECK_INTERVAL: "30"
  HEALTH_CHECK_TIMEOUT: "10"
  
  # Monitoring
  METRICS_ENABLED: "true"
  METRICS_PORT: "9090"
  
  # New fields from the code block
  SCAN_INTERVAL: "3600"  # 1 hour
  MAX_SYMBOLS_PER_SCAN: "50"
  DATA_PROVIDER: "polygon"
  BACKTEST_PERIOD_DAYS: "365" 