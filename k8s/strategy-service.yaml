apiVersion: apps/v1
kind: Deployment
metadata:
  name: strategy-service
  namespace: trading-system
  labels:
    app: strategy-service
    component: strategy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: strategy-service
  template:
    metadata:
      labels:
        app: strategy-service
        component: strategy
    spec:
      containers:
      - name: strategy-service
        image: localhost:32000/strategy-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: DATABASE_URL
          value: "postgresql://postgres:postgres@postgres-timescale-external.postgres-infra.svc.cluster.local:5432/trading_bot"
        - name: REDIS_URL
          value: "redis://redis.redis.svc.cluster.local:6379"
        - name: OLLAMA_URL
          value: "http://host.docker.internal:11434"
        - name: LOG_LEVEL
          value: "INFO"
        - name: ENVIRONMENT
          value: "production"
        - name: POLYGON_API_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: POLYGON_API_KEY
        - name: ALPHA_VANTAGE_API_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: ALPHA_VANTAGE_API_KEY
        - name: DATABASE_ONLY
          value: "true"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: logs
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: strategy-service
  namespace: trading-system
  labels:
    app: strategy-service
    component: strategy
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: strategy-service
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: strategy-service-ingress
  namespace: trading-system
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  rules:
  - host: trading.example.com
    http:
      paths:
      - path: /api/v1/strategies
        pathType: Prefix
        backend:
          service:
            name: strategy-service
            port:
              number: 80
      - path: /api/v1/recommendations
        pathType: Prefix
        backend:
          service:
            name: strategy-service
            port:
              number: 80 