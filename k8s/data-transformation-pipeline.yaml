apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-transformation-pipeline
  namespace: trading-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-transformation-pipeline
  template:
    metadata:
      labels:
        app: data-transformation-pipeline
    spec:
      containers:
      - name: data-transformation-pipeline
        image: localhost:32000/data-transformation-pipeline:latest
        ports:
        - containerPort: 11135
        env:
        - name: DATABASE_URL
          value: "postgresql://trading_user:trading_pass@timescaledb.trading-system.svc.cluster.local:5432/trading_bot"
        - name: MARKET_DATA_URL
          value: "http://market-data-service:80"
        - name: AI_ANALYSIS_URL
          value: "http://ai-analysis-service:11085"
        - name: RABBITMQ_URL
          value: "amqp://trading_user:trading_pass@rabbitmq-service:5672/trading_vhost"
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 11135
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 11135
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: data-transformation-pipeline
  namespace: trading-system
spec:
  type: ClusterIP
  ports:
  - port: 11135
    targetPort: 11135
    protocol: TCP
    name: http
  selector:
    app: data-transformation-pipeline 