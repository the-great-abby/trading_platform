apiVersion: batch/v1
kind: Job
metadata:
  name: index-report
  namespace: trading-system
spec:
  template:
    spec:
      containers:
      - name: index-reporter
        image: localhost:5000/trading-bot:latest
        command: ["python", "scripts/manage_indexes.py", "report"]
        env:
        - name: DATABASE_URL
          value: "postgresql://trading_user:trading_pass@postgres-dev:5432/trading_bot"
        - name: PYTHONPATH
          value: "/workspace/src"
      restartPolicy: Never
      backoffLimit: 3 