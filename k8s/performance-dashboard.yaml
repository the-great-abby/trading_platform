apiVersion: apps/v1
kind: Deployment
metadata:
  name: performance-dashboard
  namespace: trading-system
  labels:
    app: performance-dashboard
    service: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: performance-dashboard
  template:
    metadata:
      labels:
        app: performance-dashboard
        service: dashboard
    spec:
      containers:
      - name: performance-dashboard
        image: localhost:5000/performance-dashboard:latest
        ports:
        - containerPort: 8000
        env:
        - name: BACKTEST_API_URL
          value: "http://backtest-api:8000"
        - name: ANALYTICS_API_URL
          value: "http://analytics-service:8000"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: performance-dashboard
  namespace: trading-system
  labels:
    app: performance-dashboard
    service: dashboard
spec:
  selector:
    app: performance-dashboard
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
  type: ClusterIP 