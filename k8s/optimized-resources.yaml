# Optimized Resource Configurations
# Based on 2x actual usage from kubectl top

---
# Backtest API - Current: 7m CPU, 44Mi Memory
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backtest-api
  namespace: trading-system
spec:
  template:
    spec:
      containers:
      - name: backtest-api
        resources:
          requests:
            cpu: 20m        # 2x actual usage (7m * 2 = 14m, rounded to 20m)
            memory: 100Mi   # 2x actual usage (44Mi * 2 = 88Mi, rounded to 100Mi)
          limits:
            cpu: 40m        # 4x actual usage for burst capacity
            memory: 200Mi   # 4x actual usage for burst capacity

---
