apiVersion: batch/v1
kind: Job
metadata:
  name: backtest-fast-optimized
  namespace: trading-system
  labels:
    app: backtest
    type: fast-optimized
spec:
  template:
    metadata:
      labels:
        app: backtest
        type: fast-optimized
    spec:
      containers:
      - name: backtest-fast-optimized
        image: localhost:32000/trading-system:latest
        imagePullPolicy: Always
        command: ["python"]
        args: ["run_fast_backtest_simple.py", "--quick"]
        env:
        - name: DATABASE_URL
          value: "postgresql://trading_user:trading_password@postgres-service:5432/trading_db"
        - name: REDIS_URL
          value: "redis://redis-service:6379"
        - name: RABBITMQ_URL
          value: "amqp://guest:guest@rabbitmq-service:5672/"
        - name: OLLAMA_BASE_URL
          value: "http://192.168.65.3:11434"
        - name: POLYGON_API_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: polygon-api-key
        - name: ALPHA_VANTAGE_API_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: alpha-vantage-api-key
        - name: NEWS_API_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: news-api-key
              optional: true
        - name: BACKTEST_MODE
          value: "fast_optimized"
        - name: USE_CACHE
          value: "true"
        - name: PARALLEL_PROCESSING
          value: "true"
        - name: MAX_WORKERS
          value: "8"
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            cpu: "1000m"
            memory: "2Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
        volumeMounts:
        - name: backtest-cache
          mountPath: /app/backtest_cache
        - name: backtest-results
          mountPath: /app/backtest_results
      volumes:
      - name: backtest-cache
        persistentVolumeClaim:
          claimName: backtest-cache-pvc
      - name: backtest-results
        persistentVolumeClaim:
          claimName: backtest-results-pvc
      restartPolicy: Never
  backoffLimit: 1 