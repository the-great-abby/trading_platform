apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: trading-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
      - name: ollama
        image: ollama/ollama:latest
        ports:
        - containerPort: 11434
        resources:
          requests:
            memory: "4Gi"
            cpu: "2000m"
          limits:
            memory: "8Gi"
            cpu: "4000m"
        env:
        - name: OLLAMA_MODEL
          value: "gemma3:1b"
        - name: OLLAMA_DEBUG
          value: "1"
        - name: OLLAMA_LOAD_TIMEOUT
          value: "10m"
        - name: OLLAMA_KEEP_ALIVE
          value: "10m"
        - name: OLLAMA_HOST
          value: "0.0.0.0:11434"
        - name: OLLAMA_NUM_PARALLEL
          value: "1"
        - name: OLLAMA_MAX_LOADED_MODELS
          value: "1"
        - name: OLLAMA_FLASH_ATTENTION
          value: "false"
        command: ["ollama"]
        args: ["serve"]
        livenessProbe:
          httpGet:
            path: /api/tags
            port: 11434
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /api/tags
            port: 11434
          initialDelaySeconds: 30
          periodSeconds: 10
        volumeMounts:
        - name: ollama-models
          mountPath: /root/.ollama/models
      volumes:
      - name: ollama-models
        hostPath:
          path: /Users/abby/.ollama/models
          type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: trading-system
spec:
  selector:
    app: ollama
  ports:
  - protocol: TCP
    port: 11434
    targetPort: 11434
  type: ClusterIP 