apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: validation-service-ingress
  namespace: trading-system
  labels:
    app: validation-service
    component: validation
    tier: api
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "*"
spec:
  ingressClassName: nginx
  rules:
  - host: validation.trading-system.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: validation-service
            port:
              number: 8000
  - host: validation-api.trading-system.local
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: validation-service
            port:
              number: 8000
      - path: /docs
        pathType: Prefix
        backend:
          service:
            name: validation-service
            port:
              number: 8000
      - path: /redoc
        pathType: Prefix
        backend:
          service:
            name: validation-service
            port:
              number: 8000
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: validation-service
            port:
              number: 8000
      - path: /metrics
        pathType: Prefix
        backend:
          service:
            name: validation-service
            port:
              number: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: validation-service-metrics-ingress
  namespace: trading-system
  labels:
    app: validation-service
    component: validation
    tier: monitoring
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: validation-metrics-auth
    nginx.ingress.kubernetes.io/auth-realm: "Validation Metrics"
spec:
  ingressClassName: nginx
  rules:
  - host: validation-metrics.trading-system.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: validation-service
            port:
              number: 8000











