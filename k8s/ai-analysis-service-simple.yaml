apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-analysis-service-simple
  namespace: trading-system
  labels:
    app: ai-analysis-service-simple
    tier: management
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-analysis-service-simple
      tier: management
  template:
    metadata:
      labels:
        app: ai-analysis-service-simple
        tier: management
    spec:
      containers:
      - name: ai-analysis-service-simple
        image: localhost:32000/ai-analysis-service:latest
        ports:
        - containerPort: 8000
        env:
        - name: LLM_PROXY_URL
          value: "http://host.docker.internal:12001"
        - name: MARKET_DATA_URL
          value: "http://market-data-service:11084"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              key: database_url
              name: trading-secrets
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: ai-analysis-service-simple
  namespace: trading-system
spec:
  selector:
    app: ai-analysis-service-simple
    tier: management
  ports:
  - port: 80
    targetPort: 8000
  type: ClusterIP
