apiVersion: apps/v1
kind: Deployment
metadata:
  name: trading-engine-simple
  namespace: trading-system
  labels:
    app: trading-engine-simple
    component: trading
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trading-engine-simple
      component: trading
  template:
    metadata:
      labels:
        app: trading-engine-simple
        component: trading
    spec:
      containers:
      - name: trading-engine-simple
        image: localhost:32000/trading-engine:latest
        ports:
        - containerPort: 11080
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              key: database_url
              name: trading-secrets
        - name: RABBITMQ_URL
          valueFrom:
            secretKeyRef:
              key: rabbitmq_url
              name: trading-secrets
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              key: redis_url
              name: trading-secrets
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 200m
            memory: 512Mi
        livenessProbe:
          exec:
            command: ["python3", "-c", "import sys; sys.exit(0)"]
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 1
          failureThreshold: 3
        readinessProbe:
          exec:
            command: ["python3", "-c", "import sys; sys.exit(0)"]
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 1
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: trading-engine-simple
  namespace: trading-system
spec:
  selector:
    app: trading-engine-simple
    component: trading
  ports:
  - port: 11080
    targetPort: 11080
  type: ClusterIP
