apiVersion: apps/v1
kind: Deployment
metadata:
  name: trading-service-simple
  namespace: trading-system
  labels:
    app: trading-service-simple
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trading-service-simple
  template:
    metadata:
      labels:
        app: trading-service-simple
    spec:
      containers:
      - name: trading-service-simple
        image: localhost:32000/trading-service:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              key: database_url
              name: trading-secrets
        - name: RABBITMQ_URL
          valueFrom:
            secretKeyRef:
              key: rabbitmq_url
              name: trading-secrets
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              key: redis_url
              name: trading-secrets
        - name: PUBLIC_API_URL
          value: "http://public-api:8000"
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: trading-service-simple
  namespace: trading-system
spec:
  selector:
    app: trading-service-simple
  ports:
  - port: 80
    targetPort: 8000
  type: ClusterIP
