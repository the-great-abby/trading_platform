apiVersion: v1
kind: Namespace
metadata:
  name: trading-system

---
# Ultra-Consolidated Trading Service (replaces 8+ services)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trading-ultra-service
  namespace: trading-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trading-ultra-service
  template:
    metadata:
      labels:
        app: trading-ultra-service
    spec:
      containers:
      - name: trading-ultra
        image: localhost:32000/trading-ultra-service:latest
        ports:
        - containerPort: 11099
        env:
        - name: DATABASE_URL
          value: "postgresql://user:password@postgres:5432/trading"
        - name: MARKET_DATA_URL
          value: "http://localhost:11099/api/market-data"
        - name: AI_ANALYSIS_URL
          value: "http://localhost:11099/api/ai-analysis"
        - name: SMTP_SERVER
          value: "smtp.gmail.com"
        - name: SMTP_PORT
          value: "587"
        - name: SMTP_USERNAME
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: smtp-username
              optional: true
        - name: SMTP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: smtp-password
              optional: true
        - name: SENDER_EMAIL
          value: "noreply@trading-system.com"
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "400m"
        livenessProbe:
          httpGet:
            path: /health
            port: 11099
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 11099
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: trading-ultra-service
  namespace: trading-system
spec:
  type: LoadBalancer
  ports:
  - port: 11099
    targetPort: 11099
    protocol: TCP
    name: http
  selector:
    app: trading-ultra-service

---
# Data Processing Service (consolidates all workers/cronjobs)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-processing-service
  namespace: trading-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-processing-service
  template:
    metadata:
      labels:
        app: data-processing-service
    spec:
      containers:
      - name: data-processing
        image: localhost:32000/data-processing-service:latest
        ports:
        - containerPort: 11095
        env:
        - name: DATABASE_URL
          value: "postgresql://user:password@postgres:5432/trading"
        - name: MARKET_DATA_URL
          value: "http://trading-ultra-service:11099/api/market-data"
        - name: AI_ANALYSIS_URL
          value: "http://trading-ultra-service:11099/api/ai-analysis"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 11095
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 11095
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: data-processing-service
  namespace: trading-system
spec:
  type: ClusterIP
  ports:
  - port: 11095
    targetPort: 11095
    protocol: TCP
    name: http
  selector:
    app: data-processing-service

---
# Database (essential)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: trading-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: "trading"
        - name: POSTGRES_USER
          value: "user"
        - name: POSTGRES_PASSWORD
          value: "password"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: trading-system
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
    name: postgres
  selector:
    app: postgres 